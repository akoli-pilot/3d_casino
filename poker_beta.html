<!doctype html>
<!--
    3D Poker Game with Multiplayer Support
    
    To play with others, add ?room=YOUR_ROOM_NAME to the URL
    Example: poker_beta.html?room=epstein
-->
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>3D Poker P2P (three.js)</title>
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
                background: #071718;
                font-family: Inter, system-ui, Arial;
            }
            .ui {
                position: absolute;
                left: 12px;
                top: 12px;
                z-index: 5;
                color: #cfeff0;
            }
            .ui button {
                background: #0d6b75;
                border: 0;
                padding: 8px 12px;
                border-radius: 8px;
                color: white;
                margin-right: 8px;
                cursor: pointer;
            }
            .ui button.isOff {
                background: #4b6367;
                color: #d3e9eb;
            }
            .ui label {
                color: #9fd6db;
                margin-left: 8px;
            }
            #info {
                position: absolute;
                right: 12px;
                top: 12px;
                color: #bfe9ee;
                z-index: 5;
                background: rgba(0, 0, 0, 0.25);
                padding: 8px;
                border-radius: 8px;
            }
            canvas {
                display: block;
            }
            .log {
                position: fixed;
                left: 12px;
                bottom: 12px;
                color: #9fd6db;
                background: rgba(0, 0, 0, 0.25);
                padding: 6px;
                border-radius: 6px;
                font-size: 12px;
            }
            /* Odds overlay */
            #oddsContainer {
                position: fixed;
                left: 0;
                top: 0;
                right: 0;
                bottom: 0;
                pointer-events: none;
                z-index: 4;
            }
            #confettiCanvas {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 8;
            }
            .oddsLabel {
                position: absolute;
                color: #fff;
                font-size: 13px;
                font-family: Arial, Helvetica, sans-serif;
                pointer-events: none;
                text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
            }
            /* Player action buttons */
            .playerActions {
                position: absolute;
                display: none;
                pointer-events: auto;
                z-index: 6;
                gap: 6px;
                flex-wrap: wrap;
                justify-content: center;
                max-width: 320px;
                transform: translateY(-60px);
            }
            .playerActions button {
                background: #0d6b75;
                border: 0;
                padding: 6px 10px;
                border-radius: 6px;
                color: white;
                cursor: pointer;
                font-size: 12px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
                transition: all 0.1s ease;
            }
            .playerActions button:hover {
                background: #0f7d88;
                transform: scale(1.05);
            }
            .playerActions button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }
            .playerActions button.recommendedAction {
                background: #f2c94c;
                color: #0f1516;
                border: 1px solid rgba(255, 248, 214, 0.95);
                box-shadow:
                    0 0 0 2px rgba(242, 201, 76, 0.45),
                    0 0 18px rgba(242, 201, 76, 0.65);
                animation: recommendedPulse 1.15s ease-in-out infinite;
            }
            .playerActions.active {
                display: flex;
            }

            /* Thread log + chat */
            #threadLogPanel {
                position: fixed;
                left: 12px;
                top: 64px;
                width: min(280px, calc(100vw - 24px));
                z-index: 7;
                color: #d9f4f6;
                background: rgba(1, 23, 25, 0.74);
                border: 1px solid rgba(143, 210, 216, 0.28);
                border-radius: 8px;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.26);
                overflow: hidden;
            }
            #threadLogTitle {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                background: rgba(17, 95, 104, 0.5);
                padding: 6px 8px;
            }
            #threadLogMessages {
                max-height: 96px;
                overflow-y: auto;
                padding: 6px 8px;
                font-size: 11px;
                line-height: 1.25;
            }
            .threadLogEntry {
                margin-bottom: 4px;
                word-break: break-word;
            }
            .threadLogMeta {
                color: #90d6dc;
            }
            #threadComposer {
                display: flex;
                gap: 6px;
                border-top: 1px solid rgba(143, 210, 216, 0.22);
                padding: 6px;
            }
            #threadInput {
                flex: 1;
                border: 1px solid rgba(143, 210, 216, 0.35);
                background: rgba(7, 28, 31, 0.95);
                color: #dcf6f8;
                border-radius: 6px;
                padding: 4px 6px;
                font-size: 11px;
                outline: none;
            }
            #threadInput::placeholder {
                color: #84b9be;
            }
            #threadSendBtn {
                border: 0;
                border-radius: 6px;
                background: #0d6b75;
                color: #fff;
                padding: 4px 8px;
                font-size: 11px;
                cursor: pointer;
            }
            #threadSendBtn:disabled,
            #threadInput:disabled {
                opacity: 0.55;
                cursor: not-allowed;
            }

            @media (max-width: 720px) {
                #threadLogPanel {
                    top: 104px;
                    width: calc(100vw - 24px);
                }
                #threadLogMessages {
                    max-height: 84px;
                }
            }

            @keyframes recommendedPulse {
                0% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.06);
                }
                100% {
                    transform: scale(1);
                }
            }

        
            #intro-title {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;

                font-size: clamp(3.5rem, 9vw, 9rem);
                font-weight: 800;
                letter-spacing: 0.12em;
                text-transform: uppercase;

                color: #f2f2f2;

                text-shadow:
                    0 0 12px rgba(255, 255, 255, 0.08),
                    0 0 32px rgba(255, 255, 255, 0.04);

                background:
                    radial-gradient(
                        ellipse at center,
                        rgba(0, 0, 0, 0.35) 0%,
                        rgba(0, 0, 0, 0.65) 100%
                    );

                pointer-events: none;
                z-index: 9999;

                opacity: 0;
                filter: blur(10px);
                transform: scale(1.02);

                animation: controlIntro 4.5s cubic-bezier(0.4, 0, 0.2, 1)
                    forwards;
            }

            @keyframes controlIntro {
                0% {
                    opacity: 0;
                    filter: blur(10px);
                    transform: scale(1.02);
                }

                18% {
                    opacity: 1;
                    filter: blur(0);
                    transform: scale(1);
                }

                70% {
                    opacity: 1;
                    filter: blur(0);
                }

                100% {
                    opacity: 0;
                    filter: blur(6px);
                }
            }
        </style>
    </head>
    <body>
        <!-- Intro -->
        <div id="intro-title">POKER</div>
        <div class="ui">
            <button id="shuffleBtn">Shuffle</button>
            <button id="dealBtn">Deal</button>
            <button id="resetBtn">Reset Deck</button>
            <button id="revealBtn">Reveal</button>
            <button id="confettiToggleBtn" type="button">Confetti: On</button>
            <!-- Chip spawn buttons -->
            <button id="chipBlackBtn" type="button">Black: $100</button>
            <button id="chipBlueBtn" type="button">Blue: $10</button>
            <button id="chipGreenBtn" type="button">Green: $25</button>
            <button id="chipRedBtn" type="button">Red: $5</button>
            <label
                >Volume
                <input
                    id="musicVolume"
                    type="range"
                    min="0"
                    max="1"
                    step="0.01"
                    value="0.55"
            /></label>
        </div>
        <div class="log" id="log">Initializing…</div>
        <div id="roomInfo" style="position: fixed; right: 12px; top: 60px; color: #9fd6db; background: rgba(0, 0, 0, 0.25); padding: 6px; border-radius: 6px; font-size: 11px; z-index: 5;">
            Room: <span id="roomName">-</span><br>
            Players: <span id="playerCount">0</span><br>
            Your Seat: <span id="mySeatDisplay">Connecting...</span>
        </div>
        <div id="threadLogPanel" aria-live="polite">
            <div id="threadLogTitle">Thread Log</div>
            <div id="threadLogMessages"></div>
            <div id="threadComposer">
                <input
                    id="threadInput"
                    type="text"
                    maxlength="220"
                    placeholder="Waiting for seat assignment..."
                />
                <button id="threadSendBtn" type="button">Send</button>
            </div>
        </div>
        <div id="oddsContainer" aria-hidden="true"></div>
        <canvas id="confettiCanvas" aria-hidden="true"></canvas>
        <div id="player0Actions" class="playerActions">
            <button data-action="fold">Fold</button>
            <button data-action="check">Check</button>
            <button data-action="bet">Bet</button>
            <button data-action="call">Call</button>
            <button data-action="raise">Raise</button>
        </div>
        <div id="player1Actions" class="playerActions">
            <button data-action="fold">Fold</button>
            <button data-action="check">Check</button>
            <button data-action="bet">Bet</button>
            <button data-action="call">Call</button>
            <button data-action="raise">Raise</button>
        </div>
        <div id="player2Actions" class="playerActions">
            <button data-action="fold">Fold</button>
            <button data-action="check">Check</button>
            <button data-action="bet">Bet</button>
            <button data-action="call">Call</button>
            <button data-action="raise">Raise</button>
        </div>
        <div id="player3Actions" class="playerActions">
            <button data-action="fold">Fold</button>
            <button data-action="check">Check</button>
            <button data-action="bet">Bet</button>
            <button data-action="call">Call</button>
            <button data-action="raise">Raise</button>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "./three.module.js",
                    "three/addons/": "./jsm/"
                }
            }
        </script>
        
        <!-- PeerJS -->
        <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

        <script type="module">
            import * as THREE from "three";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";

            (async () => {
                init(THREE, OrbitControls);
                async function init(THREE, OrbitControls) {
                    document.getElementById("log").textContent =
                        "Initializing scene…";

                    // Initialize PeerJS
                    const roomName = new URLSearchParams(window.location.search).get("room") || "default";
                    const peerId = "poker-" + roomName + "-" + Math.random().toString(36).substr(2, 9);
                    
                    let peer = null;
                    const connections = new Map(); // peerId -> connection
                    let isHost = false;
                    const hostPeerId = "poker-" + roomName + "-host";
                    let mySeat = -1;
                    const seatAssignments = new Map();
                    const MAX_SEATS = 4;
                    const threadLogMessagesEl = document.getElementById("threadLogMessages");
                    const threadInputEl = document.getElementById("threadInput");
                    const threadSendBtnEl = document.getElementById("threadSendBtn");
                    const confettiToggleBtnEl = document.getElementById("confettiToggleBtn");
                    const confettiCanvasEl = document.getElementById("confettiCanvas");
                    const confettiCtx = confettiCanvasEl
                        ? confettiCanvasEl.getContext("2d")
                        : null;
                    let confettiEnabled = true;
                    const confettiParticles = [];
                    let confettiAnimId = 0;
                    let confettiEndAt = 0;
                    let confettiLastTs = 0;
                    let confettiNextBurstAt = 0;
                    const confettiColors = [
                        "#f94144",
                        "#f3722c",
                        "#f9c74f",
                        "#90be6d",
                        "#43aa8b",
                        "#577590",
                    ];

                    function updateConfettiToggleButtonState() {
                        if (!confettiToggleBtnEl) return;
                        confettiToggleBtnEl.textContent = confettiEnabled
                            ? "Confetti: On"
                            : "Confetti: Off";
                        confettiToggleBtnEl.setAttribute(
                            "aria-pressed",
                            confettiEnabled ? "true" : "false",
                        );
                        confettiToggleBtnEl.classList.toggle(
                            "isOff",
                            !confettiEnabled,
                        );
                    }

                    function resizeConfettiCanvas() {
                        if (!confettiCanvasEl) return;
                        const w = Math.max(1, Math.floor(window.innerWidth || 1));
                        const h = Math.max(1, Math.floor(window.innerHeight || 1));
                        if (confettiCanvasEl.width !== w) confettiCanvasEl.width = w;
                        if (confettiCanvasEl.height !== h) confettiCanvasEl.height = h;
                    }

                    function stopConfetti() {
                        confettiEndAt = 0;
                        confettiNextBurstAt = 0;
                        confettiLastTs = 0;
                        confettiParticles.length = 0;
                        if (confettiAnimId) {
                            cancelAnimationFrame(confettiAnimId);
                            confettiAnimId = 0;
                        }
                        if (confettiCtx && confettiCanvasEl) {
                            confettiCtx.clearRect(
                                0,
                                0,
                                confettiCanvasEl.width,
                                confettiCanvasEl.height,
                            );
                        }
                    }

                    function spawnConfettiBurst(count = 56) {
                        if (!confettiCtx || !confettiCanvasEl) return;
                        const w = confettiCanvasEl.width;
                        for (let i = 0; i < count; i++) {
                            confettiParticles.push({
                                x: Math.random() * w,
                                y: -20 - Math.random() * 90,
                                vx: (Math.random() - 0.5) * 340,
                                vy: 70 + Math.random() * 220,
                                gravity: 460 + Math.random() * 240,
                                drag: 0.985,
                                size: 5 + Math.random() * 7,
                                thickness: 4 + Math.random() * 6,
                                rotation: Math.random() * Math.PI * 2,
                                spin: (Math.random() - 0.5) * 10,
                                ttl: 2.4 + Math.random() * 1.6,
                                life: 0,
                                color:
                                    confettiColors[
                                        Math.floor(
                                            Math.random() * confettiColors.length,
                                        )
                                    ],
                            });
                        }
                    }

                    function animateConfetti(ts) {
                        if (!confettiCtx || !confettiCanvasEl) {
                            confettiAnimId = 0;
                            return;
                        }
                        if (!confettiLastTs) confettiLastTs = ts;
                        const dt = Math.min(0.05, (ts - confettiLastTs) / 1000);
                        confettiLastTs = ts;

                        const w = confettiCanvasEl.width;
                        const h = confettiCanvasEl.height;
                        confettiCtx.clearRect(0, 0, w, h);

                        if (ts < confettiEndAt && ts >= confettiNextBurstAt) {
                            spawnConfettiBurst(42 + Math.floor(Math.random() * 22));
                            confettiNextBurstAt = ts + 180 + Math.random() * 140;
                        }

                        for (let i = confettiParticles.length - 1; i >= 0; i--) {
                            const p = confettiParticles[i];
                            p.life += dt;
                            p.vy += p.gravity * dt;
                            p.vx *= p.drag;
                            p.vy *= p.drag;
                            p.x += p.vx * dt;
                            p.y += p.vy * dt;
                            p.rotation += p.spin * dt;

                            if (p.life >= p.ttl || p.y > h + 60) {
                                confettiParticles.splice(i, 1);
                                continue;
                            }

                            const alpha = Math.max(0, 1 - p.life / p.ttl);
                            confettiCtx.save();
                            confettiCtx.globalAlpha = alpha;
                            confettiCtx.translate(p.x, p.y);
                            confettiCtx.rotate(p.rotation);
                            confettiCtx.fillStyle = p.color;
                            confettiCtx.fillRect(
                                -p.size / 2,
                                -p.thickness / 2,
                                p.size,
                                p.thickness,
                            );
                            confettiCtx.restore();
                        }

                        if (ts < confettiEndAt || confettiParticles.length > 0) {
                            confettiAnimId = requestAnimationFrame(animateConfetti);
                            return;
                        }

                        stopConfetti();
                    }

                    function triggerWinnerConfetti(durationMs = 3600) {
                        if (!confettiEnabled || !confettiCtx) return;
                        resizeConfettiCanvas();
                        confettiParticles.length = 0;
                        confettiEndAt = performance.now() + durationMs;
                        confettiNextBurstAt = 0;
                        confettiLastTs = 0;
                        if (!confettiAnimId) {
                            confettiAnimId = requestAnimationFrame(animateConfetti);
                        }
                    }

                    if (confettiToggleBtnEl) {
                        confettiToggleBtnEl.addEventListener("click", () => {
                            confettiEnabled = !confettiEnabled;
                            if (!confettiEnabled) stopConfetti();
                            updateConfettiToggleButtonState();
                        });
                    }
                    updateConfettiToggleButtonState();
                    resizeConfettiCanvas();

                    function seatLabelForChat(seat) {
                        if (
                            typeof seat === "number" &&
                            Number.isFinite(seat) &&
                            seat >= 0 &&
                            seat < MAX_SEATS
                        ) {
                            return `Player ${seat + 1}`;
                        }
                        return "Spectator";
                    }

                    function appendThreadMessage(entry = {}) {
                        if (!threadLogMessagesEl) return;
                        const text = String(entry.text || "").trim();
                        if (!text) return;
                        const ts = Number(entry.ts) || Date.now();
                        const label =
                            typeof entry.label === "string" && entry.label
                                ? entry.label
                                : seatLabelForChat(entry.seat);
                        const time = new Date(ts).toLocaleTimeString([], {
                            hour: "2-digit",
                            minute: "2-digit",
                        });

                        const row = document.createElement("div");
                        row.className = "threadLogEntry";
                        const meta = document.createElement("span");
                        meta.className = "threadLogMeta";
                        meta.textContent = `[${time}] ${label}: `;
                        const msg = document.createElement("span");
                        msg.textContent = text;

                        row.appendChild(meta);
                        row.appendChild(msg);
                        threadLogMessagesEl.appendChild(row);

                        // Keep memory bounded for long sessions.
                        while (threadLogMessagesEl.children.length > 120) {
                            threadLogMessagesEl.removeChild(
                                threadLogMessagesEl.firstChild,
                            );
                        }
                        threadLogMessagesEl.scrollTop =
                            threadLogMessagesEl.scrollHeight;
                    }

                    function updateChatComposerState() {
                        const canChat = mySeat >= 0;
                        if (threadInputEl) {
                            threadInputEl.disabled = !canChat;
                            threadInputEl.placeholder = canChat
                                ? `Message as ${seatLabelForChat(mySeat)}...`
                                : "Waiting for seat assignment...";
                        }
                        if (threadSendBtnEl) {
                            threadSendBtnEl.disabled = !canChat;
                        }
                    }

                    function submitThreadMessage() {
                        if (!threadInputEl) return;
                        const text = String(threadInputEl.value || "").trim();
                        if (!text) return;
                        if (mySeat < 0) {
                            updateChatComposerState();
                            return;
                        }

                        const payload = {
                            seat: mySeat,
                            text: text.slice(0, 220),
                            ts: Date.now(),
                        };
                        appendThreadMessage(payload);
                        emitAction("chat", payload);
                        threadInputEl.value = "";
                        threadInputEl.focus();
                    }

                    if (threadSendBtnEl) {
                        threadSendBtnEl.addEventListener(
                            "click",
                            submitThreadMessage,
                        );
                    }
                    if (threadInputEl) {
                        threadInputEl.addEventListener("keydown", (ev) => {
                            if (ev.key === "Enter") {
                                ev.preventDefault();
                                submitThreadMessage();
                            }
                        });
                    }
                    updateChatComposerState();
                    appendThreadMessage({
                        label: "System",
                        text: `Joined room ${roomName}`,
                        ts: Date.now(),
                    });

                    function assignNextSeat(peerId) {
                        for (let s = 0; s < MAX_SEATS; s++) {
                            if (![...seatAssignments.values()].includes(s)) {
                                seatAssignments.set(peerId, s);
                                return s;
                            }
                        }
                        return -1;
                    }

                    function reclaimSeat(peerId) {
                        seatAssignments.delete(peerId);
                    }

                    function updateMySeatDisplay() {
                        const el = document.getElementById("mySeatDisplay");
                        if (el) el.textContent = mySeat >= 0 ? `Player ${mySeat + 1}` : 'Connecting...';
                        updateChatComposerState();
                    }
                    
                    document.getElementById("roomName").textContent = roomName;
                    document.getElementById("log").textContent = "Connecting to room...";
                    
                    try {
                        peer = new Peer(peerId, {
                            debug: 0  // Reduce console spam
                        });
                        
                        peer.on('open', (id) => {
                            console.log('My peer ID is: ' + id);
                            document.getElementById("log").textContent = `Connecting to room: ${roomName}`;
                            
                            let connectionEstablished = false;
                            
                            // Try to connect to host
                            const hostConn = peer.connect(hostPeerId, {
                                reliable: true
                            });
                            
                            // become host if connection fails
                            const hostTimeout = setTimeout(() => {
                                if (!connectionEstablished) {
                                    console.log('Connection timeout - becoming host');
                                    becomeHost();
                                }
                            }, 3000);
                            
                            hostConn.on('open', () => {
                                console.log('Connected to host');
                                connectionEstablished = true;
                                clearTimeout(hostTimeout);
                                connections.set(hostPeerId, hostConn);
                                updatePlayerCount();
                                document.getElementById("log").textContent = `Connected to room: ${roomName}`;
                                
                                // Send join message
                                hostConn.send({ type: 'join', peerId: id });
                            });
                            
                            hostConn.on('data', (data) => {
                                handleIncomingMessage(data, hostPeerId);
                            });
                            
                            hostConn.on('error', (err) => {
                                console.log('Host connection error:', err.type);
                                if (!connectionEstablished) {
                                    clearTimeout(hostTimeout);
                                    becomeHost();
                                }
                            });
                            
                            hostConn.on('close', () => {
                                console.log('Host connection closed');
                                if (!connectionEstablished) {
                                    clearTimeout(hostTimeout);
                                    becomeHost();
                                }
                            });
                        });
                        
                        peer.on('connection', (conn) => {
                            console.log('Incoming connection from:', conn.peer);
                            connections.set(conn.peer, conn);
                            updatePlayerCount();
                            
                            conn.on('open', () => {
                                // Assign a seat to the new player
                                const assignedSeat = assignNextSeat(conn.peer);
                                if (assignedSeat >= 0) {
                                    conn.send({ type: 'seatAssignment', seat: assignedSeat });
                                }
                                // Send current game state to newly connected player
                                if (typeof window._getCurrentGameState === 'function') {
                                    try {
                                        const currentState = window._getCurrentGameState();
                                        conn.send(currentState);
                                        console.log('Sent initial game state to new player');
                                    } catch (e) {
                                        console.warn('Failed to send initial state:', e);
                                    }
                                }
                            });
                            
                            conn.on('data', (data) => {
                                handleIncomingMessage(data, conn.peer);
                                // If host, broadcast to other peers
                                if (isHost) {
                                    broadcastToOthers(data, conn.peer);
                                }
                            });
                            
                            conn.on('close', () => {
                                console.log('Connection closed:', conn.peer);
                                reclaimSeat(conn.peer);
                                connections.delete(conn.peer);
                                updatePlayerCount();
                            });
                        });
                        
                        peer.on('error', (err) => {
                            console.warn('Peer error:', err.type, err);
                            
                            if (err.type === 'unavailable-id') {
                                // If the host ID is already taken...
                                console.log('Host ID taken, rejoining as client');
                                const newId = peerId + '-' + Date.now();
                                isHost = false;
                                try {
                                    peer.destroy();
                                } catch (e) {}
                                peer = new Peer(newId, { debug: 0 });
                            } else if (err.type === 'peer-unavailable') {
                                // If peer doesn't exist
                                console.log('Peer unavailable');
                            } else if (err.type === 'network' || err.type === 'server-error') {
                                console.warn('Network/server error - multiplayer may not work');
                                document.getElementById("log").textContent = "Connection issues - running in offline mode";
                            }
                        });
                        
                    } catch (e) {
                        console.warn("Failed to initialize PeerJS:", e);
                        document.getElementById("log").textContent = "Running in offline mode";
                    }
                    
                    function becomeHost() {
                        if (isHost) {
                            console.log('Already a host, skipping');
                            return;
                        }
                        
                        console.log('Becoming host');
                        isHost = true;
                        
                        try {
                            peer.destroy();
                        } catch (e) {
                            console.warn('Error destroying old peer:', e);
                        }
                        
                        peer = new Peer(hostPeerId, {
                            debug: 0
                        });
                        
                        peer.on('open', (id) => {
                            console.log('I am now the host:', id);
                            mySeat = 0;
                            seatAssignments.clear();
                            seatAssignments.set(hostPeerId, 0);
                            updateMySeatDisplay();
                            document.getElementById("log").textContent = `Hosting room: ${roomName} (You are Player 1)`;
                            updatePlayerCount();
                        });
                        
                        peer.on('connection', (conn) => {
                            console.log('Player connected:', conn.peer);
                            connections.set(conn.peer, conn);
                            updatePlayerCount();
                            
                            conn.on('open', () => {
                                // Assign a seat to new player
                                const assignedSeat = assignNextSeat(conn.peer);
                                if (assignedSeat >= 0) {
                                    conn.send({ type: 'seatAssignment', seat: assignedSeat });
                                    console.log('Assigned seat', assignedSeat, 'to', conn.peer);
                                } else {
                                    conn.send({ type: 'seatAssignment', seat: -1, message: 'Table is full' });
                                    console.log('No seats available for', conn.peer);
                                }
                                // Sync gamestate to player
                                if (typeof window._getCurrentGameState === 'function') {
                                    try {
                                        const currentState = window._getCurrentGameState();
                                        conn.send(currentState);
                                        console.log('Sent initial game state to new player');
                                    } catch (e) {
                                        console.warn('Failed to send initial state:', e);
                                    }
                                }
                            });
                            
                            conn.on('data', (data) => {
                                handleIncomingMessage(data, conn.peer);
                                broadcastToOthers(data, conn.peer);
                            });
                            
                            conn.on('close', () => {
                                console.log('Player disconnected:', conn.peer);
                                reclaimSeat(conn.peer);
                                connections.delete(conn.peer);
                                updatePlayerCount();
                            });
                        });
                        
                        peer.on('error', (err) => {
                            console.warn('Host peer error:', err);
                        });
                    }
                    
                    function updatePlayerCount() {
                        const count = connections.size + 1; // +1 for self
                        document.getElementById("playerCount").textContent = count;
                    }
                    
                    function broadcastToOthers(data, excludePeer) {
                        connections.forEach((conn, peerId) => {
                            if (peerId !== excludePeer) {
                                try {
                                    conn.send(data);
                                } catch (e) {
                                    console.warn('Failed to send to', peerId, e);
                                }
                            }
                        });
                    }
                    
                    function broadcast(data) {
                        connections.forEach((conn) => {
                            try {
                                conn.send(data);
                            } catch (e) {
                                console.warn('Failed to broadcast:', e);
                            }
                        });
                    }

                    // no feedback loops
                    let suppressNetworkActions = false;

                    function emitAction(action, payload = {}) {
                        if (suppressNetworkActions) return;
                        try {
                            broadcast({ type: "action", action, payload });
                        } catch (e) {
                            console.warn("Failed to emit action", action, e);
                        }
                    }
                    
                    function handleIncomingMessage(data, fromPeer) {
                        try {
                            if (data.type === 'join') {
                                console.log('Player joined:', data.peerId);
                                document.getElementById("log").textContent = `Player joined. ${connections.size + 1} players online.`;
                            } else if (data.type === 'gameState') {
                                console.log("Received game state sync", data);
                                // Apply immediately if handler is available, otherwise store
                                if (typeof window._applyGameStateSync === 'function') {
                                    window._applyGameStateSync(data);
                                } else {
                                    window._pendingGameState = data;
                                }
                            } else if (data.type === 'chip') {
                                console.log("Received chip sync", data.chip);
                                if (data.chip) applyChipSync(data.chip);
                            } else if (data.type === 'seatAssignment') {
                                mySeat = data.seat;
                                updateMySeatDisplay();
                                if (mySeat >= 0) {
                                    console.log('Assigned to seat', mySeat);
                                    document.getElementById("log").textContent = `Connected to room: ${roomName} (You are Player ${mySeat + 1})`;
                                } else {
                                    console.log('No seat available:', data.message);
                                    document.getElementById("log").textContent = `Spectating: ${data.message || 'Table full'}`;
                                }
                            } else if (data.type === "action") {
                                applyRemoteAction(data, fromPeer);
                            }
                        } catch (e) {
                            console.warn("Failed to process message:", e);
                        }
                    }

                    function applyChipSync(chipData) {
                        try {
                            if (!chipData) return;
                            spawnChip(chipData.color, chipData.seat, {
                                id: chipData.id,
                                position: chipData.position,
                                skipBroadcast: true,
                            });
                        } catch (e) {
                            console.warn("Failed to apply chip sync", e);
                        }
                    }

                    // scene
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0x062b2c);
                    const camera = new THREE.PerspectiveCamera(
                        45,
                        innerWidth / innerHeight,
                        0.1,
                        1000,

                    camera.position.set(0, 6, 16);

                    const renderer = new THREE.WebGLRenderer({
                        antialias: true,
                    });
                    renderer.setSize(innerWidth, innerHeight);
                    renderer.setPixelRatio(
                        Math.min(window.devicePixelRatio, 2),
                    );
                    renderer.shadowMap.enabled = true;
                    //renderer.outputEncoding = THREE.sRGBEncoding;
                    renderer.outputColorSpace = THREE.SRGBColorSpace;
                    document.body.appendChild(renderer.domElement);

                    const controls = new OrbitControls(
                        camera,
                        renderer.domElement,
                    );
                    if (controls) {
                        controls.enableDamping = true;
                        controls.dampingFactor = 0.08;
                        controls.screenSpacePanning = false;
                        controls.maxPolarAngle = Math.PI / 2.1;
                        // Control distance to prevent frustrum culling
                        controls.maxDistance = 44;
                        // Tabletop view (could be locked after finishing turn)
                        //controls.maxPolarAngle = 0;
                    }

                    // lights (Hemisphere + Directional + Ambient)
                    const hemi = new THREE.HemisphereLight(
                        0xffffff,
                        0x444444,
                        0.8,
                    );
                    hemi.position.set(0, 20, 0);
                    scene.add(hemi);
                    const dir = new THREE.DirectionalLight(0xffffff, 0.7);
                    dir.position.set(5, 10, 7);
                    dir.castShadow = true;
                    dir.shadow.bias = -0.0005;
                    dir.shadow.normalBias = 0.02;
                    scene.add(dir);
                    // small ambient fill light for cards
                    const ambientFill = new THREE.AmbientLight(0xffffff, 0.12);
                    scene.add(ambientFill);

                    // ground plane (playing surface)
                    const gmat = new THREE.MeshStandardMaterial({
                        color: 0x35654d,
                        metalness: 0.1,
                        roughness: 0.9,
                    });
                    const ground = new THREE.Mesh(
                        new THREE.PlaneGeometry(40, 40),
                        gmat,
                    );
                    ground.rotation.x = -Math.PI / 2;
                    ground.position.y = -0.01;
                    ground.receiveShadow = true;
                    scene.add(ground);

                    // deck and card geometry
                    const CARD_W = 2.5;
                    const CARD_H = 3.6;
                    const CARD_T = 0.04;
                    const GROUND_Y = -0.01;
                    const GAP = 0.001;
                    const BASE_DECK_Y = GROUND_Y + GAP;
                    // Audio: listener + positional shuffle sound anchored at deck
                    const listener = new THREE.AudioListener();
                    camera.add(listener);
                    const audioLoader = new THREE.AudioLoader();
                    let shuffleSound = null;
                    const deckAnchor = new THREE.Object3D();
                    deckAnchor.position.set(0, BASE_DECK_Y, 0);
                    scene.add(deckAnchor);
                    shuffleSound = new THREE.PositionalAudio(listener);
                    deckAnchor.add(shuffleSound);
                    // load shuffle wav
                    audioLoader.load(
                        "sfx/shuffle/s1.wav",
                        function (buffer) {
                            try {
                                shuffleSound.setBuffer(buffer);
                                shuffleSound.setRefDistance(2);
                                shuffleSound.setRolloffFactor(1);
                                shuffleSound.setVolume(1.25);

                                console.warn("shuffle audio load failed", e);
                            }
                        },
                        undefined,
                        function (err) {
                            console.warn("shuffle audio load error", err);
                        },
                    );
                    // store original anchor for jittering
                    const _deckAnchorOrig = deckAnchor.position.clone();
                    function playShuffleWithJitter(opts = {}) {
                        const rx = opts.x || 0.18; // lateral jitter radius
                        const rz = opts.z || 0.12; // depth jitter radius
                        const ry = opts.y || 0.02; // small vertical lift
                        if (!shuffleSound) return;
                        // apply small random offset around original anchor
                        deckAnchor.position.set(

                        try {
                            if (shuffleSound.isPlaying) shuffleSound.stop();
                            if (shuffleSound.buffer) shuffleSound.play();
                        } catch (e) {
                            console.warn("shuffle play failed", e);

                        // restore sound anchor
                        const durMs =
                            shuffleSound &&
                            shuffleSound.buffer &&

                                : 800;
                        setTimeout(
                            () => {
                                try {
                                    deckAnchor.position.copy(_deckAnchorOrig);
                                } catch (e) {}
                            },
                            Math.min(durMs + 120, 1500),
                        );
                    }
                    // Load deal sound buffers
                    const dealFiles = [
                        "sfx/deal/d1.wav",
                        "sfx/deal/d2.wav",
                        "sfx/deal/d3.wav",
                        "sfx/deal/d4.wav",
                        "sfx/deal/d5.wav",
                        "sfx/deal/d6.wav",
                    ];
                    const dealBuffers = [];
                    const dealLoadPromises = dealFiles.map(
                        (path) =>
                            new Promise((res) => {
                                audioLoader.load(
                                    path,
                                    (buf) => {
                                        try {
                                            dealBuffers.push(buf);
                                        } catch (e) {}
                                        res(true);
                                    },
                                    undefined,
                                    () => {
                                        res(false);
                                    },
                                );
                            }),
                    );
                    Promise.all(dealLoadPromises)
                        .then(() => {
                            console.log(
                                "deal sounds loaded:",
                                dealBuffers.length,
                            );
                        })
                        .catch(() => {});

                    // Background music playlist
                    const themeFiles = [
                        "sfx/theme/min9.mp3",
                        "sfx/theme/bebop.mp3",
                        "sfx/theme/spulcro.mp3",
                        "sfx/theme/blkwtr.mp3",
                    ];
                    const themeBuffers = [];
                    const themeLoadPromises = themeFiles.map(
                        (path) =>
                            new Promise((res) => {
                                audioLoader.load(
                                    path,
                                    (buf) => {
                                        try {
                                            themeBuffers.push({ path, buf });
                                        } catch (e) {}
                                        res(true);
                                    },
                                    undefined,
                                    (err) => {
                                        console.warn(
                                            "theme load failed",
                                            path,
                                            err,
                                        );
                                        res(false);
                                    },
                                );
                            }),
                    );

                    // single non-positional audio attached to listener
                    const bgAudio = new THREE.Audio(listener);
                    let _currentThemeIndex = -1;
                    let _bgPlaying = false;
                    const musicVolumeSliderEl =
                        document.getElementById("musicVolume");
                    const FIXED_GAME_SPEED = 3;
                    const DEAL_SPEED_MULTIPLIER = 1.00;
                    const DEAL_CARD_DELAY_MS = 70;
                    const DEAL_PHASE_DELAY_MS = 160;

                    function clampVolume(value) {
                        if (!Number.isFinite(value)) return 0.55;
                        return Math.min(1, Math.max(0, value));
                    }

                    let backgroundMusicVolume = clampVolume(
                        parseFloat(musicVolumeSliderEl?.value ?? "0.55"),
                    );

                    function applyBackgroundMusicVolume(value) {
                        backgroundMusicVolume = clampVolume(value);
                        try {
                            bgAudio.setVolume(backgroundMusicVolume);
                        } catch (e) {}
                    }

                    if (musicVolumeSliderEl) {
                        const syncMusicVolume = (ev) => {
                            const raw =
                                ev && ev.target
                                    ? parseFloat(ev.target.value)
                                    : parseFloat(musicVolumeSliderEl.value);
                            applyBackgroundMusicVolume(raw);
                        };
                        musicVolumeSliderEl.addEventListener("input", syncMusicVolume);
                        musicVolumeSliderEl.addEventListener("change", syncMusicVolume);
                    }

                    function _pickNextThemeIndex() {
                        if (themeBuffers.length === 0) return -1;
                        if (themeBuffers.length === 1) return 0;
                        let i = Math.floor(Math.random() * themeBuffers.length);
                        if (i === _currentThemeIndex)
                            i = (i + 1) % themeBuffers.length;
                        return i;
                    }

                    function startBackgroundMusic(opts = {}) {
                        if (_bgPlaying) return;
                        if (!themeBuffers || themeBuffers.length === 0) return;
                        _bgPlaying = true;
                        function playNext() {
                            const idx = _pickNextThemeIndex();
                            if (idx < 0) return;
                            _currentThemeIndex = idx;
                            const entry = themeBuffers[idx];
                            try {
                                bgAudio.stop();
                            } catch (e) {}
                            try {
                                bgAudio.setBuffer(entry.buf);
                                bgAudio.setLoop(false);
                                bgAudio.setVolume(backgroundMusicVolume);
                                try {
                                    bgAudio.playbackRate =
                                        typeof opts.playbackRate === "number"
                                            ? opts.playbackRate
                                            : 1;
                                } catch (e) {}
                                bgAudio.play();
                                if (
                                    bgAudio.source &&
                                    typeof bgAudio.source.onended === "function"
                                ) {
                                    bgAudio.source.onended = () => {
                                        if (_bgPlaying)
                                            setTimeout(
                                                playNext,
                                                opts.gapMs || 200,
                                            );
                                    };
                                } else {
                                    const dur =
                                        entry.buf && entry.buf.duration
                                            ? entry.buf.duration * 1000
                                            : 30000;
                                    setTimeout(
                                        () => {
                                            if (_bgPlaying) playNext();
                                        },
                                        dur + (opts.gapMs || 200),
                                    );
                                }
                            } catch (e) {
                                console.warn("bgAudio play failed", e);
                            }
                        }
                        playNext();
                    }

                    function stopBackgroundMusic() {
                        _bgPlaying = false;
                        try {
                            bgAudio.stop();
                        } catch (e) {}
                    }

                    // start on first user gesture
                    Promise.all(themeLoadPromises)
                        .then(() => {
                            console.log(
                                "theme tracks loaded:",
                                themeBuffers.length,
                            );
                            const onFirst = function () {
                                try {
                                    startBackgroundMusic();
                                } catch (e) {}
                                window.removeEventListener(
                                    "pointerdown",
                                    onFirst,
                                );
                            };
                            window.addEventListener("pointerdown", onFirst, {
                                once: true,
                            });
                        })
                        .catch(() => {});

                    // Play a random deal sound at pos
                    function playDealAt(pos, opts = {}) {
                        if (!dealBuffers || dealBuffers.length === 0) return;
                        const buf =
                            dealBuffers[
                                Math.floor(Math.random() * dealBuffers.length)
                            ];
                        if (!buf) return;
                        // sound follows the moving card
                        let attachedToMesh = null;
                        let anchor;
                        if (
                            pos &&
                            typeof pos === "object" &&
                            (pos.isMesh || pos.isObject3D || pos.add)
                        ) {
                            anchor = pos;
                            attachedToMesh = pos;
                        } else {
                            anchor = new THREE.Object3D();
                            anchor.position.copy(
                                pos || new THREE.Vector3(0, BASE_DECK_Y, 0),
                            );
                            scene.add(anchor);
                        }
                        const p = new THREE.PositionalAudio(listener);
                        anchor.add(p);
                        try {
                            p.setBuffer(buf);
                            p.setRefDistance(opts.refDistance || 1.2);
                            p.setRolloffFactor(opts.rolloff || 1);
                            p.setVolume(
                                typeof opts.volume === "number"
                                    ? opts.volume
                                    : 1.2,
                            );
                            // playbackRate override
                            try {
                                p.playbackRate =
                                    typeof opts.playbackRate === "number"
                                        ? opts.playbackRate
                                        : 1 + (Math.random() - 0.5) * 0.12;
                            } catch (e) {}
                            p.setLoop(false);
                            p.play();
                        } catch (e) {
                            console.warn("playDealAt failed", e);
                        }
                        const durMs =
                            buf && buf.duration ? buf.duration * 1000 : 600;

                        const cleanup = () => {
                            try {
                                if (p && p.isPlaying)
                                    try {
                                        p.stop();
                                    } catch (e) {}
                                if (p && p.parent) p.parent.remove(p);
                                // remove temporary anchor only here
                                if (!attachedToMesh && anchor && anchor.parent)
                                    anchor.parent.remove(anchor);
                            } catch (e) {}
                        };

                        // cleanup
                        try {
                            if (
                                p &&
                                p.source &&
                                typeof p.source.onended === "function"
                            ) {
                                p.source.onended = cleanup;
                            } else {
                                setTimeout(
                                    cleanup,
                                    Math.min(durMs + 300, 3000),
                                );
                            }
                        } catch (e) {
                            setTimeout(cleanup, Math.min(durMs + 300, 3000));
                        }
                    }
                    // increase per-card stacking offset to avoid z-fighting when cards touch
                    const STACK_OFFSET = 0.008;
                    // small dealt card lift so textures don't merge
                    const DEAL_LAYER_RAISE = 0.01;
                    // larger bias to separate front/back polygon surfaces of each card
                    const FACE_BIAS = 0.0025;
                    // horizontal spread for dealer upcard/hole so they are visually separated
                    const DEALER_SPREAD = 2.8;
                    // card texture fallback 
                    function placeholderTexture(id) {
                        try {
                            const size = 64;
                            const canvas = document.createElement("canvas");
                            canvas.width = canvas.height = size;
                            const ctx = canvas.getContext("2d");
                            ctx.fillStyle = "#ffffff";
                            ctx.fillRect(0, 0, size, size);
                            ctx.fillStyle = "#000000";
                            ctx.font = "12px sans-serif";
                            ctx.textAlign = "center";
                            ctx.textBaseline = "middle";
                            ctx.fillText(
                                id ? String(id).slice(0, 3) : "card",
                                size / 2,
                                size / 2,
                            );
                            const tex = new THREE.CanvasTexture(canvas);
                            tex.flipY = true;
                            //tex.encoding = THREE.sRGBEncoding;
                            tex.SRGBColorSpace = THREE.SRGBColorSpace;
                            tex.needsUpdate = true;
                            return tex;
                        } catch (e) {
                            return new THREE.Texture();
                        }
                    }

                    function createCardMesh(frontTexture, backTexture) {
                        // create geometry with its origin at the bottom of the card
                        const geom = new THREE.BoxGeometry(
                            CARD_W,
                            CARD_H,
                            CARD_T,
                        );
                        geom.translate(0, CARD_H / 2, 0);
                        // Tight card stacking
                        const pos = geom.attributes.position.array;
                        const nrm = geom.attributes.normal.array;
                        const vcount = geom.attributes.position.count;
                        for (let i = 0; i < vcount; i++) {
                            const nz = nrm[i * 3 + 2];
                            if (nz > 0.9) {
                                pos[i * 3 + 2] += FACE_BIAS;
                            } else if (nz < -0.9) {
                                pos[i * 3 + 2] -= FACE_BIAS;
                            }
                        }
                        geom.attributes.position.needsUpdate = true;
                        geom.computeVertexNormals();
                        // prevent thin edge artifacts
                        const sideMat = new THREE.MeshStandardMaterial({
                            color: 0x111111,
                            metalness: 0.1,
                            roughness: 0.7,
                            polygonOffset: true,
                            polygonOffsetFactor: 0.5,
                            polygonOffsetUnits: 1,
                        });
                        // face materials: use depth buffer and stronger polygonOffset
                        // Keep alphaTest slightly higher to reject thin semi-transparent pixels at edges.
                        // Reduced polygon offset and alphaTest to avoid occlusion
                        const faceMaterialOpts = {
                            roughness: 0.6,
                            polygonOffset: true,
                            polygonOffsetFactor: 0.5, // much smaller offset to avoid pushing fragments behind other geometry
                            polygonOffsetUnits: 1,
                            alphaTest: 0.01, // lower alpha reject so thin edges don't vanish at oblique sampling
                            depthWrite: true,
                            depthTest: true,
                            transparent: false,
                            side: THREE.DoubleSide,
                        };
                        const frontMat = new THREE.MeshStandardMaterial(
                            Object.assign(
                                { map: frontTexture },
                                faceMaterialOpts,
                            ),
                        );
                        const backMat = new THREE.MeshStandardMaterial(
                            Object.assign(
                                { map: backTexture },
                                faceMaterialOpts,
                            ),
                        );
                        // BoxGeometry expects 6 materials: +X, -X, +Y, -Y, +Z, -Z
                        const materials = [
                            sideMat,
                            sideMat,
                            sideMat,
                            sideMat,
                            frontMat,
                            backMat,
                        ];
                        const mesh = new THREE.Mesh(geom, materials);
                        // prevent darkening/self shadowing
                        mesh.castShadow = true;
                        mesh.receiveShadow = false;
                        return mesh;
                    }

                    // load textures for all cards
                    const suits = ["spades", "hearts", "diamonds", "clubs"];
                    const ranks = [
                        "ace",
                        "2",
                        "3",
                        "4",
                        "5",
                        "6",
                        "7",
                        "8",
                        "9",
                        "10",
                        "jack",
                        "queen",
                        "king",
                    ];
                    const deckIds = [];
                    for (const s of suits)
                        for (const r of ranks)
                            deckIds.push({ suit: s, rank: r, id: `${s}-${r}` });

                    let deck = deckIds.slice();
                    let textures = {}; // id -> Texture
                    let backTexture = null;

                    const loader = new THREE.TextureLoader();

                    // chip creation
                    const CHIP_DIAMETER = 1.2;
                    const CHIP_THICKNESS = 0.14;
                    const chipTextureCache = {};

                    function colorToHex(c) {
                        switch (String(c).toLowerCase()) {
                            case "black":
                                return 0x0b0b0b;
                            case "blue":
                                return 0x1b6eff;
                            case "green":
                                return 0x1bbf5a;
                            case "red":
                                return 0xd73b3b;
                            default:
                                return 0x000000;
                        }
                    }
                    function colorToCss(c) {
                        switch (String(c).toLowerCase()) {
                            case "black":
                                return "#0b0b0b";
                            case "blue":
                                return "#1b6eff";
                            case "green":
                                return "#1bbf5a";
                            case "red":
                                return "#d73b3b";
                            default:
                                return "#000000";
                        }
                    }

                    // create a chip top texture
                    function getChipTexture(color, size = 1024) {
                        if (chipTextureCache[color])
                            return chipTextureCache[color];
                        const canvas = document.createElement("canvas");
                        canvas.width = canvas.height = size;
                        const ctx = canvas.getContext("2d");
                        ctx.imageSmoothingEnabled = false;
                        const cx = size / 2,
                            cy = size / 2;
                        const R = Math.round(size * 0.45);

                        // build a small 2x2 checker tile
                        const tileS = Math.max(4, Math.round(size * 0.012));
                        const tile = document.createElement("canvas");
                        tile.width = tile.height = tileS * 2;
                        const t = tile.getContext("2d");
                        t.imageSmoothingEnabled = false;
                        for (let y = 0; y < 2; y++) {
                            for (let x = 0; x < 2; x++) {
                                t.fillStyle =
                                    (x + y) % 2 === 0
                                        ? "#ffffff"
                                        : colorToCss(color);
                                t.fillRect(x * tileS, y * tileS, tileS, tileS);
                            }
                        }
                        const pattern = ctx.createPattern(tile, "repeat");

                        // Align the checker grid
                        const period = tile.width;
                        const offsetX = (cx + R) % period;
                        const offsetY = cy % period;

                        if (pattern.setTransform) {
                            // shift the pattern's coordinate space to align
                            const m = new DOMMatrix();
                            m.translateSelf(-offsetX, -offsetY);
                            pattern.setTransform(m);
                            // paint pattern then mask
                            ctx.fillStyle = pattern;
                            ctx.fillRect(0, 0, size, size);
                        } else {
                            // pattern fallback translation
                            ctx.save();
                            ctx.translate(-offsetX, -offsetY);
                            ctx.fillStyle = pattern;
                            ctx.fillRect(
                                offsetX,
                                offsetY,
                                size + period,
                                size + period,
                            );
                            ctx.restore();
                        }

                        // create texture and force nearest filtering
                        const tex = new THREE.CanvasTexture(canvas);
                        tex.flipY = false;
                        try {
                            //tex.encoding = THREE.sRGBEncoding;
                            tex.colorSpace = THREE.SRGBColorSpace;
                        } catch (e) {}
                        try {
                            tex.anisotropy =
                                renderer.capabilities.getMaxAnisotropy();
                        } catch (e) {}
                        try {
                            tex.minFilter = THREE.NearestFilter;
                            tex.magFilter = THREE.NearestFilter;
                            tex.generateMipmaps = false;
                        } catch (e) {}
                        chipTextureCache[color] = tex;

                        // clear center then draw image
                        const path = `chips/${color}.webp`;
                        loader.load(
                            path,
                            (loaded) => {
                                try {
                                    const img = loaded.image || loaded;
                                    // inner radius slightly smaller than pattern inner
                                    const innerFactor = 0.86;
                                    const innerR = Math.max(2,Math.round(R * innerFactor),);
                                    const drawR = Math.max(4,Math.round(innerR - Math.max(2,Math.round(size * 0.01),),),);
                                    // no fringing artifacts
                                    ctx.save();
                                    ctx.globalCompositeOperation ="destination-out";
                                    ctx.beginPath();
                                    ctx.arc(cx, cy, drawR + 3, 0, Math.PI * 2);
                                    ctx.fill();
                                    ctx.globalCompositeOperation ="source-over";
                                    ctx.restore();
                                    ctx.drawImage(img,cx - drawR, cy - drawR, drawR * 2, drawR * 2,);
                                    tex.needsUpdate = true;
                                } catch (e) {
                                    console.warn("Failed to composite chip image", path, e ,);
                                }
                            }, undefined,
                            () => {
                                /* keep pattern-only chip if no image */
                            },
                        );

                        return tex;
                    }

                    // create a side texture composed of strict square checks
                    function getChipSideTexture(
                        color,
                        width = 1024,
                        height = 128,
                        checks = 64,
                    ) {
                        const key = `side_${color}`;
                        if (chipTextureCache[key]) return chipTextureCache[key];
                        // tile size (width)
                        const sq = Math.max(4, Math.round(width / checks));
                        const tile = document.createElement("canvas");
                        tile.width = sq * 2;
                        tile.height = sq * 2;
                        const t = tile.getContext("2d");
                        t.imageSmoothingEnabled = false;
                        // 2x2 checker in tile
                        for (let y = 0; y < 2; y++) {
                            for (let x = 0; x < 2; x++) {
                                t.fillStyle =
                                    (x + y) % 2 === 0
                                        ? "#ffffff"
                                        : colorToCss(color);
                                t.fillRect(x * sq, y * sq, sq, sq);
                            }
                        }
                        const sideCanvas = document.createElement("canvas");
                        sideCanvas.width = width;
                        sideCanvas.height = height;
                        const g = sideCanvas.getContext("2d");
                        g.imageSmoothingEnabled = false;
                        const pattern = g.createPattern(tile, "repeat");
                        g.fillStyle = pattern;
                        g.fillRect(0, 0, width, height);

                        const sideTex = new THREE.CanvasTexture(sideCanvas);
                        sideTex.wrapS = THREE.RepeatWrapping;
                        sideTex.wrapT = THREE.ClampToEdgeWrapping;
                        sideTex.repeat.set(1, 1);
                        try {
                            //sideTex.encoding = THREE.sRGBEncoding;
                            sideTex.colorSpace = THREE.SRGBColorSpace;
                        } catch (e) {}
                        try {
                            sideTex.anisotropy =
                                renderer.capabilities.getMaxAnisotropy();
                        } catch (e) {}
                        // avoid linear filtering
                        try {
                            sideTex.minFilter = THREE.NearestFilter;
                            sideTex.magFilter = THREE.NearestFilter;
                            sideTex.generateMipmaps = false;
                        } catch (e) {}
                        chipTextureCache[key] = sideTex;
                        return sideTex;
                    }

                    function createChipMesh(color) {
                        const geom = new THREE.CylinderGeometry(
                            CHIP_DIAMETER / 2,
                            CHIP_DIAMETER / 2,
                            CHIP_THICKNESS,
                            64,
                        );
                        // translate so origin is at bottom of chip
                        geom.translate(0, CHIP_THICKNESS / 2, 0);
                        // top/bottom texture
                        const topTex = getChipTexture(color);
                        const botTex = topTex;
                        // side texture
                        const sideTex = getChipSideTexture(color);
                        // materials
                        const sideMat = new THREE.MeshStandardMaterial({
                            map: sideTex,
                            metalness: 0.15,
                            roughness: 0.6,
                        });
                        const topMat = new THREE.MeshStandardMaterial({
                            map: topTex,
                            side: THREE.DoubleSide,
                            roughness: 0.45,
                            metalness: 0.25,
                        });
                        const botMat = new THREE.MeshStandardMaterial({
                            map: botTex,
                            side: THREE.DoubleSide,
                            roughness: 0.45,
                            metalness: 0.25,
                        });
                        const mesh = new THREE.Mesh(geom, [
                            sideMat,
                            topMat,
                            botMat,
                        ]);
                        mesh.castShadow = true;
                        mesh.receiveShadow = false;
                        // store normalized chip color
