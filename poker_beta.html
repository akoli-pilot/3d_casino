                            backTex.magFilter = THREE.LinearFilter;
                            frontTex.generateMipmaps = false;
                            backTex.generateMipmaps = false;
                        } catch (e) {}
                        frontTex.needsUpdate = true;
                        backTex.needsUpdate = true;
                        const mesh = createCardMesh(frontTex, backTex);
                        // origin == card bottom
                        mesh.userData.cardId = cardId;
                        scene.add(mesh);
                        // store cloned maps for later disposal
                        const obj = {
                            mesh: mesh,
                            id: cardId,
                            faceUp: false,
                            anim: null,
                            _maps: [frontTex, backTex],
                        };
                        
                        return obj;
                    }

                    function layoutDeckAt(x = 0, y = undefined, z = 0) {
                        if (y === undefined) y = BASE_DECK_Y;
                        // remove & dispose existing card meshes
                        cardObjects.forEach((o) => {
                            disposeCard(o);
                        });
                        cardObjects.length = 0;
                        for (let i = 0; i < deck.length; i++) {
                            const id = deck[i].id;
                            const obj = makeCardObject(id);
                            // per-card Y offset avoids z-fighting
                            obj.mesh.position.set(
                                x,
                                y + CARD_T / 2 + i * STACK_OFFSET,
                                z,
                            );
                            // ensure cards higher in the stack draw after lower ones
                            obj.mesh.renderOrder = i;
                            // bias polygonOffsetUnits per-stack to avoid z-fighting
                            try {
                                const mats = Array.isArray(obj.mesh.material)
                                    ? obj.mesh.material
                                    : [obj.mesh.material];
                                const baseUnits = 1.0;
                                const unitStep = 0.6; // increase per-card bias
                                // bias increases with i
                                mats.forEach((m) => {
                                    try {
                                        if (m && m.polygonOffset) {
                                            m.polygonOffsetUnits =
                                                baseUnits + i * unitStep;
                                            m.polygonOffsetFactor = 0.5;
                                        }
                                    } catch (e) {}
                                });
                            } catch (e) {}
                            // store a stable stack index
                            obj.mesh.userData.stackIndex = i;
                            const mats = Array.isArray(obj.mesh.material)
                                ? obj.mesh.material
                                : [obj.mesh.material];
                            mats.forEach((m) => {
                                try {
                                    m.depthWrite = true;
                                } catch (e) {}
                            });
                            // facedown cards
                            obj.mesh.rotation.set(-Math.PI / 2, Math.PI, 0);
                            obj.faceUp = false;
                            obj.mesh.scale.set(1, 1, 1);
                            cardObjects.push(obj);
                        }
                    }

                    function tweenTo(
                        obj,
                        props,
                        duration = 600,
                        easing = (t) => --t * t * t + 1,
                        onComplete,
                    ) {
                        const startVals = {},
                            deltas = {};
                        const mesh = obj.mesh;
                        for (const k in props) {
                            if (
                                mesh.position &&
                                mesh.position[k] !== undefined
                            ) {
                                startVals[k] = mesh.position[k];
                            } else if (
                                mesh.rotation &&
                                mesh.rotation[k] !== undefined
                            ) {
                                startVals[k] = mesh.rotation[k];
                            } else if (
                                mesh.scale &&
                                mesh.scale.x !== undefined
                            ) {
                                startVals[k] = mesh.scale.x;
                            } else {
                                startVals[k] = 0;
                            }
                            deltas[k] = props[k] - startVals[k];
                        }
                        const t0 = performance.now();
                        return new Promise((resolve) => {
                            (function tick(now) {
                                const p = Math.min(1, (now - t0) / duration);
                                const e = easing(p);
                                for (const k in props) {
                                    if (
                                        mesh.position &&
                                        mesh.position[k] !== undefined
                                    )
                                        mesh.position[k] =
                                            startVals[k] + deltas[k] * e;
                                    else if (
                                        mesh.rotation &&
                                        mesh.rotation[k] !== undefined
                                    )
                                        mesh.rotation[k] =
                                            startVals[k] + deltas[k] * e;
                                    else if (
                                        mesh.scale &&
                                        mesh.scale.x !== undefined
                                    )
                                        mesh.scale.setScalar(
                                            startVals[k] + deltas[k] * e,
                                        );
                                }
                                if (p < 1) requestAnimationFrame(tick);
                                else {
                                    if (onComplete) onComplete();
                                    resolve();
                                }
                            })(performance.now());
                        });
                    }

                    function tweenRotationToEuler(
                        mesh,
                        targetEuler,
                        duration = 400,
                        easing = (t) => t,
                    ) {
                        // ensure Euler order is explicit
                        targetEuler = new THREE.Euler(
                            targetEuler.x,
                            targetEuler.y,
                            targetEuler.z,
                            targetEuler.order || "XYZ",
                        );
                        const targetQ = new THREE.Quaternion().setFromEuler(
                            targetEuler,
                        );
                        const startQ = mesh.quaternion.clone();
                        const t0 = performance.now();
                        return new Promise((resolve) => {
                            (function tick(now) {
                                const p = Math.min(1, (now - t0) / duration);
                                const e = easing(p);
                                // use instance slerp (Spherical Linear Interpolation)
                                mesh.quaternion.copy(startQ).slerp(targetQ, e);
                                if (p < 1) requestAnimationFrame(tick);
                                else {
                                    // snap exactly to target
                                    mesh.quaternion.copy(targetQ);
                                    mesh.rotation.setFromQuaternion(
                                        mesh.quaternion,
                                        "XYZ",
                                    );
                                    resolve();
                                }
                            })(performance.now());
                        });
                    }

                    function createSeededRandom(seedInput) {
                        let state = (Number(seedInput) || 1) >>> 0;
                        if (state === 0) state = 1;
                        return function nextRandom() {
                            state = (state * 1664525 + 1013904223) >>> 0;
                            return state / 4294967296;
                        };
                    }

                    async function visualShuffle(opts = {}) {
                        const deckOrder = opts.deckOrder;
                        const startAt = Number(opts.startAt) || 0;
                        const seed = Number(opts.seed) || Date.now();
                        const skipBroadcast =
                            opts.skipBroadcast || suppressNetworkActions;
                        const duration = 600 / FIXED_GAME_SPEED;

                        if (startAt > 0) {
                            const delay = startAt - Date.now();
                            if (delay > 0) await wait(delay);
                        }

                        try {
                            playShuffleWithJitter();
                        } catch (e) {
                            console.warn("shuffle jitter play failed", e);
                        }

                        const rand = createSeededRandom(seed);
                        // scatter effect
                        cardObjects.forEach((o, i) => {
                            const tx = (rand() - 0.5) * 8;
                            // ensure scatter Y stays above the ground using BASE_DECK_Y
                            const ty = BASE_DECK_Y + 0.2 + rand() * 2;
                            const tz = (rand() - 0.5) * 6;
                            tweenTo(o, { x: tx, y: ty, z: tz }, duration);
                            o.mesh.rotation.y = rand() * Math.PI * 2;
                        });
                        await wait(duration + 80);
                        if (deckOrder && Array.isArray(deckOrder)) {
                            const mapped = deckOrder
                                .map((id) => deckIds.find((d) => d.id === id))
                                .filter(Boolean);
                            if (mapped.length) deck = mapped;
                        } else {
                            shuffleArray(deck);
                        }
                        //layoutDeckAt(0, 0.5, 0);
                        layoutDeckAt(0, BASE_DECK_Y, 4);
                        if (!skipBroadcast) {
                            emitAction("shuffle", {
                                deckOrder: deck.map((d) => d.id),
                                startAt,
                                seed,
                            });
                        }
                    }

                    function computePlayerPositions(n, opts = {}) {
                        const arcDeg =
                            opts.arcDeg !== undefined ? opts.arcDeg : 180; // semicircle
                        const radius =
                            opts.radius !== undefined ? opts.radius : 11.5;
                        const innerBoost =
                            opts.innerBoost !== undefined
                                ? opts.innerBoost
                                : 1.3;
                        const center =
                            opts.center !== undefined
                                ? opts.center
                                : new THREE.Vector3(0, BASE_DECK_Y, 0);
                        const positions = [];
                        if (n <= 1) {
                            positions.push(
                                new THREE.Vector3(
                                    center.x,
                                    BASE_DECK_Y,
                                    center.z - radius,
                                ),
                            );
                            return positions;
                        }
                        const startDeg = -arcDeg / 2;
                        const step = arcDeg / (n - 1);
                        // identify inner indices for even n
                        const innerLeft = Math.floor(n / 2) - 1;
                        const innerRight = Math.floor(n / 2);
                        for (let i = 0; i < n; i++) {
                            const deg = startDeg + i * step;
                            const rad = (deg * Math.PI) / 180;
                            // boost inner seats to increase separation
                            const useRadius =
                                i === innerLeft || i === innerRight
                                    ? radius * innerBoost
                                    : radius;
                            const x = center.x + Math.sin(rad) * useRadius;
                            const z = center.z - Math.cos(rad) * useRadius; // away from dealer
                            positions.push(
                                new THREE.Vector3(x, BASE_DECK_Y, z),
                            );
                        }
                        return positions;
                    }

                    function computeDealerSpacing(count) {
                        // small margin to ensure cards don't touch when fanned.
                        const base = Math.max(CARD_W + 0.12, 1.0);
                        const perCard = 0.45;
                        // if camera is far, increase spacing a bit
                        const camFactor =
                            camera && camera.position
                                ? 1 +
                                  Math.max(
                                      0,
                                      camera.position.distanceTo(
                                          new THREE.Vector3(),
                                      ) - 10,
                                  ) *
                                      0.02
                                : 1;
                        // avoid exploding spacing
                        const spacing = Math.min(
                            3.2,
                            (base + Math.max(0, count - 1) * perCard) *
                                camFactor,
                        );
                        return spacing;
                    }

                    // 4 player poker
                    const playerPositions = computePlayerPositions(4, {
                        arcDeg: 270,
                        radius: 10,
                        center: new THREE.Vector3(0, BASE_DECK_Y, 0),
                        innerBoost: 1.25,
                    });

                    // out seats
                    if (playerPositions.length === 4) {
                        const _center = new THREE.Vector3(0, BASE_DECK_Y, 0);
                        const EXTRA_OUTER_OFFSET = CARD_W * 0.9; // tweakable multiplier
                        [0, 3].forEach((i) => {
                            const dir = playerPositions[i].clone().sub(_center);
                            dir.y = 0;
                            if (dir.length() > 1e-4) dir.normalize();
                            playerPositions[i].addScaledVector(
                                dir,
                                EXTRA_OUTER_OFFSET,
                            );
                        });
                    }

                    // community cards position
                    const communityPosition = new THREE.Vector3(
                        0,
                        BASE_DECK_Y,
                        0,
                    );
                    const dealerPosition = communityPosition;
                    // pot position
                    const potPosition = new THREE.Vector3(0, BASE_DECK_Y, -4.4);
                    // raised card burn visual anchor near the dealer side
                    const burnEffectPosition = new THREE.Vector3(
                        -1.1,
                        BASE_DECK_Y + 1.55,
                        1.4,
                    );

                    // seat tracking for dealing sequence
                    const seatCount = playerPositions.length;
                    let nextSeatIndex = 0;
                    // Odds UI elements repurposed
                    const oddsContainer =
                        document.getElementById("oddsContainer");
                    const oddsEls = [];
                    function createOddsUI() {
                        oddsContainer.innerHTML = "";
                        oddsEls.length = 0;
                        for (let s = 0; s < seatCount; s++) {
                            const el = document.createElement("div");
                            el.className = "oddsLabel";
                            el.textContent = "";
                            oddsContainer.appendChild(el);
                            oddsEls.push(el);
                        }
                    }

                    // Per player action button positioning
                    function updatePlayerActionPositions() {
                        for (
                            let s = 0;
                            s < playerActionContainers.length;
                            s++
                        ) {
                            const playerBtns = playerActionContainers[s];
                            if (!playerBtns || !playerBtns.container) continue;

                            // Get player hand cards to find center position
                            const hand = getSeatCards(s);
                            if (!hand || hand.length === 0) {
                                // Use player position fallback
                                const pos = playerPositions[s];
                                if (pos) {
                                    const screen = worldToScreenPosition(pos);
                                    playerBtns.container.style.left = `${screen.x}px`;
                                    playerBtns.container.style.top = `${screen.y - 80}px`;
                                    playerBtns.container.style.transform =
                                        "translateX(-50%)";
                                }
                                continue;
                            }

                            // Calculate center of hand
                            let sumX = 0,
                                sumZ = 0;
                            hand.forEach((c) => {
                                if (c.mesh && c.mesh.position) {
                                    sumX += c.mesh.position.x;
                                    sumZ += c.mesh.position.z;
                                }
                            });
                            const centerPos = new THREE.Vector3(
                                sumX / hand.length,
                                BASE_DECK_Y + 1.5,
                                sumZ / hand.length,
                            );
                            const screen = worldToScreenPosition(centerPos);

                            playerBtns.container.style.left = `${screen.x}px`;
                            playerBtns.container.style.top = `${screen.y}px`;
                            playerBtns.container.style.transform =
                                "translateX(-50%)";
                        }
                    }

                    // shuffle array in-place (Fisher-Yates)
                    function shuffleInPlace(a) {
                        for (let i = a.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            const t = a[i];
                            a[i] = a[j];
                            a[j] = t;
                        }
                    }

                    // Display current hand evaluation
                    function getSeatCards(seat) {
                        return dealtCards.filter((c) => c.seat === seat);
                    }

                    function updateOddsUI() {
                        // card eval poker
                        if (!oddsEls.length) createOddsUI();
                        for (let s = 0; s < seatCount; s++) {
                            try {
                                const el = oddsEls[s];
                                if (!el) continue;
                                const pos = playerPositions[s];
                                if (!pos) continue;
                                const screen = worldToScreenPosition(pos);
                                el.style.left = screen.x + "px";
                                el.style.top = screen.y + 60 + "px";

                                const seatLabel = s === mySeat ? '(You) ' : `P${s + 1} `;
                                const playerCards = getSeatCards(s);
                                const allCards = [
                                    ...playerCards,
                                    ...communityCards,
                                ];
                                if (allCards.length >= 5) {
                                    const handEval =
                                        evaluatePokerHand(allCards);
                                    el.textContent =
                                        seatLabel + (handEval.desc || "Evaluating...");
                                } else {
                                    el.textContent =
                                        playerCards.length > 0
                                            ? seatLabel + "Waiting for flop..."
                                            : "";
                                }
                            } catch (e) {}
                        }
                        if (waitingForPlayer && !handComplete) {
                            scheduleActionRecommendation(currentPlayerSeat);
                        }
                        updatePlayerActionPositions();
                    }

                    function worldToScreenPosition(vec) {
                        const p = vec.clone().project(camera);
                        return {
                            x: (p.x * 0.5 + 0.5) * innerWidth,
                            y: (-p.y * 0.5 + 0.5) * innerHeight,
                        };
                    }

                    async function dealPokerHand(opts = {}) {
                        const duration =
                            450 / (FIXED_GAME_SPEED * DEAL_SPEED_MULTIPLIER);
                        const skipBroadcast =
                            opts.skipBroadcast || suppressNetworkActions;
                        const requestedStartAt = Number(opts.startAt) || 0;
                        const startAt =
                            requestedStartAt > 0
                                ? requestedStartAt
                                : !skipBroadcast
                                  ? Date.now() + 320
                                  : 0;
                        const providedDeck =
                            opts.deckOrder && Array.isArray(opts.deckOrder)
                                ? opts.deckOrder
                                : null;
                        if (typeof opts.dealerSeat === "number")
                            dealerSeat = opts.dealerSeat;
                        const deckOrderToUse = providedDeck
                            ? providedDeck.slice()
                            : deck.map((d) => d.id);
                        if (providedDeck) {
                            const mapped = providedDeck
                                .map((id) => deckIds.find((d) => d.id === id))
                                .filter(Boolean);
                            if (mapped.length) deck = mapped;
                        }

                        if (!skipBroadcast) {
                            emitAction("deal", {
                                deckOrder: deckOrderToUse,
                                dealerSeat,
                                startAt,
                            });
                        }

                        if (startAt > 0) {
                            const delay = startAt - Date.now();
                            if (delay > 0) await wait(delay);
                        }

                        // Reset game state
                        handComplete = false;
                        dealtCards.length = 0;
                        communityCards.length = 0;
                        resetBurnEffects();
                        activePlayers = [0, 1, 2, 3];
                        gamePhase = "preflop";
                        currentPlayerIndex = 0;
                        playersActedThisRound.clear();
                        lastRaiserSeat = -1;
                        currentBet = 0;
                        recommendationRevision++;
                        lastRecommendationKey = "";
                        lastRecommendationResult = null;

                        try {
                            document.getElementById("log").textContent =
                                `Dealing Texas Hold'em... (Player ${dealerSeat + 1} is the Dealer)`;
                        } catch (e) {}

                            await postBlinds({ skipBroadcast });

                        // deal hole cards
                        for (let cardNum = 0; cardNum < 2; cardNum++) {
                            for (let seat = 0; seat < 4; seat++) {
                                const pair = safePopCardMeshAndMeta();
                                if (!pair) continue;
                                const o = pair.meshObj;
                                if (!o) continue;

                                const pos = playerPositions[seat].clone();
                                pos.y = BASE_DECK_Y;
                                // offset cards evenly apart
                                pos.x += (cardNum - 0.5) * CARD_W * 1.1;

                                o.seat = seat;
                                o._seatIndex = cardNum;

                                // deck 2 player (face down)
                                const targetEuler = new THREE.Euler(
                                    -Math.PI / 2,
                                    Math.PI,
                                    0,
                                    "XYZ",
                                );
                                const finalY =
                                    BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;

                                await Promise.all([
                                    tweenTo(
                                        o,
                                        { x: pos.x, y: finalY, z: pos.z },
                                        duration,
                                        (t) => 1 - Math.pow(1 - t, 3),
                                    ),
                                    tweenRotationToEuler(
                                        o.mesh,
                                        targetEuler,
                                        duration,
                                    ),
                                ]);

                                o.mesh.position.set(pos.x, finalY, pos.z);
                                o.mesh.quaternion.setFromEuler(targetEuler);
                                o.faceUp = false;
                                o._baseOrigPosition = pos.clone();
                                o.origPosition = o._baseOrigPosition.clone();
                                o.origPosition.y = finalY;
                                o.origQuaternion = o.mesh.quaternion.clone();

                                try {
                                    playDealAt(o.mesh);
                                } catch (e) {}
                                dealtCards.push(o);
                                await wait(DEAL_CARD_DELAY_MS);
                            }
                        }

                        try {
                            document.getElementById("log").textContent =
                                "Hole cards dealt - Preflop betting";
                        } catch (e) {}
                        syncGameState(); // Sync after dealing
                        await wait(DEAL_PHASE_DELAY_MS);
                        try {
                            await setupPlayerTurn();
                        } catch (e) {
                            console.error("setupPlayerTurn error", e);
                        }
                    }

                    function setCardBurnOpacity(cardObj, opacity) {
                        if (!cardObj || !cardObj.mesh) return;
                        const clamped = Math.max(0, Math.min(1, opacity));
                        const mats = Array.isArray(cardObj.mesh.material)
                            ? cardObj.mesh.material
                            : [cardObj.mesh.material];
                        for (const m of mats) {
                            if (!m) continue;
                            try {
                                m.transparent = true;
                                m.opacity = clamped;
                                if (m.color) {
                                    const tone = 0.05 + 0.95 * clamped;
                                    m.color.setRGB(tone, tone * 0.95, tone * 0.9);
                                }
                                if (m.emissive) {
                                    const heat = 1 - clamped;
                                    m.emissive.setRGB(
                                        0.75 * heat,
                                        0.28 * heat,
                                        0.05 * heat,
                                    );
                                }
                                m.needsUpdate = true;
                            } catch (e) {}
                        }
                    }

                    function createBurnHoleSeeds(w, h, count = 54, _direction = "top") {
                        const minDim = Math.min(w, h);
                        const marginX = Math.max(10, Math.floor(w * 0.06));
                        const marginY = Math.max(10, Math.floor(h * 0.06));
                        const out = [];

                        for (let i = 0; i < count; i++) {
                            const x = marginX + Math.random() * Math.max(1, w - marginX * 2);
                            const y = marginY + Math.random() * Math.max(1, h - marginY * 2);
                            out.push({
                                x,
                                y,
                                start: 0.04 + Math.random() * 0.78,
                                size: minDim * (0.0035 + Math.random() * 0.0095),
                                driftX: (Math.random() - 0.5) * minDim * 0.018,
                                driftY: (Math.random() - 0.5) * minDim * 0.018,
                                ex: 0.78 + Math.random() * 0.55,
                                ey: 0.78 + Math.random() * 0.55,
                                growth: 0.8 + Math.random() * 1.9,
                            });
                        }
                        return out;
                    }

                    function createBurnMaskController(cardObj) {
                        if (!cardObj || !cardObj.mesh) return null;
                        const mats = Array.isArray(cardObj.mesh.material)
                            ? cardObj.mesh.material
                            : [cardObj.mesh.material];
                        const faceCandidates =
                            mats.length >= 6
                                ? [mats[4], mats[5]]
                                : mats.filter((m) => m && m.map);
                        const faceMats = faceCandidates.filter(Boolean);
                        if (!faceMats.length) return null;

                        const entries = [];
                        for (const mat of faceMats) {
                            const imgW =
                                Number(
                                    mat &&
                                        mat.map &&
                                        mat.map.image &&
                                        (mat.map.image.naturalWidth || mat.map.image.width),
                                ) || 360;
                            const imgH =
                                Number(
                                    mat &&
                                        mat.map &&
                                        mat.map.image &&
                                        (mat.map.image.naturalHeight || mat.map.image.height),
                                ) || 520;
                            const w = Math.max(256, Math.min(480, Math.floor(imgW)));
                            const h = Math.max(320, Math.min(720, Math.floor(imgH)));
                            const canvas = document.createElement("canvas");
                            canvas.width = w;
                            canvas.height = h;
                            const ctx = canvas.getContext("2d");
                            if (!ctx) continue;

                            ctx.fillStyle = "#fff";
                            ctx.fillRect(0, 0, w, h);

                            const alphaTex = new THREE.CanvasTexture(canvas);
                            alphaTex.needsUpdate = true;
                            alphaTex.flipY =
                                mat && mat.map ? !!mat.map.flipY : alphaTex.flipY;
                            alphaTex.minFilter = THREE.LinearFilter;
                            alphaTex.magFilter = THREE.LinearFilter;
                            alphaTex.wrapS = THREE.ClampToEdgeWrapping;
                            alphaTex.wrapT = THREE.ClampToEdgeWrapping;

                            mat.alphaMap = alphaTex;
                            mat.transparent = true;
                            mat.alphaTest = Math.max(0.04, mat.alphaTest || 0);
                            mat.depthWrite = true;
                            mat.needsUpdate = true;

                            entries.push({
                                mat,
                                ctx,
                                alphaTex,
                                w,
                                h,
                                holes: createBurnHoleSeeds(w, h, 118),
                            });
                        }

                        if (!entries.length) return null;

                        function drawEntry(entry, progress) {
                            const { ctx, w, h, holes } = entry;
                            ctx.clearRect(0, 0, w, h);
                            ctx.fillStyle = "#fff";
                            ctx.fillRect(0, 0, w, h);

                            for (let i = 0; i < holes.length; i++) {
                                const seed = holes[i];
                                const localP =
                                    (progress - seed.start) / Math.max(0.0001, 1 - seed.start);
                                if (localP <= 0) continue;
                                const g = Math.max(0, Math.min(1, localP));
                                const eased = Math.pow(g, 1.12);
                                const rRaw =
                                    seed.size *
                                    (0.7 + eased * (3.8 + (seed.growth || 1.2) * 3.2));
                                const rCap = Math.min(w, h) * (0.045 + (seed.growth || 1) * 0.02);
                                const r = Math.min(rRaw, rCap);
                                const cx = seed.x + seed.driftX * g;
                                const cy = seed.y + seed.driftY * g;

                                ctx.save();
                                ctx.translate(cx, cy);
                                ctx.scale(seed.ex, seed.ey);
                                const holeRadius =
                                    r * (1 + Math.sin(i * 1.7 + progress * 21) * 0.08);
                                ctx.fillStyle = "#000";
                                ctx.beginPath();
                                ctx.arc(0, 0, holeRadius, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.restore();
                            }

                            entry.alphaTex.needsUpdate = true;
                        }

                        return {
                            update(progress) {
                                const p = Math.max(0, Math.min(1, progress));
                                for (const entry of entries) drawEntry(entry, p);
                            },
                            dispose() {
                                for (const entry of entries) {
                                    try {
                                        if (entry.alphaTex && entry.alphaTex.dispose)
                                            entry.alphaTex.dispose();
                                    } catch (e) {}
                                }
                            },
                        };
                    }

                    async function animateRaisedBurn(cardObj, opts = {}) {
                        if (!cardObj || !cardObj.mesh) return;
                        const duration = Number(opts.duration) || 1200 / FIXED_GAME_SPEED;
                        const fadeTailDuration =
                            Number(opts.fadeTailDuration ?? opts.emberTailDuration) ||
                            Math.max(480, duration * 0.56);
                        const rev = burnFxRevision;
                        const burnMask = createBurnMaskController(cardObj);
                        burningCardObjects.add(cardObj);
                        setCardBurnOpacity(cardObj, 1);

                        await new Promise((resolve) => {
                            const t0 = performance.now();
                            function tick(now) {
                                if (rev !== burnFxRevision) {
                                    resolve();
                                    return;
                                }
                                if (!cardObj.mesh || !cardObj.mesh.parent) {
                                    resolve();
                                    return;
                                }

                                const elapsed = Math.max(0, now - t0);
                                const p = Math.max(0, Math.min(1, elapsed / duration));
                                const tailP =
                                    elapsed > duration
                                        ? Math.max(
                                              0,
                                              Math.min(
                                                  1,
                                                  (elapsed - duration) /
                                                      Math.max(0.0001, fadeTailDuration),
                                              ),
                                          )
                                        : 0;
                                const burnProgress = Math.min(1, p * 0.68 + tailP * 0.52);

                                const vanishStart = 0.82;
                                const vanishP =
                                    p > vanishStart
                                        ? (p - vanishStart) /
                                          Math.max(0.0001, 1 - vanishStart)
                                        : 0;
                                let opacity = 1;
                                if (vanishP > 0) {
                                    opacity *= Math.max(0, 1 - Math.pow(vanishP, 1.4));
                                }
                                if (tailP > 0) {
                                    opacity *= Math.max(0, 1 - Math.pow(tailP, 0.86));
                                }
                                setCardBurnOpacity(cardObj, opacity);
                                if (burnMask) burnMask.update(burnProgress);

                                if (p < 1) {
                                    cardObj.mesh.position.y += 0.0022;
                                    cardObj.mesh.rotation.z += 0.0054;
                                }

                                if (elapsed < duration + fadeTailDuration) {
                                    requestAnimationFrame(tick);
                                } else {
                                    resolve();
                                }
                            }
                            requestAnimationFrame(tick);
                        });

                        burningCardObjects.delete(cardObj);
                        if (burnMask) burnMask.dispose();
                        try {
                            disposeCard(cardObj);
                        } catch (e) {}
                    }

                    function lockBurnCardFaceDown(cardObj) {
                        if (!cardObj || !cardObj.mesh) return;
                        const mats = Array.isArray(cardObj.mesh.material)
                            ? cardObj.mesh.material
                            : [cardObj.mesh.material];
                        if (!mats || mats.length < 6) return;

                        const frontMat = mats[4];
                        const backMat = mats[5];
                        const fallbackBack =
                            (backMat && backMat.map) ||
                            (cardObj._maps && cardObj._maps[1]) ||
                            (frontMat && frontMat.map) ||
                            null;
                        if (!fallbackBack) return;

                        try {
                            if (frontMat) {
                                frontMat.map = fallbackBack;
                                frontMat.needsUpdate = true;
                            }
                            if (backMat) {
                                backMat.map = fallbackBack;
                                backMat.needsUpdate = true;
                            }
                            cardObj.faceUp = false;
                        } catch (e) {}
                    }

                    async function burnTopCard(opts = {}) {
                        if (deck.length === 0 || cardObjects.length === 0)
                            return null;
                        const duration =
                            Number(opts.duration) || 320 / FIXED_GAME_SPEED;
                        const pair = safePopCardMeshAndMeta();
                        if (!pair) return null;
                        const o = pair.meshObj;
                        const meta = pair.meta;
                        if (!o || !meta) return null;

                        const pos = burnEffectPosition.clone();
                        pos.x += (Math.random() - 0.5) * 0.22;
                        pos.z += (Math.random() - 0.5) * 0.22;

                        o.seat = "burn";
                        o._seatIndex = -1;
                        o.id = meta.id;
                        lockBurnCardFaceDown(o);

                        const targetEuler = new THREE.Euler(
                            -Math.PI / 2,
                            Math.PI + (Math.random() - 0.5) * 0.45,
                            (Math.random() - 0.5) * 0.12,
                            "XYZ",
                        );
                        const finalY = pos.y;

                        await Promise.all([
                            tweenTo(
                                o,
                                { x: pos.x, y: finalY, z: pos.z },
                                duration,
                                (t) => 1 - Math.pow(1 - t, 3),
                            ),
                            tweenRotationToEuler(o.mesh, targetEuler, duration),
                        ]);

                        o.mesh.position.set(pos.x, finalY, pos.z);
                        o.mesh.quaternion.setFromEuler(targetEuler);
                        o.faceUp = false;
                        o._baseOrigPosition = pos.clone();
                        o.origPosition = o._baseOrigPosition.clone();
                        o.origPosition.y = finalY;
                        o.origQuaternion = o.mesh.quaternion.clone();

                        try {
                            playDealAt(o.mesh, { rate: 0.88, rolloff: 0.85 });
                        } catch (e) {}
                        await animateRaisedBurn(o, {
                            duration: Math.max(900, duration * 8.5),
                            fadeTailDuration: Math.max(560, duration * 5.8),
                        });
                        return o;
                    }

                    async function advanceGamePhase() {
                        const duration =
                            450 / (FIXED_GAME_SPEED * DEAL_SPEED_MULTIPLIER);

                        if (activePlayers.length <= 1) {
                            try {
                                document.getElementById("log").textContent =
                                    `Player ${activePlayers[0] + 1} wins!`;
                            } catch (e) {}
                            return;
                        }

                        if (gamePhase === "preflop") {
                            gamePhase = "flop";
                            playersActedThisRound.clear();
                            currentPlayerIndex = 0;
                            currentBet = 0;
                            // burn one card before the flop
                            await burnTopCard({ duration: duration * 0.72 });
                            // the flop
                            for (let i = 0; i < 3; i++) {
                                await dealCommunityCard(i, duration);
                            }
                            try {
                                document.getElementById("log").textContent =
                                    "Flop dealt - betting round begins";
                            } catch (e) {}
                            syncGameState();
                            await wait(800);
                            await setupPlayerTurn();
                        } else if (gamePhase === "flop") {
                            gamePhase = "turn";
                            playersActedThisRound.clear();
                            currentPlayerIndex = 0;
                            currentBet = 0;
                            // burn one card before the turn
                            await burnTopCard({ duration: duration * 0.72 });
                            // the turn
                            await dealCommunityCard(3, duration);
                            try {
                                document.getElementById("log").textContent =
                                    "Turn dealt - betting round begins";
                            } catch (e) {}
                            syncGameState();
                            await wait(800);
                            await setupPlayerTurn();
                        } else if (gamePhase === "turn") {
                            gamePhase = "river";
                            playersActedThisRound.clear();
                            currentPlayerIndex = 0;
                            currentBet = 0;
                            // burn one card before the river
                            await burnTopCard({ duration: duration * 0.72 });
                            // the river
                            await dealCommunityCard(4, duration);
                            try {
                                document.getElementById("log").textContent =
                                    "River dealt - final betting round";
                            } catch (e) {}
                            syncGameState();
                            await wait(800);
                            await setupPlayerTurn();
                        } else if (gamePhase === "river") {
                            gamePhase = "showdown";
                            syncGameState();
                            await showdown();
                        }
                    }

                    async function dealCommunityCard(index, duration) {
                        if (deck.length === 0 || cardObjects.length === 0)
                            return;
                        const pair = safePopCardMeshAndMeta();
                        if (!pair) return;
                        const o = pair.meshObj;
                        const meta = pair.meta;
                        if (!o || !meta) return;

                        const pos = communityPosition.clone();
                        pos.x += (index - 2) * CARD_W * 1.1;
                        pos.y = BASE_DECK_Y;

                        o.seat = "community";
                        o._seatIndex = index;
                        o.id = meta.id;

                        const targetEuler = new THREE.Euler(
                            -Math.PI / 2,
                            0,
                            0,
                            "XYZ",
                        );
                        const finalY = BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;

                        await Promise.all([
                            tweenTo(
                                o,
                                { x: pos.x, y: finalY, z: pos.z },
                                duration,
                                (t) => 1 - Math.pow(1 - t, 3),
                            ),
                            tweenRotationToEuler(o.mesh, targetEuler, duration),
                        ]);

                        o.mesh.position.set(pos.x, finalY, pos.z);
                        o.mesh.quaternion.setFromEuler(targetEuler);
                        o.faceUp = true;
                        o._baseOrigPosition = pos.clone();
                        o.origPosition = o._baseOrigPosition.clone();
                        o.origPosition.y = finalY;
                        o.origQuaternion = o.mesh.quaternion.clone();

                        try {
                            playDealAt(o.mesh);
                        } catch (e) {}
                        communityCards.push(o);
                        recommendationRevision++;
                        lastRecommendationKey = "";
                        await wait(DEAL_CARD_DELAY_MS);
                    }

                    async function showdown() {
                        handComplete = true;
                        waitingForPlayer = false;
                        enablePlayerControls(false);
                        try {
                            document.getElementById("log").textContent =
                                "Showdown!";
                        } catch (e) {}

                        let bestRank = -1;
                        let bestSortKey = null;
                        let winner = -1;
                        const results = [];

                        const compareKeys = (a = [], b = []) => {
                            for (
                                let i = 0;
                                i < Math.min(a.length, b.length);
                                i++
                            ) {
                                if (a[i] > b[i]) return 1;
                                if (a[i] < b[i]) return -1;
                            }
                            return 0;
                        };

                        for (const seat of activePlayers) {
                            const playerCards = dealtCards.filter(
                                (c) => c.seat === seat,
                            );
                            const allCards = [
                                ...playerCards,
                                ...communityCards,
                            ];
                            const handEval = evaluatePokerHand(allCards);
                            results.push({
                                seat,
                                rank: handEval.rank,
                                desc: handEval.desc,
                            });

                            if (
                                bestSortKey === null ||
                                compareKeys(handEval.sortKey, bestSortKey) > 0
                            ) {
                                bestRank = handEval.rank;
                                bestSortKey = handEval.sortKey;
                                winner = seat;
                            }
                        }

                        // Display results
                        let logText = "Results:\\n";
                        results.forEach((r) => {
                            logText += `Player ${r.seat + 1}: ${r.desc}${r.seat === winner ? " (WINNER!)" : ""}\\n`;
                        });

                        try {
                            document.getElementById("log").textContent =
                                logText;
                        } catch (e) {}

                        if (winner >= 0 && mySeat >= 0 && winner === mySeat) {
                            try {
                                triggerWinnerConfetti();
                            } catch (e) {
                                console.warn("winner confetti failed", e);
                            }
                        }

                        // chip transfer from pot to winner
                        if (winner >= 0) {
                            await wait(800);
                            await animateChipTransferBetweenSeats(
                                "pot",
                                winner,
                                { duration: 900 },
                            );
                        }

                        // controls remain disabled and no further turns start
                        enablePlayerControls(false);
                        waitingForPlayer = false;
                        handComplete = true;

                        // rotate dealer
                        dealerSeat = (dealerSeat + 1) % 4;
                        try {
                            document.getElementById("log").textContent =
                                logText +
                                `\\nDealer moves to Player ${dealerSeat + 1}`;
                        } catch (e) {}
                    }

                    async function revealAll() {
                        const duration = 400 / FIXED_GAME_SPEED;
                        for (const o of cardObjects) {
                            flipCard(o, duration);
                        }
                    }

                    function flipCard(o, duration = 400) {
                        const start = o.mesh.rotation.y;
                        const target = start + Math.PI;
                        const t0 = performance.now();
                        (function tick(now) {
                            const p = Math.min(1, (now - t0) / duration);
                            o.mesh.rotation.y =
                                start + (target - start) * easeInOutCubic(p);
                            if (p < 1) requestAnimationFrame(tick);
                        })(performance.now());
                        o.faceUp = !o.faceUp;
                        recommendationRevision++;
                        lastRecommendationKey = "";
                    }

                    // helpers
                    function wait(ms) {
                        return new Promise((r) => setTimeout(r, ms));
                    }
                    function easeInOutCubic(t) {
                        return t < 0.5
                            ? 4 * t * t * t
                            : 1 - Math.pow(-2 * t + 2, 3) / 2;
                    }
                    function shuffleArray(a) {
                        for (let i = a.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [a[i], a[j]] = [a[j], a[i]];
                        }
                    }
                    // pop a mesh and its matching deck metadata atomically
                    function safePopCardMeshAndMeta() {
                        if (deck.length === 0 || cardObjects.length === 0)
                            return null;
                        // use pop so the metadata comes from the same end as the visible top card
                        const meta = deck.pop();
                        const meshObj = cardObjects.pop();
                        return { meta, meshObj };
                    }

                    // window resize
                    window.addEventListener("resize", () => {
                        camera.aspect = innerWidth / innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(innerWidth, innerHeight);
                        resizeConfettiCanvas();
                    });

                    // raycasting for mouse pointer interaction
                    const ray = new THREE.Raycaster();
                    const mouse = new THREE.Vector2();
                    window.addEventListener("pointerdown", onPointerDown);
                    function onPointerDown(e) {
                        mouse.x = (e.clientX / innerWidth) * 2 - 1;
                        mouse.y = -(e.clientY / innerHeight) * 2 + 1;
                        ray.setFromCamera(mouse, camera);
                        const intersects = ray.intersectObjects(
                            scene.children,
                            true,
                        );
                        if (intersects.length === 0) return;
                        // flip the first clicked card
                        for (const it of intersects) {
                            let m = it.object;
                            while (m && !m.userData.cardId) m = m.parent;
                            if (m && m.userData.cardId) {
                                const cardId = m.userData.cardId;
                                const obj = dealtCards.find(
                                    (o) => o.id === cardId,
                                ) ||
                                    cardObjects.find(
                                        (o) => o.id === cardId,
                                    ) || { mesh: m, id: cardId };
                                // Sound on flip
                                try {
                                    flipCard(obj, 300);
                                } catch (e) {}
                                try {
                                    playDealAt(obj.mesh);
                                } catch (e) {}
                                return;
                            }
                        }
                    }

                    // UI bindings
                    document
                        .getElementById("shuffleBtn")
                        .addEventListener("click", async () => {
                            try {
                                document.getElementById("log").textContent =
                                    "Shuffling…";
                            } catch (e) {}
                            const startAt = Date.now() + 320;
                            const seed = Math.floor(Math.random() * 0xffffffff);
                            const deckOrder = deck.map((d) => d.id);
                            shuffleArray(deckOrder);
                            emitAction("shuffle", {
                                deckOrder,
                                startAt,
                                seed,
                            });
                            await visualShuffle({
                                deckOrder,
                                startAt,
                                seed,
                                skipBroadcast: true,
                            });
                            try {
                                document.getElementById("log").textContent =
                                    "Shuffled";
                            } catch (e) {}
                            syncGameState();
                        });
                    document
                        .getElementById("dealBtn")
                        .addEventListener("click", async () => {
                            document.getElementById("log").textContent =
                                "Dealing poker hand…";
                            await dealPokerHand();
                            syncGameState();
                        });
                    document
                        .getElementById("resetBtn")
                        .addEventListener("click", () => {
                            resetBurnEffects();
                            deck = deckIds.slice();
                            // dispose dealt cards and deck objects
                            dealtCards.forEach((o) => disposeCard(o));
                            dealtCards.length = 0;
                            // dispose community cards
                            if (communityCards && communityCards.length > 0) {
                                communityCards.forEach((o) => disposeCard(o));
                                communityCards.length = 0;
                            }
                            // dispose existing deck objects
                            cardObjects.forEach((o) => disposeCard(o));
                            cardObjects.length = 0;
                            layoutDeckAt(0, BASE_DECK_Y, 4);
                            document.getElementById("log").textContent =
                                "Deck reset";
                            syncGameState();
                        });
                    document
                        .getElementById("revealBtn")
                        .addEventListener("click", () => {
                            document.getElementById("log").textContent =
                                "Revealing…";
                            revealAll();
                            document.getElementById("log").textContent =
                                "Reveal toggled";
                            syncGameState();
                        });

                    // scan scene and safe cloning
                    function makeMaterialsSafe(mesh) {
                        try {
                            if (
                                !mesh ||
                                (mesh.userData && mesh.userData._materialsSafe)
                            )
                                return;
                            const mats = Array.isArray(mesh.material)
                                ? mesh.material
                                : [mesh.material];
                            const newMats = mats.map((m) => {
                                if (!m) return m;
                                const copy = m.clone();
                                copy.polygonOffset = true;
                                copy.polygonOffsetFactor = 0.5;
                                const idx =
                                    mesh.userData &&
                                    typeof mesh.userData.stackIndex === "number"
                                        ? mesh.userData.stackIndex
                                        : 0;
                                copy.polygonOffsetUnits = 1 + idx * 0.6;
                                copy.alphaTest = 0.01;
                                copy.depthWrite = true;
                                copy.depthTest = true;
                                copy.transparent = false;
                                copy.side = THREE.DoubleSide;
                                return copy;
                            });
                            mesh.material = Array.isArray(mesh.material)
                                ? newMats
                                : newMats[0];
                            mesh.receiveShadow = false;
                            mesh.userData._materialsSafe = true;
                        } catch (e) {}
                    }

                    function getDealtCards() {
                        if (dealtCards && dealtCards.length) return dealtCards;
                        const presentIds = new Set(
                            cardObjects.map((o) => o.id),
                        );
                        const found = [];

                        // traverse and collect meshes
                        scene.traverse((node) => {
                            if (!node) return;
                            let m = node;
                            while (m && !m.userData?.cardId) m = m.parent;
                            if (m && m.userData && m.userData.cardId) {
                                const id = m.userData.cardId;
                                if (
                                    !presentIds.has(id) &&
                                    !found.some((f) => f.id === id)
                                ) {
                                    // z-fighting aid
                                    makeMaterialsSafe(m);
                                    // set a high renderOrder (detected cards >> deck cards)
                                    if (
                                        typeof m.renderOrder !== "number" ||
                                        m.renderOrder < 1000
                                    )
                                        m.renderOrder = 1000;
                                    if (
                                        typeof m.userData.stackIndex !==
                                        "number"
                                    )
                                        m.userData.stackIndex =
                                            10000 + found.length;
                                    m.userData._detectedDealt = true;

                                    const detectedOrigPos = m.position.clone();
                                    const distToDealer =
                                        detectedOrigPos.distanceTo(
                                            dealerPosition,
                                        );
                                    let detectedSeat = undefined;
                                    if (distToDealer < 0.6) {
                                        detectedSeat = "dealer";
                                        detectedOrigPos.y =
                                            BASE_DECK_Y +
                                            CARD_T / 2 +
                                            GAP * 0.5;
                                    } else {
                                        // detect nearest player seat
                                        for (
                                            let s = 0;
                                            s < playerPositions.length;
                                            s++
                                        ) {
                                            const pp = playerPositions[s];
                                            if (!pp) continue;
                                            const d2 =
                                                detectedOrigPos.distanceTo(pp);
                                            if (d2 < 1.2) {
                                                detectedSeat = s;
                                                detectedOrigPos.y =
                                                    BASE_DECK_Y +
                                                    CARD_T / 2 +
                                                    GAP * 0.5;
                                                break;
                                            }
                                        }
                                    }

                                    // derive a simple faceUp estimate from Y-rotation
                                    let faceUp = true;
                                    try {
                                        const ry =
                                            ((m.rotation.y % (Math.PI * 2)) +
                                                Math.PI * 2) %
                                            (Math.PI * 2);
                                        if (Math.abs(ry - Math.PI) < 0.9)
                                            faceUp = false;
                                    } catch (e) {}

                                    found.push({
                                        mesh: m,
                                        id: id,
                                        faceUp: faceUp,
                                        seat: detectedSeat,
                                        _baseOrigPosition:
                                            detectedOrigPos.clone(),
                                        _seatIndex: 0,
                                        origPosition: detectedOrigPos.clone(),
                                        origQuaternion: m.quaternion.clone(),
                                    });
                                }
                            }
                        });
                        if (found.length) {
                            dealtCards.length = 0;
                            found.forEach((f) => dealtCards.push(f));
                        }
                        return dealtCards;
                    }

                    function prepareDealtMesh(o, index) {
                        if (!o || !o.mesh) return;
                        const m = o.mesh;
                        try {
                            makeMaterialsSafe(m);
                        } catch (e) {}
                        // ensure stable stack index fallback
                        if (typeof m.userData.stackIndex !== "number")
                            m.userData.stackIndex = 10000 + index;
                        if (!o._baseOrigPosition) {
                            if (o.origPosition)
                                o._baseOrigPosition = o.origPosition.clone();
                            else o._baseOrigPosition = m.position.clone();
                        }
                        if (typeof o._origSeat === "undefined")
                            o._origSeat = o.seat;
                        o._seatKey = seatKey(o._origSeat);
                        o._seatBaseKey = seatBaseKey(o._origSeat);
                        // compute origPosition from base
                        o.origPosition = o._baseOrigPosition.clone();
                        try {
                            if (
                                o.seat === "dealer" ||
                                (m.userData && m.userData.seat === "dealer")
                            ) {
                                // ensure dealer index is fixed and origPosition is set to the dealer plane
                                o._seatIndex = 0;
                                o.origPosition.y =
                                    BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;
                                o._baseOrigPosition.y = o.origPosition.y;
                            } else {
                                o.origPosition.y =
                                    BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;
                            }
                        } catch (e) {}
                    }

                    // Layout player's dealt horizontally
                    function layoutPlayerHand(seat, duration = 240) {
                        try {
                            const key = seatKey(seat);
                            const hand = dealtCards.filter(
                                (o) => seatKey(o.seat) === key,
                            );
                            if (!hand || hand.length === 0)
                                return Promise.resolve();
                            // determine anchor center
                            const isSplit =
                                typeof key === "string" &&
                                key.includes("_split");
                            const baseIdx = isSplit
                                ? parseInt(String(key).split("_")[0], 10) || 0
                                : Number(key);
                            const base = playerPositions[baseIdx]
                                ? playerPositions[baseIdx].clone()
                                : playerPositions[0].clone();
                            const center = base.clone();
                            if (isSplit) {
                                const dealerDir = dealerPosition
                                    .clone()
                                    .sub(base);
                                dealerDir.y = 0;
                                if (dealerDir.lengthSq() < 1e-6)
                                    dealerDir.set(0, 0, 1);
                                else dealerDir.normalize();
                                const FORWARD_SHIFT = CARD_W * 1.5; // blackjack split
                                center.addScaledVector(
                                    dealerDir,
                                    FORWARD_SHIFT,
                                );
                            }
                            const fanY = BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;
                            // avoid overlaps
                            const baseSpacing = CARD_W * 1.05;
                            const spacing =
                                baseSpacing +
                                Math.max(0, hand.length - 1) * 0.28;
                            const promises = [];
                            hand.sort(
                                (a, b) =>
                                    (a._seatIndex || 0) - (b._seatIndex || 0),
                            );
                            for (let i = 0; i < hand.length; i++) {
                                const o = hand[i];
                                const offset = i - (hand.length - 1) / 2;
                                const targetX = center.x + offset * spacing;
                                const targetZ = center.z + 0.0 * offset;
                                const targetY = fanY;
                                o._seatIndex = i;
                                o._baseOrigPosition = new THREE.Vector3(
                                    targetX,
                                    targetY,
                                    targetZ,
                                );
                                o.origPosition = o._baseOrigPosition.clone();
                                o.origQuaternion = o.mesh.quaternion.clone();
                                const targetEuler = new THREE.Euler(
                                    -Math.PI / 2,
                                    0,
                                    0,
                                    "XYZ",
                                );
                                o.faceUp = true;
                                if (duration > 0)
                                    promises.push(
                                        Promise.all([
                                            tweenTo(
                                                o,
                                                {
                                                    x: targetX,
                                                    y: targetY,
                                                    z: targetZ,
                                                },
                                                duration,
                                                (t) => 1 - Math.pow(1 - t, 3),
                                            ),
                                            tweenRotationToEuler(
                                                o.mesh,
                                                targetEuler,
                                                duration,
                                            ),
                                        ]),
                                    );
                                else {
                                    o.mesh.position.set(
                                        targetX,
                                        targetY,
                                        targetZ,
                                    );
                                    o.mesh.quaternion.setFromEuler(targetEuler);
                                }
                            }
                            return Promise.all(promises);
                        } catch (e) {
                            return Promise.resolve();
                        }
                    }

                    function updateChips(dt) {
                        if (!chips || chips.length === 0) return;

                        const g = chipPhysics.gravity;
                        const gY = chipPhysics.groundY;
                        const restitution = chipPhysics.restitution;
                        const frictionGround = chipPhysics.frictionGround;
                        const frictionAir = chipPhysics.frictionAir;

                        for (const c of chips) {
                            if (!c || !c.mesh) continue;

                            // Skip physics for chips already in stacks
                            if (c.stackId !== undefined) continue;

                            // Apply gravity
                            c.velocity.y += g * dt;

                            // Apply air friction
                            c.velocity.x *= Math.pow(frictionAir, dt);
                            c.velocity.z *= Math.pow(frictionAir, dt);

                            // Update position
                            c.mesh.position.addScaledVector(c.velocity, dt);

                            // Ground collision
                            if (c.mesh.position.y <= gY) {
                                c.mesh.position.y = gY;

                                // Bounce
                                if (c.velocity.y < 0) {
                                    c.velocity.y *= -restitution;
                                    if (Math.abs(c.velocity.y) < 0.1)
                                        c.velocity.y = 0;
                                }

                                // Ground friction
                                const velXZ = Math.hypot(
                                    c.velocity.x,
                                    c.velocity.z,
                                );
                                if (velXZ > 0.01) {
                                    const damping = Math.pow(
                                        frictionGround,
                                        dt,
                                    );
                                    c.velocity.x *= damping;
                                    c.velocity.z *= damping;
                                } else {
                                    c.velocity.x = 0;
                                    c.velocity.z = 0;
                                }
                            }
                        }

                        manageChipStacks();
                    }

                    // initial load
                    await loadAllTextures();
                    layoutDeckAt(0, BASE_DECK_Y, 4);
                    createOddsUI();
                    document.getElementById("log").textContent = "Ready";

                    // animation loop
                    // physics clock for chips simulation
                    const physClock = new THREE.Clock();
                    (function animate() {
                        const dt = Math.min(0.05, physClock.getDelta());
                        requestAnimationFrame(animate);
                        if (controls) controls.update();
                        // refresh hand eval, repurposed from blackjack
                        try {
                            updateOddsUI();
                        } catch (e) {}
                        // update chip physics before rendering
                        try {
                            updateChips(dt);
                        } catch (e) {}
                        renderer.render(scene, camera);
                    })();
                }
            })();
        </script>
        <script>
            // Remove overlay after animation finishes
            window.addEventListener("load", () => {
                const intro = document.getElementById("intro-title");
                setTimeout(() => intro && intro.remove(), 4500);
            });
        </script>
    </body>
