                        mesh.userData.chipColor = String(color).toLowerCase();
                        // ensure a stable default orientation
                        mesh.rotation.set(0, 0, 0);
                        return mesh;
                    }

                    // lightweight chip physics state + helpers
                    const chips = [];
                    const CHIP_RADIUS = CHIP_DIAMETER / 2;
                    const chipPhysics = {
                        gravity: -18.0,
                        groundY: BASE_DECK_Y + CHIP_THICKNESS / 2 + 0.001,
                        restitution: 0.25, // bounciness
                        frictionGround: 0.7, // damping on ground contact
                        frictionAir: 0.995, // drag
                        contactEpsilon: 0.0001,
                        // make snap distance large enough
                        stackSnapDistance: 0.8, // max horizontal distance to snap into same stack
                        stackSettleVel: 0.06, // max horizontal speed to be considered settled
                        stackMaxHeight: 24, // safety cap on stack height
                    };

                    // deterministic per-seat-per-color anchors 
                    const chipStacks = {}; // key => { id, seat, anchor: Vector3, members: [], color, pending }
                    let nextStackId = 1;

                    // stable color ordering and offset step for per-color anchors
                    const COLORS_ORDER = ["black", "blue", "green", "red"];
                    // lateral spacing between color stacks
                    const COLOR_STACK_OFFSET = CHIP_DIAMETER * 1.1;
                    // tuned to sit just behind the fan
                    const FRONT_STACK_OFFSET = 3.2;

                    function getStackKey(seat, color) {
                        // normalize seat
                        return `${seatKey(seat)}_${String(color).toLowerCase()}`;
                    }

                    function computeColorAnchor(seat, color) {
                        const gY = chipPhysics.groundY;
                        const col = String(color).toLowerCase();
                        // Anchor chips relative to the player's position
                        let anchor;
                        if (seat === "pot") {
                            // Pot chips
                            anchor = potPosition.clone();
                        } else if (seat === "dealer") {
                            anchor = dealerPosition.clone();
                        } else {
                            // Use seat position directly
                            anchor = playerPositions[seat]
                                ? playerPositions[seat].clone()
                                : playerPositions[0].clone();
                        }

                        // anchor on the ground plane
                        anchor.y = gY;
                        // anchor outward from table center, chips sit behind the hand
                        if (seat !== "pot") {
                            const center = new THREE.Vector3(0, gY, 0);
                            const dir = anchor.clone().sub(center);
                            dir.y = 0;
                            if (dir.lengthSq() > 1e-6) {
                                dir.normalize();
                                const offset =
                                    seat === 1 || seat === 2
                                        ? FRONT_STACK_OFFSET * 2.0
                                        : FRONT_STACK_OFFSET;
                                anchor.addScaledVector(dir, offset);
                            }
                        }

                        // compute lateral axis for color lanes.
                        let perp = new THREE.Vector3(1, 0, 0);
                        perp.normalize();

                        // lateral spacing between color stacks
                        const lateralSpacing = Math.max(
                            CARD_W * 0.65,
                            CHIP_DIAMETER * 1.3,
                            COLOR_STACK_OFFSET * 0.9,
                        );
                        const idx = Math.max(0, COLORS_ORDER.indexOf(col));
                        const mid = (COLORS_ORDER.length - 1) / 2;
                        const lateralShift = (idx - mid) * lateralSpacing;

                        anchor.addScaledVector(perp, lateralShift);
                        return anchor;
                    }

                    // tiny per-chip jitter
                    function getStackJitter(idx) {
                        // base lateral steps so small stacks spread lightly
                        const JX = 0.03; // horizontal step
                        const JZ = 0.02; // depth step
                        // avoid exact overlap
                        const patternX = ((idx % 3) - 1) * JX;
                        const patternZ = ((Math.floor(idx / 3) % 2) - 0.5) * JZ;
                        const randX = (Math.random() - 0.5) * 0.01;
                        const randZ = (Math.random() - 0.5) * 0.008;
                        return { x: patternX + randX, z: patternZ + randZ };
                    }

                    // Normalize seat identifiers for consistent keys
                    function seatKey(s) {
                        if (s === "dealer") return "dealer";
                        if (typeof s === "number") return String(s);
                        if (typeof s === "string") return s;
                        return String(s);
                    }

                    function seatBaseKey(s) {
                        const k = seatKey(s);
                        if (typeof k === "string" && k.includes("_split"))
                            return String(k.split("_")[0]);
                        return k;
                    }

                    function getOrCreateStack(seat, color){
                        const key = getStackKey(seat, color);
                        if(chipStacks[key]) return chipStacks[key];
                        const anchor = computeColorAnchor(seat, color);
                        const sid = nextStackId++;
                        // store normalized seat id for reliable comparisons elsewhere
                        const storedSeat = seatKey(seat);
                        chipStacks[key] = { id: sid, seat: storedSeat, anchor, members: [], color: String(color).toLowerCase(), pending: 0 };
                        return chipStacks[key];
                    }

                    function spawnChip(color, seatIndex = 0, opts = {}) {
                        // normalize color and seat
                        const col = String(color).toLowerCase();
                        const seat =
                            seatIndex === "dealer"
                                ? "dealer"
                                : typeof seatIndex === "number"
                                  ? seatIndex
                                  : 0;

                        const stack = getOrCreateStack(seat, col);

                        const mesh = createChipMesh(col);
                        scene.add(mesh);

                        // Calculate spawn position
                        const targetX = stack.anchor.x;
                        const targetZ = stack.anchor.z;
                        const targetY = chipPhysics.groundY + 0.5;

                        // prepare chip state
                        const chipObj = {
                            mesh,
                            velocity: new THREE.Vector3(0, -2, 0), // small downward velocity for drop effect
                            mass: 1.0,
                            radius: CHIP_RADIUS,
                            restitution: chipPhysics.restitution,
                            color: col,
                            seat: seat, // store target seat for stack matching
                            id:
                                opts.id ||
                                `chip_${Date.now()}_${Math.random()
                                    .toString(36)
                                    .slice(2, 6)}`,
                        };

                        // Spawn chip above its target position
                        chipObj.mesh.position.set(targetX, targetY, targetZ);
                        if (opts.position) {
                            chipObj.mesh.position.set(
                                opts.position.x ?? targetX,
                                opts.position.y ?? targetY,
                                opts.position.z ?? targetZ,
                            );
                        }
                        chipObj.mesh.rotation.set(
                            0,
                            Math.random() * Math.PI * 2,
                            0,
                        );

                        chips.push(chipObj);

                        // Sync chip to others
                        const skipBroadcast = opts.skipBroadcast || suppressNetworkActions;
                        if (!skipBroadcast) {
                            try {
                                broadcast({
                                    type: "chip",
                                    chip: {
                                        action: "spawn",
                                        id: chipObj.id,
                                        color: col,
                                        seat: seat,
                                        position: {
                                            x: chipObj.mesh.position.x,
                                            y: chipObj.mesh.position.y,
                                            z: chipObj.mesh.position.z,
                                        },
                                    },
                                });
                                console.log("Sent chip spawn sync", chipObj.id);
                            } catch (e) {
                                console.warn("Failed to sync chip:", e);
                            }
                        }

                        return chipObj;
                    }

                    async function animateSingleChipTransfer(chipObj, toSeat, opts = {}) {
                        if (!chipObj || !chipObj.mesh) return;
                        const dur = opts.duration || 800;
                        try {
                            if (chipObj.stackId !== undefined) {
                                for (const key in chipStacks) {
                                    const s = chipStacks[key];
                                    if (!s || !Array.isArray(s.members)) continue;
                                    const idx = s.members.indexOf(chipObj);
                                    if (idx !== -1) {
                                        s.members.splice(idx, 1);
                                        break;
                                    }
                                }
                            }
                        } catch (e) {}

                        const color =
                            chipObj.color ||
                            (chipObj.mesh &&
                                chipObj.mesh.userData &&
                                chipObj.mesh.userData.chipColor) ||
                            "black";
                        const destStack = getOrCreateStack(toSeat, color);
                        destStack.pending = (destStack.pending || 0) + 1;
                        const targetIndex = destStack.members.length;
                        const target = destStack.anchor.clone();
                        const jitter = getStackJitter(targetIndex);
                        target.x += jitter.x;
                        target.z += jitter.z;
                        const targetY =
                            chipPhysics.groundY +
                            targetIndex * CHIP_THICKNESS +
                            0.0005;

                        try {
                            await tweenTo(
                                chipObj,
                                { x: target.x, y: targetY, z: target.z },
                                dur,
                            );
                        } catch (e) {}

                        chipObj.stackId = destStack.id;
                        chipObj.seat = toSeat;
                        destStack.members.push(chipObj);
                        destStack.pending = Math.max(
                            0,
                            (destStack.pending || 1) - 1,
                        );
                        try {
                            chipObj.mesh.rotation.set(0, 0, 0);
                            chipObj.mesh.position.set(target.x, targetY, target.z);
                        } catch (e) {}
                    }

                    // per-seat-per-color anchors:
                    function manageChipStacks(){
                        const gY = chipPhysics.groundY;
                        
                        // check if any free chips should snap to stacks
                        for(const c of chips){
                        if(!c || !c.mesh || c.stackId !== undefined) continue; // skip if already in a stack
                        
                        // Find the correct stack for chip
                        const chipSeat = c.seat !== undefined ? c.seat : 0;
                        const chipColor = c.color || 'black';
                        const stackKey = getStackKey(chipSeat, chipColor);
                        
                        // Check if stack exists or create
                        let stack = chipStacks[stackKey];
                        if(!stack){
                            stack = getOrCreateStack(chipSeat, chipColor);
                        }
                        
                        // Check horizontal distance to the target stack anchor
                        const dx = c.mesh.position.x - stack.anchor.x;
                        const dz = c.mesh.position.z - stack.anchor.z;
                        const hDist = Math.hypot(dx, dz);
                        
                        // If close enough snap to stack
                        if(hDist < chipPhysics.stackSnapDistance){
                            c.stackId = stack.id;
                            c.velocity.set(0,0,0);
                            stack.members.push(c);
                            const idx = stack.members.length - 1;
                            const jitter = getStackJitter(idx);
                            const verticalSpacing = CHIP_THICKNESS * 1.0;
                            c.mesh.position.x = stack.anchor.x + jitter.x;
                            c.mesh.position.z = stack.anchor.z + jitter.z;
                            c.mesh.position.y = gY + idx * verticalSpacing;
                            c.mesh.rotation.set(0,0,0);
                            continue;
                        }
                        }
                        
                        // cleanup empty stacks
                        for(const key in Object.assign({}, chipStacks)){
                        const s = chipStacks[key];
                        if((!s.members || s.members.length === 0) && (!s.pending || s.pending === 0)) delete chipStacks[key];
                        }
                    }

                    function getStackKeysForSeat(seat) {
                        const keys = [];
                        for (const k in chipStacks) {
                            try {
                                if (chipStacks[k].seat === seatKey(seat))
                                    keys.push(k);
                            } catch (e) {}
                        }
                        return keys;
                    }

                    async function animateChipTransferBetweenSeats(fromSeat, toSeat, opts = {}){
                        const dur = opts.duration || 800;
                        const moved = [];
                        const fromKeys = getStackKeysForSeat(fromSeat);
                        for(const fk of fromKeys){
                        const stack = chipStacks[fk];
                        if(!stack || !Array.isArray(stack.members) || stack.members.length === 0) continue;
                        // clone members
                        const members = stack.members.slice();
                        // iterate from top of stack -> bottom (no floating)
                        for(let mi = members.length - 1; mi >= 0; mi--){
                            const chipObj = members[mi];
                            try{
                            const color = chipObj.color || (chipObj.mesh && chipObj.mesh.userData && chipObj.mesh.userData.chipColor) || 'black';
                            const destStack = getOrCreateStack(toSeat, color);
                            destStack.pending = (destStack.pending || 0) + 1;
                            const targetIndex = destStack.members.length;
                            const target = destStack.anchor.clone();
                            const jitter = getStackJitter(targetIndex);
                            target.x += jitter.x;
                            target.z += jitter.z;
                            const extraShift = (opts && typeof opts.shift === 'number') ? opts.shift : 3.2;
                            try{
                                if(String(destStack.seat) === 'dealer'){
                                const center = new THREE.Vector3(0, chipPhysics.groundY, 0);
                                const dir = dealerPosition.clone().sub(center);
                                dir.y = 0;
                                if(dir.lengthSq() > 1e-6) dir.normalize();
                                target.addScaledVector(dir, extraShift);
                                }
                            }catch(e){ /* ignore if positions unavailable */ }
                            const targetY = chipPhysics.groundY + targetIndex * CHIP_THICKNESS + 0.0005;
                            // animate chip mesh to target
                            await tweenTo(chipObj, { x: target.x, y: targetY, z: target.z }, dur);
                            // remove from old stack and add to dest stack
                            try{
                                const idx = stack.members.indexOf(chipObj);
                                if(idx !== -1) stack.members.splice(idx,1);
                            }catch(e){}
                            chipObj.stackId = destStack.id;
                            // update chip's seat to destination so it stacks with other chips there
                            chipObj.seat = toSeat;
                            destStack.members.push(chipObj);
                            // mark transfer complete for cleanup safety
                            destStack.pending = Math.max(0, (destStack.pending || 1) - 1);
                            // stabilize final transform
                            try{ chipObj.mesh.rotation.set(0,0,0); chipObj.mesh.position.set(target.x, targetY, target.z); }catch(e){}
                            moved.push({ chip: chipObj, from: fk, to: destStack });
                            }catch(e){ console.warn('chip transfer failed', e); }
                        }
                        }
                        return moved;
                    }

                    async function animateChipOutcome(results) {
                        if (!Array.isArray(results) || results.length === 0)
                            return;
                        // perform transfers in parallel
                        const tasks = [];
                        for (const r of results) {
                            const seat = r.seat;
                            const text = String(
                                r.resultText || "",
                            ).toLowerCase();
                            if (text.includes("player wins")) {
                                // dealer pays player
                                tasks.push(
                                    animateChipTransferBetweenSeats(
                                        "dealer",
                                        seat,
                                    ),
                                );
                            } else if (text.includes("dealer wins")) {
                                // player pays dealer
                                tasks.push(
                                    animateChipTransferBetweenSeats(
                                        seat,
                                        "dealer",
                                    ),
                                );
                            } else {
                                // push/tie: leave chips as is
                            }
                        }
                        try {
                            await Promise.all(tasks);
                        } catch (e) {
                            console.warn("chip outcome animation failed", e);
                        }
                    }

                    // chip buttons immediately at current player's position
                    try {
                        const getChipSeat = () => mySeat >= 0 ? mySeat : currentPlayerSeat;
                        document
                            .getElementById("chipBlackBtn")
                            .addEventListener("click", () =>
                                spawnChip("black", getChipSeat()),
                            );
                        document
                            .getElementById("chipBlueBtn")
                            .addEventListener("click", () =>
                                spawnChip("blue", getChipSeat()),
                            );
                        document
                            .getElementById("chipGreenBtn")
                            .addEventListener("click", () =>
                                spawnChip("green", getChipSeat()),
                            );
                        document
                            .getElementById("chipRedBtn")
                            .addEventListener("click", () =>
                                spawnChip("red", getChipSeat()),
                            );
                    } catch (e) {
                        console.warn("Chip button binding failed", e);
                    }

                    // Poker per player action buttons
                    const playerActionContainers = [];
                    for (let i = 0; i < 4; i++) {
                        const container = document.getElementById(
                            `player${i}Actions`,
                        );
                        if (container) {
                            playerActionContainers.push({
                                container,
                                foldBtn: container.querySelector(
                                    '[data-action="fold"]',
                                ),
                                checkBtn: container.querySelector(
                                    '[data-action="check"]',
                                ),
                                betBtn: container.querySelector(
                                    '[data-action="bet"]',
                                ),
                                callBtn: container.querySelector(
                                    '[data-action="call"]',
                                ),
                                raiseBtn: container.querySelector(
                                    '[data-action="raise"]',
                                ),
                            });
                        }
                    }
                    let currentPlayerSeat = 0;
                    let dealerSeat = 0; // track which player is the dealer
                    let waitingForPlayer = false;
                    let communityCards = [];
                    let gamePhase = "preflop"; // preflop, flop, turn, river, showdown
                    let activePlayers = [0, 1, 2, 3]; // players still in the hand
                    let currentPlayerIndex = 0; // index into activePlayers array
                    let playersActedThisRound = new Set(); // track who has acted in current betting round
                    let lastRaiserSeat = -1; // track seat number of who raised last
                    let currentBet = 0; // track if there's a bet to call
                    let handComplete = false; // track if the current hand is finished
                    
                    function getCurrentGameState() {
                        return {
                            type: "gameState",
                            state: {
                                currentPlayerSeat,
                                dealerSeat,
                                gamePhase,
                                activePlayers: [...activePlayers],
                                currentBet,
                                lastRaiserSeat,
                                handComplete,
                                currentPlayerIndex,
                                playersActedThisRound: [...playersActedThisRound],
                                deckOrder: deck.map(d => d.id),
                                dealtCards: dealtCards.map(c => ({
                                    id: c.id,
                                    seat: c.seat,
                                    faceUp: c.faceUp
                                })),
                                communityCards: communityCards.map(c => ({
                                    id: c.id,
                                    faceUp: c.faceUp
                                }))
                            }
                        };
                    }
                    
                    // Expose for peer connection handlers
                    window._getCurrentGameState = getCurrentGameState;
                    
                    // Setup proper message handler
                    function applyGameStateSync(data) {
                        try {
                            if (data.type === 'gameState' && data.state) {
                                const remote = data.state;
                                console.log("Applying game state sync", remote);
                                if (remote.currentPlayerSeat !== undefined) currentPlayerSeat = remote.currentPlayerSeat;
                                if (remote.dealerSeat !== undefined) dealerSeat = remote.dealerSeat;
                                if (remote.gamePhase) gamePhase = remote.gamePhase;
                                if (Array.isArray(remote.activePlayers)) activePlayers = [...remote.activePlayers];
                                if (remote.currentBet !== undefined) currentBet = remote.currentBet;
                                if (remote.lastRaiserSeat !== undefined) lastRaiserSeat = remote.lastRaiserSeat;
                                if (remote.handComplete !== undefined) handComplete = remote.handComplete;
                                if (remote.currentPlayerIndex !== undefined) currentPlayerIndex = remote.currentPlayerIndex;
                                if (Array.isArray(remote.playersActedThisRound)) {
                                    playersActedThisRound = new Set(remote.playersActedThisRound);
                                }
                                if (Array.isArray(remote.deckOrder)) {
                                    const mapped = remote.deckOrder.map(id => deckIds.find(d => d.id === id)).filter(Boolean);
                                    if (mapped.length) deck = mapped;
                                }
                                if (Array.isArray(remote.communityCards)) {
                                    remote.communityCards.forEach((cardData, i) => {
                                        if (communityCards[i] && cardData.faceUp !== undefined) {
                                            communityCards[i].faceUp = cardData.faceUp;
                                        }
                                    });
                                }
                                // Update UI if available
                                if (typeof updateOddsUI === 'function') {
                                    updateOddsUI();
                                }
                                // Reevaluate controls for the current player
                                if (!handComplete && activePlayers.length > 0) {
                                    if (currentPlayerIndex < activePlayers.length) {
                                        const activePlayer = activePlayers[currentPlayerIndex];
                                        enablePlayerControls(true, activePlayer);
                                    }
                                }
                            }
                        } catch (e) {
                            console.warn("Failed to apply game state:", e);
                        }
                    }
                    
                    // Process any pending messages before init
                    if (window._pendingGameState) {
                        applyGameStateSync(window._pendingGameState);
                        delete window._pendingGameState;
                    }
                    
                    // Set up ongoing message processing
                    window._applyGameStateSync = applyGameStateSync;

                    async function applyRemoteAction(msg) {
                        if (!msg || msg.type !== "action") return;
                        const payload = msg.payload || {};
                        suppressNetworkActions = true;
                        try {
                            switch (msg.action) {
                                case "shuffle":
                                    await visualShuffle({
                                        deckOrder: payload.deckOrder,
                                        startAt: payload.startAt,
                                        seed: payload.seed,
                                        skipBroadcast: true,
                                    });
                                    break;
                                case "deal":
                                    await dealPokerHand({
                                        deckOrder: payload.deckOrder,
                                        dealerSeat: payload.dealerSeat,
                                        startAt: payload.startAt,
                                        skipBroadcast: true,
                                    });
                                    break;
                                case "playerCheck":
                                    await playerCheck({
                                        seat: payload.seat,
                                        force: true,
                                        skipBroadcast: true,
                                    });
                                    break;
                                case "playerBet":
                                    await playerBet({
                                        seat: payload.seat,
                                        force: true,
                                        skipBroadcast: true,
                                    });
                                    break;
                                case "playerCall":
                                    await playerCall({
                                        seat: payload.seat,
                                        force: true,
                                        skipBroadcast: true,
                                    });
                                    break;
                                case "playerFold":
                                    await playerFold({
                                        seat: payload.seat,
                                        force: true,
                                        skipBroadcast: true,
                                    });
                                    break;
                                case "playerRaise":
                                    await playerRaise({
                                        seat: payload.seat,
                                        force: true,
                                        skipBroadcast: true,
                                    });
                                    break;
                                case "chat":
                                    appendThreadMessage({
                                        seat: payload.seat,
                                        text: payload.text,
                                        ts: payload.ts,
                                    });
                                    break;
                                default:
                                    break;
                            }
                        } catch (e) {
                            console.warn("Failed to apply remote action", msg, e);
                        } finally {
                            suppressNetworkActions = false;
                        }
                    }
                    
                    function syncGameState() {
                        if (suppressNetworkActions) return;
                        try {
                            const stateData = {
                                type: "gameState",
                                state: {
                                    currentPlayerSeat,
                                    dealerSeat,
                                    gamePhase,
                                    activePlayers: [...activePlayers],
                                    currentBet,
                                    lastRaiserSeat,
                                    handComplete,
                                    communityCards: communityCards.map(c => ({
                                        id: c.id,
                                        faceUp: c.faceUp
                                    }))
                                }
                            };
                            broadcast(stateData);
                            console.log("Sent game state sync", stateData);
                        } catch (e) {
                            console.warn("Failed to sync game state:", e);
                        }
                    }

                    // Post small/big blinds before each deal
                    async function postBlinds(opts = {}) {
                        const skipBroadcast = opts.skipBroadcast || suppressNetworkActions;
                        const smallSeat = (dealerSeat + 1) % seatCount;
                        const bigSeat = (dealerSeat + 2) % seatCount;
                        try {
                            document.getElementById("log").textContent =
                                `Posting blinds: SB Player ${smallSeat + 1} (red), BB Player ${bigSeat + 1} (blue)`;
                        } catch (e) {}

                        // spawn chips at player seats
                        const sbChip = spawnChip("red", smallSeat, {
                            skipBroadcast,
                        }); // small blind = red chip
                        const bbChip = spawnChip("blue", bigSeat, {
                            skipBroadcast,
                        }); // big blind = blue chip

                        // move blinds into the pot
                        try {
                            await Promise.all([
                                animateSingleChipTransfer(sbChip, "pot", {
                                    duration: 750,
                                }),
                                animateSingleChipTransfer(bbChip, "pot", {
                                    duration: 750,
                                }),
                            ]);
                        } catch (e) {
                            console.warn("blind transfer failed", e);
                        }
                    }

                    let recommendationRevision = 0;
                    let recommendationRequestNonce = 0;
                    let lastRecommendationKey = "";
                    let lastRecommendationResult = null;

                    function clearActionRecommendation() {
                        for (const p of playerActionContainers) {
                            if (!p || !p.container) continue;
                            const btns = p.container.querySelectorAll("button");
                            btns.forEach((b) => {
                                b.classList.remove("recommendedAction");
                                b.removeAttribute("title");
                            });
                        }
                    }

                    function buttonForAction(playerBtns, action) {
                        if (!playerBtns) return null;
                        if (action === "fold") return playerBtns.foldBtn || null;
                        if (action === "check") return playerBtns.checkBtn || null;
                        if (action === "bet") return playerBtns.betBtn || null;
                        if (action === "call") return playerBtns.callBtn || null;
                        if (action === "raise") return playerBtns.raiseBtn || null;
                        return null;
                    }

                    function getAvailableActionsForSeat(seat) {
                        const p = playerActionContainers[seat];
                        if (!p) return [];
                        const out = [];
                        const map = [
                            ["fold", p.foldBtn],
                            ["check", p.checkBtn],
                            ["bet", p.betBtn],
                            ["call", p.callBtn],
                            ["raise", p.raiseBtn],
                        ];
                        for (const [name, btn] of map) {
                            if (btn && !btn.disabled) out.push(name);
                        }
                        return out;
                    }

                    function compareSortKeysDesc(a = [], b = []) {
                        for (let i = 0; i < Math.min(a.length, b.length); i++) {
                            if (a[i] > b[i]) return 1;
                            if (a[i] < b[i]) return -1;
                        }
                        return 0;
                    }

                    function getSeatHoleCardIds(seat) {
                        return dealtCards
                            .filter((c) => c && c.seat === seat && c.id)
                            .map((c) => c.id);
                    }

                    function getRevealedCommunityIds() {
                        return communityCards
                            .filter((c) => c && c.id && c.faceUp !== false)
                            .map((c) => c.id);
                    }

                    function pickRandomWithoutReplacement(pool, count) {
                        const arr = pool.slice();
                        const out = [];
                        const max = Math.min(count, arr.length);
                        for (let i = 0; i < max; i++) {
                            const idx = Math.floor(Math.random() * arr.length);
                            out.push(arr[idx]);
                            arr[idx] = arr[arr.length - 1];
                            arr.pop();
                        }
                        return out;
                    }

                    function estimateWinOddsForSeat(seat, iterations = 1000) {
                        const heroHole = getSeatHoleCardIds(seat);
                        const board = getRevealedCommunityIds();
                        if (heroHole.length < 2) {
                            return {
                                winRate: 0,
                                tieRate: 0,
                                lossRate: 1,
                                equity: 0,
                                opponents: 0,
                                samples: 0,
                            };
                        }

                        const opponents = Math.max(
                            1,
                            activePlayers.filter((p) => p !== seat).length,
                        );
                        const known = new Set([...heroHole, ...board]);
                        const fullIds = deckIds.map((d) => d.id);
                        const remaining = fullIds.filter((id) => !known.has(id));

                        let wins = 0;
                        let ties = 0;
                        let losses = 0;

                        for (let n = 0; n < iterations; n++) {
                            const cardsNeeded =
                                opponents * 2 + Math.max(0, 5 - board.length);
                            if (remaining.length < cardsNeeded) break;
                            const draw = pickRandomWithoutReplacement(
                                remaining,
                                cardsNeeded,
                            );

                            let cursor = 0;
                            const oppHands = [];
                            for (let o = 0; o < opponents; o++) {
                                oppHands.push([draw[cursor], draw[cursor + 1]]);
                                cursor += 2;
                            }

                            const runout = draw.slice(
                                cursor,
                                cursor + Math.max(0, 5 - board.length),
                            );
                            const finalBoard = board.concat(runout).slice(0, 5);
                            const heroEval = evaluatePokerHand(
                                heroHole
                                    .concat(finalBoard)
                                    .map((id) => ({ id })),
                            );

                            let betterFound = false;
                            let tieFound = false;
                            for (const opp of oppHands) {
                                const oppEval = evaluatePokerHand(
                                    opp.concat(finalBoard).map((id) => ({ id })),
                                );
                                const cmp = compareSortKeysDesc(
                                    oppEval.sortKey || [0],
                                    heroEval.sortKey || [0],
                                );
                                if (cmp > 0) {
                                    betterFound = true;
                                    break;
                                }
                                if (cmp === 0) tieFound = true;
                            }

                            if (betterFound) losses++;
                            else if (tieFound) ties++;
                            else wins++;
                        }

                        const total = wins + ties + losses;
                        if (total <= 0) {
                            return {
                                winRate: 0,
                                tieRate: 0,
                                lossRate: 1,
                                equity: 0,
                                opponents,
                                samples: 0,
                            };
                        }
                        const winRate = wins / total;
                        const tieRate = ties / total;
                        const lossRate = losses / total;
                        const equity = winRate + tieRate * 0.5;
                        return {
                            winRate,
                            tieRate,
                            lossRate,
                            equity,
                            opponents,
                            samples: total,
                        };
                    }

                    function chooseRecommendedAction(available, odds) {
                        const has = (name) => available.includes(name);
                        const eq = odds.equity || 0;
                        const opp = Math.max(1, odds.opponents || 1);

                        if (currentBet <= 0) {
                            if (eq >= 0.72) {
                                if (has("raise")) return "raise";
                                if (has("bet")) return "bet";
                            }
                            if (eq >= 0.56) {
                                if (has("bet")) return "bet";
                                if (has("raise")) return "raise";
                            }
                            if (has("check")) return "check";
                            if (has("bet")) return "bet";
                            if (has("raise")) return "raise";
                            if (has("call")) return "call";
                            return has("fold") ? "fold" : "check";
                        }

                        let phaseAdjust = 0;
                        if (gamePhase === "preflop") phaseAdjust = 0.05;
                        else if (gamePhase === "flop") phaseAdjust = 0.02;
                        else if (gamePhase === "turn") phaseAdjust = 0.0;
                        else if (gamePhase === "river") phaseAdjust = -0.02;
                        const callThreshold = 0.42 + (opp - 1) * 0.03 + phaseAdjust;
                        const raiseThreshold = callThreshold + 0.18;

                        if (eq >= raiseThreshold && has("raise")) return "raise";
                        if (eq >= callThreshold) {
                            if (has("call")) return "call";
                            if (has("check")) return "check";
                        }
                        if (has("check")) return "check";
                        if (has("fold")) return "fold";
                        if (has("call")) return "call";
                        if (has("bet")) return "bet";
                        return has("raise") ? "raise" : "fold";
                    }

                    function applyActionRecommendation(seat, recommendation) {
                        clearActionRecommendation();
                        const p = playerActionContainers[seat];
                        if (!p || !recommendation || !recommendation.action)
                            return;
                        const btn = buttonForAction(p, recommendation.action);
                        if (!btn || btn.disabled) return;
                        btn.classList.add("recommendedAction");
                        const eqPct = Math.round((recommendation.odds.equity || 0) * 100);
                        const winPct = Math.round((recommendation.odds.winRate || 0) * 100);
                        const tiePct = Math.round((recommendation.odds.tieRate || 0) * 100);
                        const opp = recommendation.odds.opponents || 0;
                        btn.title = `Best action by odds: ${recommendation.action.toUpperCase()} | equity ${eqPct}% (win ${winPct}% / tie ${tiePct}%) vs ${opp} opponent${opp === 1 ? "" : "s"}`;
                    }

                    function scheduleActionRecommendation(seat, opts = {}) {
                        const force = opts.force === true;
                        const p = playerActionContainers[seat];
                        if (!p || !p.container || !p.container.classList.contains("active")) {
                            clearActionRecommendation();
                            return;
                        }

                        const available = getAvailableActionsForSeat(seat);
                        if (!available.length) {
                            clearActionRecommendation();
                            return;
                        }
                        const hole = getSeatHoleCardIds(seat).sort();
                        const board = getRevealedCommunityIds().sort();
                        const key = JSON.stringify({
                            seat,
                            gamePhase,
                            currentBet,
                            activePlayers: activePlayers.slice().sort((a, b) => a - b),
                            available,
                            hole,
                            board,
                            recommendationRevision,
                        });

                        if (!force && key === lastRecommendationKey && lastRecommendationResult) {
                            return;
                        }

                        const nonce = ++recommendationRequestNonce;
                        setTimeout(() => {
                            if (nonce !== recommendationRequestNonce) return;
                            const samples = board.length < 3 ? 400 : 520;
                            const odds = estimateWinOddsForSeat(seat, samples);
                            const action = chooseRecommendedAction(available, odds);
                            const recommendation = { action, odds };
                            if (nonce !== recommendationRequestNonce) return;
                            lastRecommendationKey = key;
                            lastRecommendationResult = recommendation;
                            applyActionRecommendation(seat, recommendation);
                        }, 0);
                    }

                    function enablePlayerControls(enabled, seat) {
                        // Hide all player action buttons first
                        playerActionContainers.forEach((p) => {
                            if (p.container)
                                p.container.classList.remove("active");
                        });
                        clearActionRecommendation();

                        if (!enabled || seat === undefined) return;

                        // Only show controls for your own seat or host takes precedence
                        if (mySeat >= 0 && seat !== mySeat) {
                            const seatTaken = [...seatAssignments.values()].includes(seat);
                            if (!isHost || seatTaken) return;
                        }

                        const playerBtns = playerActionContainers[seat];
                        if (!playerBtns) return;

                        // Show and enable buttons for current player
                        playerBtns.container.classList.add("active");
                        playerBtns.foldBtn.disabled = false;
                        playerBtns.raiseBtn.disabled = false;

                        // poker bet logic
                        if (currentBet === 0) {
                            playerBtns.checkBtn.disabled = false;
                            playerBtns.betBtn.disabled = false;
                            playerBtns.callBtn.disabled = true;
                        } else {
                            playerBtns.checkBtn.disabled = true;
                            playerBtns.betBtn.disabled = true;
                            playerBtns.callBtn.disabled = false;
                        }
                        scheduleActionRecommendation(seat, { force: true });
                    }

                    function evaluatePokerHand(cards) {
                        if (!cards || cards.length < 5)
                            return { rank: 0, desc: "Insufficient cards" };

                        // Parse cardinfo
                        const parsed = cards
                            .map((c) => {
                                const id = c.id || "";
                                const parts = id.split("-");
                                const suit = parts[0] || "";
                                const rank = parts[1] || "";
                                let value = 0;
                                if (rank === "ace") value = 14;
                                else if (rank === "king") value = 13;
                                else if (rank === "queen") value = 12;
                                else if (rank === "jack") value = 11;
                                else value = parseInt(rank, 10) || 0;
                                return { suit, rank, value };
                            })
                            .filter((c) => c.value > 0);

                        if (parsed.length < 5)
                            return { rank: 0, desc: "Insufficient cards" };

                        // numeric rank -> name
                        const nameFor = (v) => {
                            if (v === 14) return "Ace";
                            if (v === 13) return "King";
                            if (v === 12) return "Queen";
                            if (v === 11) return "Jack";
                            return String(v);
                        };
                        const pluralName = (v) => nameFor(v) + "s";

                        // evaluate a single 5-card hand
                        function evaluateHand5(hand5) {
                            const sorted = hand5
                                .slice()
                                .sort((a, b) => b.value - a.value);

                            // Check for flush
                            const isFlush = sorted.every(
                                (c) => c.suit === sorted[0].suit,
                            );

                            // Check for straight
                            const values = sorted.map((c) => c.value);
                            let isStraight = false;
                            let straightHigh = 0;

                            // First check standard straight
                            const uniqueVals = [...new Set(values)].sort(
                                (a, b) => b - a,
                            );
                            if (
                                uniqueVals.length === 5 &&
                                uniqueVals[0] - uniqueVals[4] === 4
                            ) {
                                isStraight = true;
                                straightHigh = uniqueVals[0];
                            }

                            // Check for wheel (A-2-3-4-5) - Ace plays low
                            if (
                                !isStraight &&
                                uniqueVals.length === 5 &&
                                uniqueVals.includes(14) &&
                                uniqueVals.includes(2) &&
                                uniqueVals.includes(3) &&
                                uniqueVals.includes(4) &&
                                uniqueVals.includes(5)
                            ) {
                                isStraight = true;
                                straightHigh = 5; // In a wheel, the 5 is high
                            }

                            // Count ranks for pairs, trips, quads
                            const rankCounts = {};
                            sorted.forEach((c) => {
                                rankCounts[c.value] =
                                    (rankCounts[c.value] || 0) + 1;
                            });

                            // Get counts sorted by frequency, then by rank value
                            const countArray = Object.entries(rankCounts).map(
                                ([val, count]) => ({
                                    value: parseInt(val),
                                    count: count,
                                }),
                            );
                            countArray.sort((a, b) => {
                                if (b.count !== a.count)
                                    return b.count - a.count;
                                return b.value - a.value;
                            });

                            const counts = countArray.map((x) => x.count);
                            const rankValues = countArray.map((x) => x.value);

                            // Evaluate hand priority
                            if (isStraight && isFlush) {
                                if (straightHigh === 14)
                                    return {
                                        rank: 10,
                                        desc: "Royal Flush",
                                        sortKey: [10, 14],
                                    };
                                return {
                                    rank: 9,
                                    desc: `Straight Flush, ${nameFor(straightHigh)} high`,
                                    sortKey: [9, straightHigh],
                                };
                            }
                            if (counts[0] === 4) {
                                return {
                                    rank: 8,
                                    desc: `Four of a Kind, ${pluralName(rankValues[0])}`,
                                    sortKey: [8, rankValues[0], rankValues[1]],
                                };
                            }
                            if (counts[0] === 3 && counts[1] === 2) {
                                return {
                                    rank: 7,
                                    desc: `Full House, ${pluralName(rankValues[0])} over ${pluralName(rankValues[1])}`,
                                    sortKey: [7, rankValues[0], rankValues[1]],
                                };
                            }
                            if (isFlush) {
                                return {
                                    rank: 6,
                                    desc: `Flush, ${nameFor(rankValues[0])} high`,
                                    sortKey: [6, ...rankValues],
                                };
                            }
                            if (isStraight) {
                                return {
                                    rank: 5,
                                    desc: `Straight, ${nameFor(straightHigh)} high`,
                                    sortKey: [5, straightHigh],
                                };
                            }
                            if (counts[0] === 3) {
                                return {
                                    rank: 4,
                                    desc: `Three of a Kind, ${pluralName(rankValues[0])}`,
                                    sortKey: [
                                        4,
                                        rankValues[0],
                                        rankValues[1],
                                        rankValues[2],
                                    ],
                                };
                            }
                            if (counts[0] === 2 && counts[1] === 2) {
                                return {
                                    rank: 3,
                                    desc: `Two Pair, ${pluralName(rankValues[0])} and ${pluralName(rankValues[1])}`,
                                    sortKey: [
                                        3,
                                        rankValues[0],
                                        rankValues[1],
                                        rankValues[2],
                                    ],
                                };
                            }
                            if (counts[0] === 2) {
                                return {
                                    rank: 2,
                                    desc: `Pair of ${pluralName(rankValues[0])}`,
                                    sortKey: [
                                        2,
                                        rankValues[0],
                                        rankValues[1],
                                        rankValues[2],
                                        rankValues[3],
                                    ],
                                };
                            }
                            // High card
                            return {
                                rank: 1,
                                desc: `High Card, ${nameFor(rankValues[0])}`,
                                sortKey: [1, ...rankValues],
                            };
                        }

                        // generate all 5-card combinations from array
                        function combinations(arr, size) {
                            const result = [];
                            function helper(start, combo) {
                                if (combo.length === size) {
                                    result.push(combo.slice());
                                    return;
                                }
                                for (let i = start; i < arr.length; i++) {
                                    combo.push(arr[i]);
                                    helper(i + 1, combo);
                                    combo.pop();
                                }
                            }
                            helper(0, []);
                            return result;
                        }

                        function compareSortKeys(a, b) {
                            for (
                                let i = 0;
                                i < Math.min(a.length, b.length);
                                i++
                            ) {
                                if (a[i] > b[i]) return 1;
                                if (a[i] < b[i]) return -1;
                            }
                            return 0;
                        }

                        // Find best hand from all possible 5-card combinations
                        let bestHand = {
                            rank: 0,
                            desc: "No hand",
                            sortKey: [0],
                        };
                        const allCombos = combinations(parsed, 5);
                        for (const combo of allCombos) {
                            const handEval = evaluateHand5(combo);
                            if (
                                compareSortKeys(
                                    handEval.sortKey,
                                    bestHand.sortKey,
                                ) > 0
                            ) {
                                bestHand = handEval;
                            }
                        }

                        return {
                            rank: bestHand.rank,
                            desc: bestHand.desc,
                            sortKey: bestHand.sortKey,
                        };
                    }

                    async function setupPlayerTurn() {
                        if (handComplete) return;
                        if (activePlayers.length === 0) return;
                        // ensure currentPlayerIndex is valid
                        if (currentPlayerIndex >= activePlayers.length)
                            currentPlayerIndex = 0;
                        currentPlayerSeat = activePlayers[currentPlayerIndex];
                        waitingForPlayer = true;
                        enablePlayerControls(true, currentPlayerSeat);
                        const phaseText =
                            gamePhase.charAt(0).toUpperCase() +
                            gamePhase.slice(1);
                        const dealerText =
                            currentPlayerSeat === dealerSeat ? " (Dealer)" : "";
                        try {
                            document.getElementById("log").textContent =
                                `${phaseText} - Player ${currentPlayerSeat + 1}'s turn${dealerText}`;
                        } catch (e) {}
                    }

                    async function finishPlayerTurn() {
                        // disable controls while processing
                        enablePlayerControls(false);
                        waitingForPlayer = false;

                        // Mark current player as having acted
                        playersActedThisRound.add(currentPlayerSeat);

                        await wait(500);

                        // Check if betting round is complete
                        const allPlayersActed = activePlayers.every((p) =>
                            playersActedThisRound.has(p),
                        );
                        const bettingComplete = allPlayersActed;

                        if (bettingComplete) {
                            // Betting round complete - advance to next phase
                            playersActedThisRound.clear();
                            lastRaiserSeat = -1;
                            currentPlayerIndex = 0;
                            currentBet = 0; // reset bet for next round
                            try {
                                await advanceGamePhase();
                            } catch (e) {
                                console.error("advanceGamePhase error", e);
                            }
                        } else {
                            currentPlayerIndex =
                                (currentPlayerIndex + 1) % activePlayers.length;
                            await wait(300);
                            try {
                                await setupPlayerTurn();
                            } catch (e) {
                                console.error("setupPlayerTurn error", e);
                            }
                        }
                    }

                    async function playerCheck(opts = {}) {
                        const seat =
                            typeof opts.seat === "number"
                                ? opts.seat
                                : currentPlayerSeat;
                        const force = opts.force === true;
                        const skipBroadcast =
                            opts.skipBroadcast || suppressNetworkActions;
                        if (!force && !waitingForPlayer) return;
                        currentPlayerSeat = seat;
                        if (force) waitingForPlayer = true;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${seat + 1} checks`;
                        } catch (e) {}
                        if (!skipBroadcast)
                            emitAction("playerCheck", { seat });
                        syncGameState();
                        await finishPlayerTurn();
                    }

                    async function playerBet(opts = {}) {
                        const seat =
                            typeof opts.seat === "number"
                                ? opts.seat
                                : currentPlayerSeat;
                        const force = opts.force === true;
                        const skipBroadcast =
                            opts.skipBroadcast || suppressNetworkActions;
                        if (!force && !waitingForPlayer) return;
                        currentPlayerSeat = seat;
                        if (force) waitingForPlayer = true;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${seat + 1} bets`;
                        } catch (e) {}
                        if (!skipBroadcast)
                            emitAction("playerBet", { seat });
                        // Spawn chip and move to pot
                        spawnChip("blue", seat, {
                            skipBroadcast: true,
                        });
                        await wait(200);
                        await animateChipTransferBetweenSeats(
                            seat,
                            "pot",
                            { duration: 600 },
                        );
                        // Bet initiates the betting
                        currentBet = 1; // mark bet
                        lastRaiserSeat = seat; // better is raiser for round completion
                        // Clear previous actions
                        playersActedThisRound.clear();
                        playersActedThisRound.add(seat);
                        syncGameState();
                        await finishPlayerTurn();
                    }

                    async function playerCall(opts = {}) {
                        const seat =
                            typeof opts.seat === "number"
                                ? opts.seat
                                : currentPlayerSeat;
                        const force = opts.force === true;
                        const skipBroadcast =
                            opts.skipBroadcast || suppressNetworkActions;
                        if (!force && !waitingForPlayer) return;
                        currentPlayerSeat = seat;
                        if (force) waitingForPlayer = true;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${seat + 1} calls`;
                        } catch (e) {}
                        if (!skipBroadcast)
                            emitAction("playerCall", { seat });
                        // Spawn chip and move to pot
                        spawnChip("blue", seat, { skipBroadcast: true });
                        await wait(200);
                        await animateChipTransferBetweenSeats(
                            seat,
                            "pot",
                            { duration: 600 },
                        );
                        syncGameState();
                        await finishPlayerTurn();
                    }

                    async function playerFold(opts = {}) {
                        const seat =
                            typeof opts.seat === "number"
                                ? opts.seat
                                : currentPlayerSeat;
                        const force = opts.force === true;
                        const skipBroadcast =
                            opts.skipBroadcast || suppressNetworkActions;
                        if (!force && !waitingForPlayer) return;
                        currentPlayerSeat = seat;
                        if (force) waitingForPlayer = true;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${seat + 1} folds`;
                        } catch (e) {}

                        if (!skipBroadcast)
                            emitAction("playerFold", { seat });

                        // fold logic
                        const foldedIndex = activePlayers.indexOf(seat);
                        activePlayers = activePlayers.filter(
                            (p) => p !== seat,
                        );
                        playersActedThisRound.delete(seat);
                        
                        syncGameState();

                        // Adjust currentPlayerIndex after removal
                        if (foldedIndex < currentPlayerIndex) {
                            currentPlayerIndex--;
                        }
                        if (currentPlayerIndex >= activePlayers.length)
                            currentPlayerIndex = 0;

                        await wait(500);

                        // Check if only one player remains
                        if (activePlayers.length === 1) {
                            try {
                                document.getElementById("log").textContent =
                                    `Player ${activePlayers[0] + 1} wins by default!`;
                            } catch (e) {}
                            if (mySeat >= 0 && activePlayers[0] === mySeat) {
                                try {
                                    triggerWinnerConfetti();
                                } catch (e) {
                                    console.warn("winner confetti failed", e);
                                }
                            }
                            waitingForPlayer = false;
                            enablePlayerControls(false);
                            // Transfer chips to winner
                            await wait(800);
                            for (let s = 0; s < 4; s++) {
                                if (s !== activePlayers[0])
                                    await animateChipTransferBetweenSeats(
                                        s,
                                        activePlayers[0],
                                    );
                            }
                            return;
                        }

                        // Continue to next player
                        waitingForPlayer = false;
                        enablePlayerControls(false);

                        // Check if betting round is complete
                        const allPlayersActed = activePlayers.every((p) =>
                            playersActedThisRound.has(p),
                        );
                        const bettingComplete = allPlayersActed;
                        if (bettingComplete) {
                            playersActedThisRound.clear();
                            lastRaiserSeat = -1;
                            currentPlayerIndex = 0;
                            currentBet = 0;
                            try {
                                await advanceGamePhase();
                            } catch (e) {
                                console.error("advanceGamePhase error", e);
                            }
                        } else {
                            await wait(300);
                            try {
                                await setupPlayerTurn();
                            } catch (e) {
                                console.error("setupPlayerTurn error", e);
                            }
                        }
                    }

                    async function playerRaise(opts = {}) {
                        const seat =

                                ? opts.seat

                        const force = opts.force === true;
                        const skipBroadcast =
                            opts.skipBroadcast || suppressNetworkActions;

                        currentPlayerSeat = seat;

                                `Player ${seat + 1} raises`;

                        if (!skipBroadcast)
                            emitAction("playerRaise", { seat });

                        currentBet = 1; // mark bet
                        lastRaiserSeat = seat; // store seat number
                        // Keep round actions accumulated so the round can close

                    async function loadAllTextures() {
                        textures = {};
                        const promises = deckIds.map((c) => {
                            const path = `cards/${c.suit}/${c.rank}.webp`;
                            return new Promise((res) => {

                            !!backTexture,
                        );
                    }

                    const cardObjects = [];
                    const dealtCards = [];
                    const burningCardObjects = new Set();
                    let burnFxRevision = 0;

                    function disposeCard(o) {
                        if (!o || !o.mesh) return;
                        try {
                            if (o.mesh.parent) o.mesh.parent.remove(o.mesh);
                        } catch (e) {}
                        // dispose geometry
                        if (o.mesh.geometry && o.mesh.geometry.dispose)
                            o.mesh.geometry.dispose();
                        // dispose materials and maps
                        const mats = Array.isArray(o.mesh.material)
                            ? o.mesh.material
                            : [o.mesh.material];
                        // dispose any cloned maps
                        if (o._maps && Array.isArray(o._maps)) {
                            o._maps.forEach((map) => {
                                try {
                                    if (map && map.dispose) map.dispose();
                                } catch (e) {}
                            });
                        }
                        mats.forEach((m) => {
                            try {
                                if (m) m.dispose();
                            } catch (e) {}
                        });
                    }

                    function resetBurnEffects() {
                        burnFxRevision++;
                        burningCardObjects.forEach((o) => {
                            try {
                                disposeCard(o);
                            } catch (e) {}
                        });
                        burningCardObjects.clear();
                    }

                    function makeCardObject(cardId) {
                        // clone textures
                        const baseFront = textures[cardId] || null;
                        const baseBack = backTexture || null;
                        const frontTex =
                            baseFront && baseFront.clone
                                ? baseFront.clone()
                                : placeholderTexture(cardId);
                        const backTex =
                            baseBack && baseBack.clone
                                ? baseBack.clone()
                                : placeholderTexture("back");
                        // ensure cloned textures use the correct orientation
                        try {
                            frontTex.flipY = true;
                            backTex.flipY = true;
                        } catch (e) {}
                        // use ClampToEdgeWrapping and default repeat/offset.
                        try {
                            frontTex.wrapS = THREE.ClampToEdgeWrapping;
                            frontTex.repeat.x = 1;
                            frontTex.offset.x = 0;
                        } catch (e) {}
                        try {
                            backTex.wrapS = THREE.ClampToEdgeWrapping;
                            backTex.repeat.x = 1;
                            backTex.offset.x = 0;
                        } catch (e) {}
                        try {
                            //frontTex.encoding = THREE.sRGBEncoding;
                            //backTex.encoding = THREE.sRGBEncoding;
                            frontTex.colorSpace = THREE.SRGBColorSpace;
                            backTex.colorSpace = THREE.SRGBColorSpace;
                        } catch (e) {}
                        // Improve sampling to reduce texture edge bleeding
                        try {
                            const maxAniso =
                                renderer.capabilities.getMaxAnisotropy();
                            frontTex.anisotropy = maxAniso;
                            backTex.anisotropy = maxAniso;
                            // linear filters without mipmaps to keep alpha stable
                            frontTex.minFilter = THREE.LinearFilter;
                            frontTex.magFilter = THREE.LinearFilter;
                            backTex.minFilter = THREE.LinearFilter;
