<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Control Intro Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0e1113;
    color: #cfd3d6;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* Fake app content to show site remains functional */
  .content {
    padding: 40px;
  }

  button {
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
  }

  /* ==============================
     CONTROL INTRO OVERLAY
     ============================== */

  #intro-title {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;

    font-size: clamp(3.5rem, 9vw, 9rem);
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;

    color: #f2f2f2;

    text-shadow:
      0 0 12px rgba(255,255,255,0.08),
      0 0 32px rgba(255,255,255,0.04);

    background:
      radial-gradient(
        ellipse at center,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.65) 100%
      );

    pointer-events: none;
    z-index: 9999;

    opacity: 0;
    filter: blur(10px);
    transform: scale(1.02);

    animation: controlIntro 4.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes controlIntro {
    0% {
      opacity: 0;
      filter: blur(10px);
      transform: scale(1.02);
    }

    18% {
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
    }

    70% {
      opacity: 1;
      filter: blur(0);
    }

    100% {
      opacity: 0;
      filter: blur(6px);
    }
  }
</style>
</head>

<body>

  <!-- Intro Overlay -->
  <div id="intro-title">CONTROL</div>

  <!-- Normal site content -->
  <div class="content">
    <h1>Application UI</h1>
    <p>
      The page is fully interactive while the intro plays.
      Try clicking the button immediately.
    </p>
    <button onclick="alert('Site is still functional')">
      Test Interaction
    </button>
  </div>

<script>
  // Remove overlay after animation finishes
  window.addEventListener("load", () => {
    const intro = document.getElementById("intro-title");
    setTimeout(() => intro.remove(), 4500);
  });
</script>

</body>
</html>
