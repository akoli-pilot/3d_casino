<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Roulette (three.js)</title>
  <style>
    html,body{height:100%;margin:0;background:#071718;font-family:Inter,system-ui,Arial}
    .ui{position:absolute;left:12px;top:12px;z-index:5;color:#cfeff0}
    .ui button{background:#0d6b75;border:0;padding:8px 12px;border-radius:8px;color:white;margin-right:8px;cursor:pointer}
    .ui label{color:#9fd6db;margin-left:8px}
    #info{position:absolute;right:12px;top:12px;color:#bfe9ee;z-index:5;background:rgba(0,0,0,0.25);padding:8px;border-radius:8px}
    canvas{display:block}
    .log{position:fixed;left:12px;bottom:12px;color:#9fd6db;background:rgba(0,0,0,0.25);padding:6px;border-radius:6px;font-size:12px}
    /* Betting board */
    .board{position:absolute;left:12px;top:64px;z-index:6;background:rgba(0,0,0,0.25);padding:8px;border-radius:8px;display:grid;grid-template-columns:repeat(6,44px);gap:6px}
    /* Betting UI (grid table + chip selector) */
    .bet-ui{position:absolute;left:12px;top:64px;z-index:6;background:rgba(0,0,0,0.25);padding:10px;border-radius:8px;color:#cfeff0;display:flex;gap:8px;align-items:flex-start}
    .chip-selector{display:flex;flex-direction:column;gap:8px;margin-right:8px}
    .chip{width:44px;height:28px;border-radius:16px;background:#ffd54a;color:#00221a;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;box-shadow:0 2px 0 rgba(0,0,0,0.25)}
    .chip.selected{outline:3px solid rgba(255,215,74,0.18)}
    .tableGrid{display:grid;grid-template-columns:repeat(3,58px);grid-auto-rows:36px;gap:6px;background:transparent;padding:6px;border-radius:6px}
    .tableGrid .cell{background:#123036;border-radius:6px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-weight:700}
    .cell.green{background:#0a7f3a}
    .cell.red{background:#9f1212}
    .cell.black{background:#0b0b0b}
    .cell .chipStack{position:absolute;right:4px;bottom:4px;display:flex;flex-direction:column;gap:2px;align-items:flex-end}
    .cell .chipStack .chipMini{width:28px;height:16px;border-radius:8px;background:#ffd54a;color:#00221a;font-size:11px;display:flex;align-items:center;justify-content:center}
    .tableTop{display:grid;grid-template-columns:repeat(2,58px);gap:6px;margin-bottom:8px}
    #betsDisplay{position:fixed;left:12px;top:420px;color:#cfeff0;background:rgba(0,0,0,0.25);padding:8px;border-radius:6px;z-index:6;font-size:13px}
    #betsDisplay{position:fixed;left:12px;top:220px;color:#cfeff0;background:rgba(0,0,0,0.25);padding:8px;border-radius:6px;z-index:6;font-size:13px}

    #intro-title {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;

                font-size: clamp(3.5rem, 9vw, 9rem);
                font-weight: 800;
                letter-spacing: 0.12em;
                text-transform: uppercase;

                color: #f2f2f2;

                text-shadow:
                    0 0 12px rgba(255, 255, 255, 0.08),
                    0 0 32px rgba(255, 255, 255, 0.04);

                background:
                    radial-gradient(
                        ellipse at center,
                        rgba(0, 0, 0, 0.35) 0%,
                        rgba(0, 0, 0, 0.65) 100%
                    );

                pointer-events: none;
                z-index: 9999;

                opacity: 0;
                filter: blur(10px);
                transform: scale(1.02);

                animation: controlIntro 4.5s cubic-bezier(0.4, 0, 0.2, 1)
                    forwards;
            }

            @keyframes controlIntro {
                0% {
                    opacity: 0;
                    filter: blur(10px);
                    transform: scale(1.02);
                }

                18% {
                    opacity: 1;
                    filter: blur(0);
                    transform: scale(1);
                }

                70% {
                    opacity: 1;
                    filter: blur(0);
                }

                100% {
                    opacity: 0;
                    filter: blur(6px);
                }
            }

  </style>

</head>
<body>
  <div id="intro-title">ROULETTE</div>
  <div class="ui">
    <button id="spinBtn">Spin</button>
    <button id="resetBtn">Reset</button>
    <label>Speed <input id="speed" type="range" min="0.1" max="3" step="0.1" value="3"></label>
  <!-- Chip spawn buttons -->
  <button id="chipBlackBtn" type="button">Black: $100</button>
  <button id="chipBlueBtn"  type="button">Blue: $10</button>
  <button id="chipGreenBtn" type="button">Green: $25</button>
  <button id="chipRedBtn"   type="button">Red: $5</button>
  <span id="hoveredNumber" style="margin-left:12px;color:#9fd6db;font-size:13px;">Hover over a number</span>
  </div>
  <div class="log" id="log">Initializing…</div>
  

  <script type="importmap">
			{
				"imports": {
					"three": "./three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  console.log(THREE.REVISION);
  // r180
  (async ()=>{
    document.getElementById('log').textContent = 'Initializing roulette…';
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x071718);
    const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
    camera.position.set(0, 8, 18);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    function setColorTextureSpace(tex){
      if(!tex) return;
      if('colorSpace' in tex) tex.colorSpace = THREE.SRGBColorSpace;
      //else tex.encoding = THREE.sRGBEncoding;
    }

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI/2.1;
    // Control distance to prevent frustrum culling
    controls.maxDistance = 44;

    const hemi = new THREE.HemisphereLight(0xffffff, 0x222222, 3.0); hemi.position.set(0,20,0); scene.add(hemi);
    const dir = new THREE.DirectionalLight(0xffffff, 1.0); dir.position.set(6,12,6); dir.castShadow = true; scene.add(dir);
    scene.add(new THREE.AmbientLight(0xffffff, 1.00));

    // floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(60,60), new THREE.MeshStandardMaterial({color:0x081616, roughness:0.95}));
    floor.rotation.x = -Math.PI/2; floor.position.y = -0.01; floor.receiveShadow = true; scene.add(floor);




    // roulette params
    const pocketCount = 38; // include 0 and 00
    const wheelRadius = 6.2;
    const wheelThickness = 0.6;
    const wheelY = 0.8;
    const wheelSegments = pocketCount;
    const pocketLabels = [
      '0','8','28','26','30','11','7','20','32','17','5','22','34','15','3','24','36','13','1','00',
      '27','10','25','29','12','19','9','31','18','6','21','33','16','4','23','35','14','2'
    ];
    // create wheel as a Three.js Group composed of extruded pocket wedges
    function createRouletteWheel(){
      const group = new THREE.Group();
      const innerR = wheelRadius * 0.78;
      // use global pocketLabels
      const numbers = pocketLabels;

      // Use explicit number -> color mapping (per provided lists)
      const RED_NUMBERS = new Set([
        '1','3','5','7','9','12','14','16','18','21','23','25','27','28','30','32','34','36'
      ]);
      const BLACK_NUMBERS = new Set([
        '2','4','6','8','10','11','13','15','17','19','20','22','24','26','29','31','33','35'
      ]);

      for(let i=0;i<pocketCount;i++){
        const a0 = (i / pocketCount) * Math.PI * 2;
        const a1 = ((i+1) / pocketCount) * Math.PI * 2;
        // build wedge shape between innerR and wheelRadius
        const shape = new THREE.Shape();
        shape.moveTo(Math.cos(a0) * innerR, Math.sin(a0) * innerR);
        shape.absarc(0,0, innerR, a0, a1, false);
        shape.lineTo(Math.cos(a1) * wheelRadius, Math.sin(a1) * wheelRadius);
        shape.absarc(0,0, wheelRadius, a1, a0, true);
        shape.closePath();
        const extrudeSettings = { depth: wheelThickness, bevelEnabled: false };
        const geom = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        geom.rotateX(Math.PI/2);
        // center on group origin (extrude creates from z=0 to z=depth)
        geom.translate(0, -wheelThickness/2, 0);
        // color pockets: '0' and '00' are green, others use explicit lists
        const label = numbers[i] || String(i);
        let color;
        if(label === '0' || label === '00') color = 0x0a7f3a;
        else {
          if(RED_NUMBERS.has(label)) color = 0x9f1212;
          else if(BLACK_NUMBERS.has(label)) color = 0x000000;
          else color = 0x000000;
        }
        const mat = new THREE.MeshStandardMaterial({color: color, roughness:0.5, metalness:0.15});
        const wedge = new THREE.Mesh(geom, mat);
        wedge.castShadow = true; wedge.receiveShadow = false;
        group.add(wedge);

        // add a small number label as a plane above the wheel
        const mid = (a0 + a1)/2;
        // highres canvas for crisp text
        const labelCanvas = document.createElement('canvas'); labelCanvas.width = 512; labelCanvas.height = 256;
        const lctx = labelCanvas.getContext('2d');
        lctx.clearRect(0,0,labelCanvas.width,labelCanvas.height);
        // draw outline then fill
        lctx.textAlign = 'center'; lctx.textBaseline = 'middle';
        lctx.font = 'bold 96px sans-serif';
        lctx.strokeStyle = 'rgba(0,0,0,0.9)'; lctx.lineWidth = 12; lctx.strokeText(String(label), labelCanvas.width/2, labelCanvas.height/2);
        lctx.fillStyle = '#ffffff'; lctx.fillText(String(label), labelCanvas.width/2, labelCanvas.height/2);
        const labelTex = new THREE.CanvasTexture(labelCanvas); setColorTextureSpace(labelTex); labelTex.needsUpdate = true;
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.8), new THREE.MeshBasicMaterial({map: labelTex, transparent:true, side: THREE.DoubleSide}));
        // label centered on the pocket square
        const labelR = (innerR + wheelRadius) * 0.5;
        // compute actual top Y then place label slightly above to avoid z-fighting
        geom.computeBoundingBox();
        const bbox = geom.boundingBox;
        const topY = (bbox && bbox.max) ? bbox.max.y : (wheelThickness * 0.5);

        // lay flat on the wheel
        plane.position.set(
          Math.cos(mid) * labelR,
          0.01, // slightly above wheel
          Math.sin(mid) * labelR
        );

        plane.rotation.x = -Math.PI / 2;
        // rotation so text follows wheel direction
        plane.rotation.z = -mid + Math.PI / 2;
        group.add(plane);
      }
      // add slim silver rims
      const rimMatSilver = new THREE.MeshStandardMaterial({color:0xd8dcdc, metalness:0.95, roughness:0.12});
      // silver outer rim
      const outerRimGeom = new THREE.TorusGeometry(wheelRadius - 0.035 - 0.1, 0.06, 12, pocketCount * 4);
      const outerRim = new THREE.Mesh(outerRimGeom, rimMatSilver);
      outerRim.rotation.x = Math.PI/2;
      // lift slightly to avoid z-fighting with pocket tops
      outerRim.position.y = 0.06;
      group.add(outerRim);
      // silver inner rim
      const innerRimGeom = new THREE.TorusGeometry(innerR - 0.06 + 0.1, 0.04, 12, pocketCount * 4);
      const innerRim = new THREE.Mesh(innerRimGeom, rimMatSilver);
      innerRim.rotation.x = Math.PI/2;
      innerRim.position.y = 0.06 - 0.15;
      group.add(innerRim);
      // position the entire group so its local y=0 corresponds to the wheel plane center
      return group;
    }

    const wheel = createRouletteWheel();
    wheel.position.y = wheelY;
    scene.add(wheel);
    // bowl dome and ball track
    function createBowlAndTrack(){
      // track radius and Y kept for layout (visible torus removed)
      const trackRadius = ballOrbitRadius; // match the ball orbit radius
      const trackY = wheel.position.y + wheelThickness*0.5 + 0.12;

      // canvas radial texture for subtle wood grain
      // make the inner floor slightly smaller so it doesn't overlap the wheel
      const innerFloorRadius = wheelRadius * 0.80;
      const cvs = document.createElement('canvas'); cvs.width = cvs.height = 512;
      const ctx = cvs.getContext('2d');
      const grad = ctx.createRadialGradient(256,256,20,256,256,256);
      // darker timber gradient
      grad.addColorStop(0, '#6f3f20');
      grad.addColorStop(0.6, '#4a2a15');
      grad.addColorStop(1, '#2b1408');
      ctx.fillStyle = grad; ctx.fillRect(0,0,512,512);
      ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 2;
      for(let r=40;r<260;r+=18){ ctx.beginPath(); ctx.arc(256,256,r,0,Math.PI*2); ctx.stroke(); }
      const woodTex = new THREE.CanvasTexture(cvs); setColorTextureSpace(woodTex); woodTex.wrapS = woodTex.wrapT = THREE.RepeatWrapping;
      const floorGeom = new THREE.CircleGeometry(innerFloorRadius, 64);
      const floorMat = new THREE.MeshStandardMaterial({map: woodTex, roughness:0.72, metalness:0.03, side: THREE.DoubleSide});
      const floorDisk = new THREE.Mesh(floorGeom, floorMat);
      // CircleGeometry is created in the XY plane (rotate to lie flat on XZ)
      floorDisk.rotation.x = -Math.PI/2;
      // position the disk relative to the wheel group so it spins with the wheel
      floorDisk.position.y = - (wheelThickness * 0.5) + 0.02;
      wheel.add(floorDisk);

      // metallic central spindle and four radial poles
      const spindleMat = new THREE.MeshStandardMaterial({color:0xcfcfcf, metalness:0.92, roughness:0.22});
      const spindleHeight = 0.9;
      const spindleBaseGeom = new THREE.CylinderGeometry(0.18, 0.22, spindleHeight, 32);
      const spindle = new THREE.Mesh(spindleBaseGeom, spindleMat);
      // position spindle relative to the wheel so it spins with the wheel
      spindle.position.y = 0.22 + (spindleHeight/2 - 0.09);
      wheel.add(spindle);
      // decorative top ring (axis-aligned torus)
      const spindleTopGeom = new THREE.TorusGeometry(0.42, 0.05, 12, 60);
      const topMesh = new THREE.Mesh(spindleTopGeom, spindleMat);
      topMesh.rotation.x = Math.PI/2;
      topMesh.position.y = spindle.position.y + spindleHeight/2 - 0.06;
      wheel.add(topMesh);

      // four radial poles + colored knobs
      const poleGroup = new THREE.Group();
      const armLength = wheelRadius * 0.420;
      const armThickness = 0.06;
      const armDepth = 0.06;
      const poleMat = new THREE.MeshStandardMaterial({color:0xd0d0d0, metalness:0.85, roughness:0.2});
      const knobColors = [0xffffff, 0x000000, 0xffffff, 0x000000];
      for(let i=0;i<4;i++){
        const angle = i * Math.PI/2;
        const armGeom = new THREE.BoxGeometry(armLength, armThickness, armDepth);
        const arm = new THREE.Mesh(armGeom, poleMat);
        arm.position.set(Math.cos(angle) * (armLength/2 - 0.08), spindle.position.y + spindleHeight/2 - 0.12, Math.sin(angle) * (armLength/2 - 0.08));
        arm.rotation.y = -angle;
        poleGroup.add(arm);
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 8), new THREE.MeshStandardMaterial({color:knobColors[i], metalness:0.25, roughness:0.3}));
        knob.position.set(Math.cos(angle) * (armLength - 0.08), spindle.position.y + spindleHeight/2 - 0.12, Math.sin(angle) * (armLength - 0.08));
        poleGroup.add(knob);
      }
      wheel.add(poleGroup);

      // decorative cherry oak rim around the bowl (thick rounded ring)
      const rimThickness = 0.45;
      const rimGeom = new THREE.TorusGeometry(trackRadius + 0.95, rimThickness, 24, 200);
      const rimMat = new THREE.MeshStandardMaterial({color:0x52301a, roughness:0.38, metalness:0.05});
      const rim = new THREE.Mesh(rimGeom, rimMat);
      rim.rotation.x = Math.PI/2;
      rim.position.y = trackY + 0.9;
      scene.add(rim);

      // decorative diamond insets along rim (for deflectors)
      const diamondGeom = new THREE.BoxGeometry(0.26, 0.06, 0.08);
      const diamondMat = new THREE.MeshStandardMaterial({color:0xd4c9b1, roughness:0.45, metalness:0.02});
      const diamondCount = 12;
      const diamondRadius = trackRadius + 0.9;
      for(let i=0;i<diamondCount;i++){
        const a = (i / diamondCount) * Math.PI * 2;
        const d = new THREE.Mesh(diamondGeom, diamondMat);
        d.position.set(Math.cos(a) * diamondRadius, rim.position.y + 0.06, Math.sin(a) * diamondRadius);
        d.rotation.y = -a;
        scene.add(d);
      }

      // silver diamond-shaped deflectors between wheel and rim
      const deflectCount = 8;
      const deflectRadius = trackRadius + 0.45; // place between wheel and rim
      const deflectMat = new THREE.MeshStandardMaterial({color:0xc0c0c0, metalness:0.95, roughness:0.12});
      for(let i=0;i<deflectCount;i++){
        const a = (i / deflectCount) * Math.PI * 2;
          const geom = new THREE.OctahedronGeometry(0.20, 0);
        const def = new THREE.Mesh(geom, deflectMat);
        // elongate and flatten the octahedron to form a diamond shape
          def.scale.set(1.6, 0.7, 2.6);
        def.position.set(Math.cos(a) * deflectRadius, trackY - 0.08, Math.sin(a) * deflectRadius);
        // orient to face slightly inward
        def.rotation.y = -a;
        def.rotation.x = Math.PI * 0.05;
        scene.add(def);
      }

      // 'skirt' around rim (cherry oak sides)
      const rimClearance = 0.6; // vertical clearance above rim
      const bowlRadius = diamondRadius + rimClearance;
      // compute skirt so its bottom sits flush with the floor (small offset to avoid z-fighting)
      const skirtTop = rim.position.y + 0.06;
      const skirtBottom = floor.position.y + 0.001;
      const skirtHeight = Math.max(0.8, skirtTop - skirtBottom);
      // open-ended cylinder or hollow skirt
      const skirtGeom = new THREE.CylinderGeometry(bowlRadius + 0.02, bowlRadius + 0.02, skirtHeight, 64, 1, true);
      // match skirt material to the wooden rim for a consistent look
      const skirtMat = rimMat.clone();
      const skirt = new THREE.Mesh(skirtGeom, skirtMat);
      // position the skirt so it spans from floor to just above rim
      skirt.position.y = skirtBottom + skirtHeight * 0.5;
      skirt.receiveShadow = true;
      scene.add(skirt);
      // inner wall: match the inner disk gradient (use woodTex) and render the inside face
      // create a curved inner wall (lathe) so it bows inward and touches the wheel
      const innerSkirtOuter = (bowlRadius + 0.02) - 0.035;
      const halfH = skirtHeight * 0.5;
      const p = [];
      // bottom (near floor) a little inset
      p.push(new THREE.Vector2(innerSkirtOuter * 0.98, -halfH));
      // curve inward to meet the wheel radius around the pocket area
      p.push(new THREE.Vector2(wheelRadius - 0.12, -halfH * 0.25));
      p.push(new THREE.Vector2(wheelRadius - 0.005, halfH * 0.18));
      // flare out slightly near the rim to meet skirt top
      p.push(new THREE.Vector2(innerSkirtOuter * 0.995, halfH));
      const innerSkirtGeom = new THREE.LatheGeometry(p, 64);
      const innerSkirtMat = new THREE.MeshStandardMaterial({map: woodTex, roughness:0.72, metalness:0.03, side: THREE.BackSide});
      const innerSkirt = new THREE.Mesh(innerSkirtGeom, innerSkirtMat);
      innerSkirt.position.copy(skirt.position);
      innerSkirt.receiveShadow = false;
      scene.add(innerSkirt);
    }

    // add a decorative WebP ground overlay while keeping the SVG betting mat
    function createGroundOverlay(){
      const webpPath = 'surfaces/r_surface.webp';
      const texLoader = new THREE.TextureLoader();
      texLoader.load(webpPath, (tex)=>{
        try{
          setColorTextureSpace(tex);
          tex.wrapS = THREE.ClampToEdgeWrapping;
          tex.wrapT = THREE.ClampToEdgeWrapping;
          tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        }catch(e){}

        // match the decorative overlay to the floor mat footprint.
        const floorParams = (floor && floor.geometry && floor.geometry.parameters) ? floor.geometry.parameters : null;
        const overlayWidth = (floorParams && floorParams.width) ? floorParams.width : 60;
        const overlayHeight = (floorParams && floorParams.height) ? floorParams.height : 60;
        const geom = new THREE.PlaneGeometry(overlayWidth, overlayHeight);
        const mat = new THREE.MeshStandardMaterial({
          map: tex,
          transparent: true,
          side: THREE.DoubleSide,
          roughness: 0.9,
          metalness: 0.0,
          depthWrite: false,
          polygonOffset: true,
          polygonOffsetFactor: -2,
          polygonOffsetUnits: -2
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.rotation.x = -Math.PI/2;
        // Lift slightly and offset depth so overlay does not z-fight with the floor mat.
        mesh.position.y = floor.position.y + 0.03;
        mesh.renderOrder = 1;
        mesh.receiveShadow = true;
        scene.add(mesh);
      }, undefined, (err)=>{
        console.warn('Failed to load WebP ground overlay', err);
      });
    }
    // create a 3D betting mat next to the wheel using an external SVG
    function createBettingMat(){
      const svgPath = 'surfaces/r_board.svg';
      const loader = new THREE.TextureLoader();
      loader.load(svgPath, function(tex){
        setColorTextureSpace(tex);
        // try to set anisotropy if available
        try{ tex.anisotropy = renderer.capabilities.getMaxAnisotropy(); }catch(e){}
        // compute an initial aspect and size
        const img = tex.image;
        const aspect = (img && img.width && img.height) ? (img.width / img.height) : (2.0);
        const width = 20; // world units for mat width
        const height = width / aspect;
        const geom = new THREE.PlaneGeometry(width, height);
        const mat = new THREE.MeshStandardMaterial({map: tex, side: THREE.DoubleSide, transparent: true, roughness: 0.9, metalness: 0.0});
        const matMesh = new THREE.Mesh(geom, mat);
        // lay flat on the floor
        matMesh.rotation.x = -Math.PI/2;
        // position the mat on the floor directly behind the wheel
        const posX = 2.5;
        const posY = floor.position.y + 0.01;
        const posZ = (wheelRadius + height * 0.5 + 0.9 + 1.1);
        matMesh.position.set(posX, posY, posZ);
        // Keep betting board rendered above decorative floor overlays.
        matMesh.renderOrder = 3;
        matMesh.receiveShadow = true;
        scene.add(matMesh);
        // expose betting mat for chip placement helpers
        window.bettingMat = { mesh: matMesh, width: width, height: height };
        // compute chip diameter + per-color stack spacing so chips fit inside a single outlined compartment
        try{
          // Approximate number-cell dimensions from r_board.svg rectangles.
          // viewBox: 550 x 165, number cells roughly 26.92 x 33.35
          const viewBoxWidth = 550;
          const viewBoxHeight = 165;
          const svgCellW = 26.92;
          const svgCellH = 33.35;

          const cellW = width * (svgCellW / viewBoxWidth);
          const cellH = height * (svgCellH / viewBoxHeight);
          window.boardCellSize = { w: cellW, h: cellH };

          const cellMin = Math.max(0.001, Math.min(cellW, cellH));
          // How far to offset each color stack from the cell center (towards quadrants)
          window.boardStackOffset = cellMin * 0.22;

          // Chip size: ensure a chip in a quadrant stays within the outlined cell. (0.08)
          const margin = cellMin * 0.15;
          const maxDiam = Math.max(0.14, cellMin - 2 * margin - 2 * window.boardStackOffset);
          const desiredChipDiam = Math.max(0.14, Math.min(maxDiam, cellMin * 0.55));
          updateChipMetrics(desiredChipDiam);
        }catch(e){ console.warn('chip sizing update failed', e); }
      }, undefined, function(err){ console.warn('Failed to load betting mat SVG', err); });
    }

      const lx = (u - 0.5) * bm.width;
      // SVG/viewBox coordinates grow downward; invert so v=0 is the top of the mat.
      const ly = (0.5 - v) * bm.height;

      const local = new THREE.Vector3(lx, ly, 0.02);
      const world = local.clone();
      bm.mesh.localToWorld(world);

    // build edge/intersection betting coordinates for multi-number bets
    const multiNumberEdgeBets = [];
    function buildMultiNumberEdgeBets(){
      // Horizontal splits between adjacent columns: n and n+3
      for(let n=1;n<=33;n++){
        const a = String(n);
        const b = String(n + 3);
        const pa = boardNumberMap[a], pb = boardNumberMap[b];
        if(!pa || !pb) continue;
        multiNumberEdgeBets.push({
          key: `split_${Math.min(n, n+3)}_${Math.max(n, n+3)}`,
          type: 'split',
          payout: 17,
          numbers: [a, b],
          label: `${a}/${b}`,
          u: (pa.u + pb.u) * 0.5,
          v: (pa.v + pb.v) * 0.5,
          threshold: 0.030
        });
      }

      // Vertical splits within the same column: (n,n+1) and (n+1,n+2)
      for(let base=1;base<=34;base+=3){
        const pairs = [[base, base+1], [base+1, base+2]];
        for(const [n1, n2] of pairs){
          const a = String(n1), b = String(n2);
          const pa = boardNumberMap[a], pb = boardNumberMap[b];
          if(!pa || !pb) continue;
          multiNumberEdgeBets.push({
            key: `split_${Math.min(n1, n2)}_${Math.max(n1, n2)}`,
            type: 'split',
            payout: 17,
            numbers: [a, b],
            label: `${a}/${b}`,
            u: (pa.u + pb.u) * 0.5,
            v: (pa.v + pb.v) * 0.5,
            threshold: 0.030
          });
        }
      }

      // Corner bets (four-number intersections between 2x2 blocks)
      for(let base=1;base<=31;base+=3){
        const corners = [
          [base, base+1, base+3, base+4],
          [base+1, base+2, base+4, base+5]
        ];
        for(const nums of corners){
          const points = nums.map(n => boardNumberMap[String(n)]).filter(Boolean);
          if(points.length !== 4) continue;
          const sorted = nums.slice().sort((x,y)=>x-y);
          const key = `corner_${sorted.join('_')}`;
          multiNumberEdgeBets.push({
            key,
            type: 'corner',
            payout: 8,
            numbers: nums.map(String),
            label: nums.join('/'),
            u: (points[0].u + points[1].u + points[2].u + points[3].u) * 0.25,
            v: (points[0].v + points[1].v + points[2].v + points[3].v) * 0.25,
            threshold: 0.026
          });
        }
      }

      // Street bets (edge point at right side of each 3-number column)
      for(let base=1;base<=34;base+=3){
        const a = String(base), b = String(base+1), c = String(base+2);
        const pa = boardNumberMap[a], pb = boardNumberMap[b], pc = boardNumberMap[c];
        if(!pa || !pb || !pc) continue;
        const next = boardNumberMap[String(base + 3)];
        let edgeU;
        if(next){
          edgeU = (pa.u + next.u) * 0.5;
        } else {
          const prev = boardNumberMap[String(base - 3)];
          const du = prev ? (pa.u - prev.u) : 0.048;
          edgeU = pa.u + du * 0.5;
        }
        multiNumberEdgeBets.push({
          key: `street_${base}_${base+1}_${base+2}`,
          type: 'street',
          payout: 11,
          numbers: [a,b,c],
          label: `${a}/${b}/${c}`,
          u: edgeU,
          v: (pa.v + pb.v + pc.v) / 3,
          threshold: 0.028

    buildMultiNumberEdgeBets();

    function getBetSelectionAtUV(u, v){
      let best = null;
      let bestScore = Infinity;

      for(const [label, coords] of Object.entries(boardNumberMap)){
        const dist = Math.hypot(coords.u - u, coords.v - v);
        const threshold = 0.050;
        if(dist <= threshold){
          const score = dist / threshold;
          if(score < bestScore){
            bestScore = score;
            best = {
              key: `num_${label}`,
              type: 'straightup',
              payout: 35,
              number: label,
              numbers: [label],
              label,
              u: coords.u,
              v: coords.v
            };
          }
        }
      }

      for(const [key, coords] of Object.entries(outsideBetsMap)){
        const dist = Math.hypot(coords.u - u, coords.v - v);
        const threshold = 0.080;
        if(dist <= threshold){
          const score = dist / threshold;
          if(score < bestScore){
            bestScore = score;
            best = {
              key: `out_${key}`,
              type: coords.type,
              payout: coords.payout,
              number: key,
              numbers: null,
              label: coords.label || key,
              u: coords.u,
              v: coords.v
            };
          }
        }

        const dist = Math.hypot(bet.u - u, bet.v - v);

              key: bet.key,
              type: bet.type,
              payout: bet.payout,
              numbers: bet.numbers,
              label: bet.label,

    // track selected bet target via mouse hover and click

    let selectedBet = null;
    const raycaster = new THREE.Raycaster();

    // spawn a chip at a specific world-space position (anchors into stacks if close)

    // --- Chip rendering & physics (ported from bj.html for visual consistency) ---

    let CHIP_DIAMETER = 1.2;

    // fallback seat anchors for roulette: prefer mat-based anchor when available
    let playerPositions = [ new THREE.Vector3(0, chipPhysics.groundY, wheel.position.z + wheelRadius + 8) ];

    function colorToCss(c){
      switch(String(c).toLowerCase()){
        case 'black': return '#0b0b0b';
        case 'blue':  return '#1b6eff';
        case 'green': return '#1bbf5a';

      }

    // create a chip top texture with checkered ring and optional center image (from chips/<color>.webp)
    function getChipTexture(color, size = 1024){
      if(chipTextureCache[color]) return chipTextureCache[color];
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      const cx = size/2, cy = size/2;
      const R = Math.round(size * 0.45);

      // build a small 2x2 checker tile (strict squares)
      const tileS = Math.max(4, Math.round(size * 0.012));
      const tile = document.createElement('canvas');
      tile.width = tile.height = tileS * 2;
      const t = tile.getContext('2d');
      t.imageSmoothingEnabled = false;
      for(let y=0;y<2;y++){
        for(let x=0;x<2;x++){
          t.fillStyle = ((x + y) % 2 === 0) ? '#ffffff' : colorToCss(color);
          t.fillRect(x * tileS, y * tileS, tileS, tileS);
        }
      }

      const pattern = ctx.createPattern(tile, 'repeat');
      const period = tile.width;
      const offsetX = (cx + R) % period;
      const offsetY = cy % period;
      if(pattern.setTransform){
        const m = new DOMMatrix(); m.translateSelf(-offsetX, -offsetY); pattern.setTransform(m);
        ctx.fillStyle = pattern; ctx.fillRect(0,0,size,size);
      } else {
        ctx.save(); ctx.translate(-offsetX, -offsetY); ctx.fillStyle = pattern; ctx.fillRect(offsetX, offsetY, size + period, size + period); ctx.restore();
      }

      // create texture and force nearest filtering / no mipmaps to avoid edge blending
      const tex = new THREE.CanvasTexture(canvas);
      tex.flipY = false;
      try{ setColorTextureSpace(tex); }catch(e){}
      try{ tex.anisotropy = renderer.capabilities.getMaxAnisotropy(); }catch(e){}
      try{ tex.minFilter = THREE.NearestFilter; tex.magFilter = THREE.NearestFilter; tex.generateMipmaps = false; }catch(e){}
      chipTextureCache[color] = tex;

      // composite optional center image: clear center cleanly then draw image
      const path = `chips/${color}.webp`;
      loader.load(path,
        (loaded) => {
          try{
            const img = loaded.image || loaded;
            const innerFactor = 0.86;
            const innerR = Math.max(2, Math.round(R * innerFactor));
            const drawR = Math.max(4, Math.round(innerR - Math.max(2, Math.round(size * 0.01))));
            ctx.save(); ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(cx, cy, drawR + 3, 0, Math.PI*2); ctx.fill(); ctx.globalCompositeOperation = 'source-over'; ctx.restore();
            ctx.drawImage(img, cx - drawR, cy - drawR, drawR*2, drawR*2);
            tex.needsUpdate = true;
          }catch(e){ console.warn('Failed to composite chip image', path, e); }
        }, undefined, ()=>{}
      );

      return tex;
    }

    // side texture: strict square checks repeated horizontally
    function getChipSideTexture(color, width = 1024, height = 128, checks = 64){
      const key = `side_${color}`;
      if(chipTextureCache[key]) return chipTextureCache[key];
      const sq = Math.max(4, Math.round(width / checks));
      const tile = document.createElement('canvas'); tile.width = sq * 2; tile.height = sq * 2;
      const t = tile.getContext('2d'); t.imageSmoothingEnabled = false;
      for(let y=0;y<2;y++){ for(let x=0;x<2;x++){ t.fillStyle = ((x + y) % 2 === 0) ? '#ffffff' : colorToCss(color); t.fillRect(x * sq, y * sq, sq, sq); } }
      const sideCanvas = document.createElement('canvas'); sideCanvas.width = width; sideCanvas.height = height;
      const g = sideCanvas.getContext('2d'); g.imageSmoothingEnabled = false; const pattern = g.createPattern(tile, 'repeat'); g.fillStyle = pattern; g.fillRect(0,0,width,height);
      const sideTex = new THREE.CanvasTexture(sideCanvas);
      sideTex.wrapS = THREE.RepeatWrapping; sideTex.wrapT = THREE.ClampToEdgeWrapping; sideTex.repeat.set(1,1);
      try{ setColorTextureSpace(sideTex); }catch(e){}
      try{ sideTex.anisotropy = renderer.capabilities.getMaxAnisotropy(); }catch(e){}
      try{ sideTex.minFilter = THREE.NearestFilter; sideTex.magFilter = THREE.NearestFilter; sideTex.generateMipmaps = false; }catch(e){}
      chipTextureCache[key] = sideTex; return sideTex;
    }

    function createChipMesh(color){
      const geom = new THREE.CylinderGeometry(CHIP_DIAMETER/2, CHIP_DIAMETER/2, CHIP_THICKNESS, 64);
      geom.translate(0, CHIP_THICKNESS/2, 0);
      const topTex = getChipTexture(color);
      const botTex = topTex;
      const sideTex = getChipSideTexture(color);
      const sideMat = new THREE.MeshStandardMaterial({ map: sideTex, metalness: 0.15, roughness: 0.6 });
      const topMat  = new THREE.MeshStandardMaterial({ map: topTex, side: THREE.DoubleSide, roughness: 0.45, metalness: 0.25 });
      const botMat  = new THREE.MeshStandardMaterial({ map: botTex, side: THREE.DoubleSide, roughness: 0.45, metalness: 0.25 });
      const mesh = new THREE.Mesh(geom, [sideMat, topMat, botMat]);
      mesh.castShadow = true; mesh.receiveShadow = false;
      mesh.userData.chipColor = String(color).toLowerCase();
      mesh.rotation.set(0,0,0);
      return mesh;
    }

    // spawn/stack/management helpers (same behavior as blackjack)
    function getStackKey(seat, color){ return `${seat}_${String(color).toLowerCase()}`; }
    function getStackKeyForPos(pos, color){ const rx = Math.round(pos.x*2)/2; const rz = Math.round(pos.z*2)/2; return `${rx}_${rz}_${color}`; }

    function computeColorAnchor(seat, color){
      const gY = chipPhysics.groundY;
      const base = (seat === 'dealer') ? dealerPosition.clone() : (playerPositions[seat] ? playerPositions[seat].clone() : playerPositions[0].clone());
      base.y = gY;
      const center = new THREE.Vector3(0, gY, 0);
      const dir = base.clone().sub(center); dir.y = 0; const dirLen = dir.length();
      if(dirLen > 1e-4){ dir.normalize(); base.addScaledVector(dir, FRONT_STACK_OFFSET); }
      let perp = new THREE.Vector3(-dir.z, 0, dir.x);
      if(perp.lengthSq() < 1e-6) perp = new THREE.Vector3(1,0,0); else perp.normalize();
      const col = String(color).toLowerCase(); const idx = Math.max(0, COLORS_ORDER.indexOf(col));
      const mid = (COLORS_ORDER.length - 1) / 2; const lateralShift = (idx - mid) * COLOR_STACK_OFFSET;
      base.addScaledVector(perp, lateralShift);
      return base;
    }

    function getStackJitter(idx){
      const JX = Math.max(0.01, CHIP_DIAMETER * 0.06);
      const JZ = Math.max(0.008, CHIP_DIAMETER * 0.045);
      const patternX = ((idx % 3) - 1) * JX;
      const patternZ = ((Math.floor(idx / 3) % 2) - 0.5) * JZ;
      const randX = (Math.random() - 0.5) * (JX * 0.35);
      const randZ = (Math.random() - 0.5) * (JZ * 0.35);
      return { x: patternX + randX, z: patternZ + randZ };
    }

    // Normalize seat identifiers for consistent comparisons/keys (copied from blackjack)
    function seatKey(s){
      if(s === 'dealer') return 'dealer';
      if(typeof s === 'number') return String(s);
      if(typeof s === 'string') return s;
      return String(s);
    }

    // Base seat key (maps split seats like '0_split' to their base '0')
    function seatBaseKey(s){
      const k = seatKey(s);
      if(typeof k === 'string' && k.includes('_split')) return String(k.split('_')[0]);
      return k;
    }

    function getOrCreateStack(seat, color){ const key = getStackKey(seat, color); if(chipStacks[key]) return chipStacks[key]; const anchor = computeColorAnchor(seat, color); const sid = nextStackId++; chipStacks[key] = { id: sid, seat, anchor, members: [], color: String(color).toLowerCase() }; return chipStacks[key]; }

    function spawnChip(color, seatIndex = 0){
      const args = arguments;
      const isBoardSpawn = args.length < 2; // called with only color -> place on betting board
      const col = String(color).toLowerCase();
      // determine target base: if caller omitted seatIndex and bettingMat exists, spawn on mat center
      let targetBase;
      // normalize seat identifier for stack key computation; default to 0 when not provided
      let seat = (seatIndex === 'dealer') ? 'dealer' : (typeof seatIndex === 'number' ? seatIndex : 0);
      if(isBoardSpawn && window.bettingMat && window.bettingMat.mesh){
        const anchor = matAnchorAt(0.5, 0.5) || new THREE.Vector3(0, chipPhysics.groundY, wheel.position.z + wheelRadius + 3.0);
        targetBase = anchor.clone();
        // use a sentinel seat 'mat' so seat-based anchors won't accidentally be used
        seat = 'mat';
      } else {
        targetBase = (seat === 'dealer') ? dealerPosition.clone() : (playerPositions[seat] ? playerPositions[seat].clone() : playerPositions[0].clone());
      }
      const mesh = createChipMesh(col);
      mesh.position.set(targetBase.x, chipPhysics.groundY + 0.08, targetBase.z);
      mesh.rotation.y = Math.random()*Math.PI*2; scene.add(mesh);
      // visual highlight removed
      const chipObj = { mesh, velocity: new THREE.Vector3(0,0,0), mass:1.0, radius: CHIP_RADIUS, restitution: chipPhysics.restitution, color: col, stackId: null, id: `chip_${Date.now()}_${Math.random().toString(36).slice(2,6)}` };
      const gY = chipPhysics.groundY; const snap = chipPhysics.stackSnapDistance; const key = getStackKey(seat, col);
      if(chipStacks[key]){ const s = chipStacks[key]; const idx = s.members.length; const jitter = getStackJitter(idx); chipObj.mesh.position.x = s.anchor.x + jitter.x; chipObj.mesh.position.z = s.anchor.z + jitter.z; chipObj.mesh.position.y = gY + idx * CHIP_THICKNESS + 0.0005; chipObj.velocity.set(0,0,0); chipObj.stackId = s.id; chipObj.mesh.rotation.set(0,0,0); s.members.push(chipObj); chips.push(chipObj); return; }
      for(const sk in chipStacks){ const s = chipStacks[sk]; if(s.color !== chipObj.color) continue; const dx = targetBase.x - s.anchor.x; const dz = targetBase.z - s.anchor.z; const d = Math.hypot(dx, dz); if(d <= snap){ const idx = s.members.length; const jitter = getStackJitter(idx); chipObj.mesh.position.x = s.anchor.x + jitter.x; chipObj.mesh.position.z = s.anchor.z + jitter.z; chipObj.mesh.position.y = gY + idx * CHIP_THICKNESS + 0.0005; chipObj.velocity.set(0,0,0); chipObj.stackId = s.id; chipObj.mesh.rotation.set(0,0,0); s.members.push(chipObj); chips.push(chipObj); return; } }
      let stack;
      if(seat === 'mat'){
        stack = createStackAt(targetBase, col);

        stack = getOrCreateStack(seat, col);

      chipObj.mesh.position.x = stack.anchor.x; chipObj.mesh.position.z = stack.anchor.z; chipObj.mesh.position.y = gY; chipObj.mesh.rotation.set(0,0,0); chipObj.velocity.set(0,0,0); chipObj.stackId = stack.id; stack.members.push(chipObj); chips.push(chipObj);
    }

    function manageChipStacks(){
      const gY = chipPhysics.groundY; const snap = chipPhysics.stackSnapDistance; const settleVel = chipPhysics.stackSettleVel;
      for(const c of chips){
        if(c.stackId !== null) continue;
        const velXZ = Math.hypot(c.velocity.x, c.velocity.z);
        if(Math.abs(c.mesh.position.y - gY) > 0.02 || velXZ > settleVel) continue;
        let foundStackKey = null;
        for(const key in chipStacks){ const s = chipStacks[key]; if(s.color !== c.color) continue; const dx = c.mesh.position.x - s.anchor.x; const dz = c.mesh.position.z - s.anchor.z; const d = Math.hypot(dx,dz); if(d <= snap && Math.abs(c.mesh.position.y - (gY + s.members.length * CHIP_THICKNESS)) <= 0.12){ foundStackKey = key; break; } }
        if(foundStackKey !== null){
          console.log('manageChipStacks: attaching chip', c.id, 'color', c.color, 'to', foundStackKey);
          const s = chipStacks[foundStackKey]; c.stackId = s.id; c.velocity.set(0,0,0); s.members.push(c); const idx = s.members.length - 1; c.mesh.position.x = s.anchor.x; c.mesh.position.z = s.anchor.z; c.mesh.position.y = gY + idx * CHIP_THICKNESS + 0.0005; c.mesh.rotation.set(0,0,0); continue;
        }
      }
      const unstacked = chips.filter(c => c.stackId === null && Math.abs(c.mesh.position.y - gY) <= 0.02 && Math.hypot(c.velocity.x, c.velocity.z) <= settleVel);
      const used = new Set();
      for(let i=0;i<unstacked.length;i++){
        const a = unstacked[i]; if(used.has(a)) continue; const cluster = [a]; used.add(a);
        for(let j=i+1;j<unstacked.length;j++){ const b = unstacked[j]; if(used.has(b)) continue; if(b.color !== a.color) continue; const dx = b.mesh.position.x - a.mesh.position.x; const dz = b.mesh.position.z - a.mesh.position.z; const d = Math.hypot(dx,dz); if(d <= snap){ cluster.push(b); used.add(b); } }
        if(cluster.length >= 2){ let bestSeat = 0; let bestDist = Infinity; for(let s=0;s<playerPositions.length;s++){ const d = Math.hypot(cluster[0].mesh.position.x - playerPositions[s].x, cluster[0].mesh.position.z - playerPositions[s].z); if(d < bestDist){ bestDist = d; bestSeat = s; } } const dd = Math.hypot(cluster[0].mesh.position.x - dealerPosition.x, cluster[0].mesh.position.z - dealerPosition.z); if(dd < bestDist){ bestDist = dd; bestSeat = 'dealer'; }
          const stack = getOrCreateStack(bestSeat, a.color);
          cluster.sort((u,v)=> u.mesh.position.y - v.mesh.position.y);
          cluster.forEach((cc, idx) => { if(idx >= chipPhysics.stackMaxHeight) return; cc.stackId = stack.id; cc.velocity.set(0,0,0); const jitter = getStackJitter(idx); cc.mesh.position.x = stack.anchor.x + jitter.x; cc.mesh.position.z = stack.anchor.z + jitter.z; cc.mesh.position.y = gY + idx * CHIP_THICKNESS + 0.0005; cc.mesh.rotation.set(0,0,0); stack.members.push(cc); });
        }
      }
      for(const key in Object.assign({}, chipStacks)){ const s = chipStacks[key]; if(!s.members || s.members.length === 0) delete chipStacks[key]; }
    }

    function getStackKeysForSeat(seat){ const keys = []; for(const k in chipStacks){ try{ if(String(chipStacks[k].seat) === String(seat)) keys.push(k); }catch(e){} } return keys; }

    function tweenPosition(mesh, toPos, duration=600){ const from = mesh.position.clone(); const t0 = performance.now(); return new Promise(res=>{ (function step(){ const now = performance.now(); const t = Math.min(1, (now-t0)/duration); mesh.position.lerpVectors(from, toPos, t); if(t < 1) requestAnimationFrame(step); else res(); })(); }); }

    async function animateChipTransferBetweenSeats(fromSeat, toSeat, opts = {}){
      const dur = opts.duration || 800; const moved = [];
      const fromKeys = getStackKeysForSeat(fromSeat);
      for(const fk of fromKeys){ const stack = chipStacks[fk]; if(!stack || !Array.isArray(stack.members) || stack.members.length === 0) continue; const members = stack.members.slice(); for(let mi = members.length - 1; mi >= 0; mi--){ const chipObj = members[mi]; try{ const color = chipObj.color || (chipObj.mesh && chipObj.mesh.userData && chipObj.mesh.userData.chipColor) || 'black'; const destStack = getOrCreateStack(toSeat, color); const targetIndex = destStack.members.length; const target = destStack.anchor.clone(); const jitter = getStackJitter(targetIndex); target.x += jitter.x; target.z += jitter.z; const extraShift = (opts && typeof opts.shift === 'number') ? opts.shift : 3.2; try{ if(String(destStack.seat) === 'dealer'){ const center = new THREE.Vector3(0, chipPhysics.groundY, 0); const dir = dealerPosition.clone().sub(center); dir.y = 0; if(dir.lengthSq() > 1e-6) dir.normalize(); target.addScaledVector(dir, extraShift); } }catch(e){}
            const targetY = chipPhysics.groundY + targetIndex * CHIP_THICKNESS + 0.0005;
            await tweenTo(chipObj, { x: target.x, y: targetY, z: target.z }, dur);
            try{ const idx = stack.members.indexOf(chipObj); if(idx !== -1) stack.members.splice(idx,1); }catch(e){}
            chipObj.stackId = destStack.id; destStack.members.push(chipObj); try{ chipObj.mesh.rotation.set(0,0,0); chipObj.mesh.position.set(target.x, targetY, target.z); }catch(e){}
            moved.push({ chip: chipObj, from: fk, to: destStack });
          }catch(e){ console.warn('chip transfer failed', e); }
        } }
      return moved;
    }

    async function animateChipOutcome(results){ if(!Array.isArray(results) || results.length === 0) return; const tasks = []; for(const r of results){ const seat = r.seat; const text = String(r.resultText || '').toLowerCase(); if(text.includes('player wins')){ tasks.push(animateChipTransferBetweenSeats('dealer', seat)); } else if(text.includes('dealer wins')){ tasks.push(animateChipTransferBetweenSeats(seat, 'dealer')); } }
      try{ await Promise.all(tasks); }catch(e){ console.warn('chip outcome animation failed', e); } }

    function tryAttachToStack(chip){
      const pos = chip.mesh.position;
      const key = getStackKeyForPos(pos, chip.color);
      console.log('tryAttachToStack:', chip.id, 'pos', pos.x.toFixed(2), pos.z.toFixed(2), 'key', key);
      if(chipStacks[key]){
        const stack = chipStacks[key];
        const y = chipPhysics.groundY + stack.members.length * (CHIP_THICKNESS + 0.005);
        chip.mesh.position.set(stack.anchor.x + (Math.random()-0.5)*0.02, y, stack.anchor.z + (Math.random()-0.5)*0.02);
        chip.velocity.set(0,0,0);
        chip.stackId = stack.id;
        stack.members.push(chip);
        console.log('tryAttachToStack: attached by exact key', key);
        return true;
      }
      for(const k in chipStacks){
        const s = chipStacks[k];
        if(s.color !== chip.color) continue;
        const d = Math.hypot(pos.x - s.anchor.x, pos.z - s.anchor.z);
        if(d <= chipPhysics.stackSnapDistance){
          const y = chipPhysics.groundY + s.members.length * (CHIP_THICKNESS + 0.005);
          chip.mesh.position.set(s.anchor.x + (Math.random()-0.5)*0.02, y, s.anchor.z + (Math.random()-0.5)*0.02);
          chip.velocity.set(0,0,0);
          chip.stackId = s.id;
          s.members.push(chip);
          console.log('tryAttachToStack: attached by proximity to', k, 'dist', d.toFixed(3));
          return true;
        }
      }
      console.log('tryAttachToStack: no stack found for', chip.id);
      return false;
    }


    function createStackAt(pos, color){
      const c = String(color || '').toLowerCase();
      const key = getStackKeyForPos(pos, c);
      if(chipStacks[key]) return chipStacks[key];
      const id = Object.keys(chipStacks).length + 1;
      // round base anchor to a coarse grid (keep stacks aligned)
      let ax = Math.round(pos.x * 10) / 10;
      let az = Math.round(pos.z * 10) / 10;
      // small per-color offset so different color stacks occupy distinct corners of the compartment
      const idx = Math.max(0, COLORS_ORDER.indexOf(c));
      const cornerOffsets = [ [-1, -1], [1, -1], [-1, 1], [1, 1] ];
      const off = (idx >= 0 && idx < cornerOffsets.length) ? cornerOffsets[idx] : [0,0];
      const cellOffset = (typeof window.boardStackOffset === 'number') ? window.boardStackOffset : (CHIP_DIAMETER * 0.35);
      const dx = off[0] * cellOffset;
      const dz = off[1] * cellOffset;
      ax += dx; az += dz;
      const anchor = new THREE.Vector3(Math.round(ax * 10) / 10, chipPhysics.groundY, Math.round(az * 10) / 10);
      const s = { id, anchor, members: [], color: c };
      chipStacks[key] = s;
      try{ console.log('createStackAt:', key, 'anchor', anchor.x.toFixed(2), anchor.z.toFixed(2), 'color', c); }catch(e){}
      return s;
    }

    function updateChips(dt){ const g = chipPhysics.gravity; const ground = chipPhysics.groundY; for(const c of chips){
      // If a chip is already part of a stack, keep it fixed in place.
      // Otherwise gravity will pull it down each frame and the stack will collapse/merge.
      if(c.stackId !== null) continue;
      c.velocity.y += g * dt; c.mesh.position.addScaledVector(c.velocity, dt); if(c.mesh.position.y <= ground){ c.mesh.position.y = ground; if(Math.abs(c.velocity.y) > 0.1){ c.velocity.y = -c.velocity.y * chipPhysics.restitution; } else c.velocity.y = 0; c.velocity.x *= chipPhysics.frictionGround; c.velocity.z *= chipPhysics.frictionGround; if(Math.hypot(c.velocity.x, c.velocity.z) <= chipPhysics.stackSettleVel && c.stackId === null){ const attached = tryAttachToStack(c); if(!attached){ createStackAt(c.mesh.position, c.color); tryAttachToStack(c); } } } else { c.velocity.x *= chipPhysics.frictionAir; c.velocity.z *= chipPhysics.frictionAir; } }
      try{ manageChipStacks(); }catch(e){} }


    // ball

    createBowlAndTrack();

    // betting logic: chips placed on a number become bets
    const CHIP_VALUES = { black: 100, blue: 10, green: 25, red: 5 };
    let bets = {};
    function addBetForSelection(selection, color){
      try{
        const amt = CHIP_VALUES[String(color).toLowerCase()] || 0;
        const key = `${selection.key}_${color}`;
        if(!bets[key]){
          bets[key] = { 
            key: selection.key,
            label: selection.label,
            type: selection.type,
            payout: selection.payout,
            number: selection.number || null,
            numbers: Array.isArray(selection.numbers) ? selection.numbers.slice() : null,
            amount: 0 
          };
        }
        bets[key].amount += amt;
      }catch(e){}
    }
    function evaluateBets(resultIdx){
      const resultLabel = pocketLabels[resultIdx];
      const resultNum = parseInt(resultLabel) || (resultLabel === '0' ? 0 : 37); // 37 for '00'
      const isRed = new Set(['1','3','5','7','9','12','14','16','18','21','23','25','27','28','30','32','34','36']).has(resultLabel);
      const isBlack = new Set(['2','4','6','8','10','11','13','15','17','19','20','22','24','26','29','31','33','35']).has(resultLabel);
      let totalWinnings = 0;
      let winningBets = [];
      
      for(const [key, bet] of Object.entries(bets)){
        let won = false;
        let payout = 0;
        
        if(bet.type === 'straightup' && bet.number === resultLabel){
          won = true;
          payout = bet.amount * 35; // 35:1 payout
        } else if((bet.type === 'split' || bet.type === 'corner' || bet.type === 'street') && Array.isArray(bet.numbers)){
          if(bet.numbers.includes(resultLabel)){
            won = true;
            payout = bet.amount * (bet.payout || 0);
          }
        } else if(bet.type === 'dozen'){
          const dozen = bet.number;
          const dozenWon = (dozen === '1st12' && resultNum >= 1 && resultNum <= 12) ||
                          (dozen === '2nd12' && resultNum >= 13 && resultNum <= 24) ||
                          (dozen === '3rd12' && resultNum >= 25 && resultNum <= 36);
          if(dozenWon){ won = true; payout = bet.amount * 2; } // 2:1 payout
        } else if(bet.type === 'column'){
          const col = bet.number;
          const colNum = (col === 'col1') ? 1 : (col === 'col2' ? 2 : (col === 'col3' ? 3 : 0));
          const colWon = (colNum > 0 && resultNum % 3 === colNum % 3 && resultNum > 0 && resultNum <= 36);
          if(colWon){ won = true; payout = bet.amount * 2; } // 2:1 payout
        } else if(bet.type === 'range'){
          const rangeWon = (bet.number === '1to18' && resultNum >= 1 && resultNum <= 18) ||
                          (bet.number === '19to36' && resultNum >= 19 && resultNum <= 36);
          if(rangeWon){ won = true; payout = bet.amount; } // 1:1 payout
        } else if(bet.type === 'parity'){
          const parityWon = (bet.number === 'even' && resultNum > 0 && resultNum % 2 === 0) ||
                           (bet.number === 'odd' && resultNum > 0 && resultNum % 2 === 1);
          if(parityWon){ won = true; payout = bet.amount; } // 1:1 payout
        } else if(bet.type === 'color'){
          const colorWon = (bet.number === 'red' && isRed) || (bet.number === 'black' && isBlack);
          if(colorWon){ won = true; payout = bet.amount; } // 1:1 payout
        }
        
        if(won){
          totalWinnings += payout;
          winningBets.push(`${bet.label}: +$${payout}`);
        }
      }
      
      if(winningBets.length > 0){
        document.getElementById('log').textContent = `Result: ${resultLabel} — WIN! ${winningBets.join(' | ')} Total: $${totalWinnings}`;
      } else {
        document.getElementById('log').textContent = `Result: ${resultLabel} — no winning bets`;
      }
      bets = {};
    }

    // state
    let wheelVel = 0; let ballVel = 0; let spinning = false; let resultLocked = false;

    function resetWheel(){

      if(spinning) return;
      const speed = parseFloat(document.getElementById('speed').value) || 1;
      // wheel and ball spin in opposite directions
      wheelVel = (0.6 + Math.random()*1.6) * 2.0 * (0.5 + speed*0.5);
      // make ballVel positive so the ball orbits counterclockwise
      ballVel = (3.5 + Math.random()*4.0) * (1.0 + (1.2 - speed));

    });

    // determine pocket index when settled
    function computeResult() {
    // Get ball position in wheel-local space
      const local = ball.position.clone();
      wheel.worldToLocal(local);
    // Compute angle in wheel's XZ plane
      let angle = Math.atan2(local.z, local.x);
    // Normalize to 0–2π
      if (angle < 0) angle += Math.PI * 2;
    // Convert to pocket index
      const idx = Math.floor(angle / (Math.PI * 2) * pocketCount);
      return idx;
    }

    let lastTime = performance.now();
    let lockedBallPosition = null;
    (function animate(now){
      requestAnimationFrame(animate);
      const dt = Math.min(0.05, (now - lastTime)/1000); lastTime = now;
      // animate physics
      if (spinning) {
        wheel.rotation.y -= wheelVel * dt;
        ballAngle += ballVel * dt;
        wheelVel *= Math.max(0, 1 - 0.6 * dt);
        ballVel *= Math.max(0, 1 - 0.25 * dt);
        if (Math.abs(ballVel) < 0.4 && Math.abs(wheelVel) < 0.5 && !resultLocked) {
          resultLocked = true;
          spinning = false;
          const idx = computeResult();
          // Compute exact pocket angle
          const pocketAngle = (idx + 0.5) * (Math.PI * 2 / pocketCount);
          // Convert to world-space position ONCE
          lockedBallPosition = new THREE.Vector3(
          Math.cos(wheel.rotation.y + pocketAngle) * ballOrbitRadius, 
          wheel.position.y + wheelThickness * 0.5 + 0.14, 
          Math.sin(wheel.rotation.y + pocketAngle) * ballOrbitRadius);
          ball.position.copy(lockedBallPosition);
          ballVel = 0;
          wheelVel = 0;
          evaluateBets(idx);
          // clear all chips after a brief delay so result is visible
          setTimeout(()=>{
            for(const chip of chips){
              scene.remove(chip.mesh);
            }
            chips.length = 0;
            for(const key in chipStacks){
              delete chipStacks[key];
            }
            nextStackId = 1;
          }, 2000);
        }
      }
      // ensure ball follows computed orbit
      updateBall();
      // update chips physics
      updateChips(dt);
      // animate hover highlight blink
      if(hoverHighlight && hoverHighlight.visible){
        hoverHighlight.material.opacity = 0.3 + 0.4 * Math.abs(Math.sin(now * 0.005));
      }
      // keep selection highlight solid
      if(selectHighlight && selectHighlight.visible){
        selectHighlight.material.opacity = 0.5;
      }
      controls.update(); renderer.render(scene, camera);
    })(performance.now());

    // resize
    window.addEventListener('resize', ()=>{ camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    document.getElementById('log').textContent = 'Ready';
  })();
  </script>
</body>
</html>
