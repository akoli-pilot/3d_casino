<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>3D Poker (three.js)</title>
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
                background: #071718;
                font-family: Inter, system-ui, Arial;
            }
            .ui {
                position: absolute;
                left: 12px;
                top: 12px;
                z-index: 5;
                color: #cfeff0;
            }
            .ui button {
                background: #0d6b75;
                border: 0;
                padding: 8px 12px;
                border-radius: 8px;
                color: white;
                margin-right: 8px;
                cursor: pointer;
            }
            .ui label {
                color: #9fd6db;
                margin-left: 8px;
            }
            #info {
                position: absolute;
                right: 12px;
                top: 12px;
                color: #bfe9ee;
                z-index: 5;
                background: rgba(0, 0, 0, 0.25);
                padding: 8px;
                border-radius: 8px;
            }
            canvas {
                display: block;
            }
            .log {
                position: fixed;
                left: 12px;
                bottom: 12px;
                color: #9fd6db;
                background: rgba(0, 0, 0, 0.25);
                padding: 6px;
                border-radius: 6px;
                font-size: 12px;
            }
            /* Odds overlay */
            #oddsContainer {
                position: fixed;
                left: 0;
                top: 0;
                right: 0;
                bottom: 0;
                pointer-events: none;
                z-index: 4;
            }
            .oddsLabel {
                position: absolute;
                color: #fff;
                font-size: 13px;
                font-family: Arial, Helvetica, sans-serif;
                pointer-events: none;
                text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
            }
            /* Player action buttons */
            .playerActions {
                position: absolute;
                display: none;
                pointer-events: auto;
                z-index: 6;
                gap: 6px;
                flex-wrap: wrap;
                justify-content: center;
                max-width: 320px;
                transform: translateY(-60px);
            }
            .playerActions button {
                background: #0d6b75;
                border: 0;
                padding: 6px 10px;
                border-radius: 6px;
                color: white;
                cursor: pointer;
                font-size: 12px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
                transition: all 0.1s ease;
            }
            .playerActions button:hover {
                background: #0f7d88;
                transform: scale(1.05);
            }
            .playerActions button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }
            .playerActions.active {
                display: flex;
            }

        
            #intro-title {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;

                font-size: clamp(3.5rem, 9vw, 9rem);
                font-weight: 800;
                letter-spacing: 0.12em;
                text-transform: uppercase;

                color: #f2f2f2;

                text-shadow:
                    0 0 12px rgba(255, 255, 255, 0.08),
                    0 0 32px rgba(255, 255, 255, 0.04);

                background:
                    radial-gradient(
                        ellipse at center,
                        rgba(0, 0, 0, 0.35) 0%,
                        rgba(0, 0, 0, 0.65) 100%
                    );

                pointer-events: none;
                z-index: 9999;

                opacity: 0;
                filter: blur(10px);
                transform: scale(1.02);

                animation: controlIntro 4.5s cubic-bezier(0.4, 0, 0.2, 1)
                    forwards;
            }

            @keyframes controlIntro {
                0% {
                    opacity: 0;
                    filter: blur(10px);
                    transform: scale(1.02);
                }

                18% {
                    opacity: 1;
                    filter: blur(0);
                    transform: scale(1);
                }

                70% {
                    opacity: 1;
                    filter: blur(0);
                }

                100% {
                    opacity: 0;
                    filter: blur(6px);
                }
            }
        </style>
    </head>
    <body>
        <!-- Intro -->
        <div id="intro-title">POKER</div>
        <div class="ui">
            <button id="shuffleBtn">Shuffle</button>
            <button id="dealBtn">Deal</button>
            <button id="resetBtn">Reset Deck</button>
            <button id="revealBtn">Reveal</button>
            <!-- Chip spawn buttons -->
            <button id="chipBlackBtn" type="button">Black: $100</button>
            <button id="chipBlueBtn" type="button">Blue: $10</button>
            <button id="chipGreenBtn" type="button">Green: $25</button>
            <button id="chipRedBtn" type="button">Red: $5</button>
            <label
                >Speed
                <input
                    id="speed"
                    type="range"
                    min="0.1"
                    max="3"
                    step="0.1"
                    value="3"
            /></label>
        </div>
        <div class="log" id="log">Initializing…</div>
        <div id="oddsContainer" aria-hidden="true"></div>
        <div id="player0Actions" class="playerActions">
            <button data-action="fold">Fold</button>
            <button data-action="check">Check</button>
            <button data-action="bet">Bet</button>
            <button data-action="call">Call</button>
            <button data-action="raise">Raise</button>
        </div>
        <div id="player1Actions" class="playerActions">
            <button data-action="fold">Fold</button>
            <button data-action="check">Check</button>
            <button data-action="bet">Bet</button>
            <button data-action="call">Call</button>
            <button data-action="raise">Raise</button>
        </div>
        <div id="player2Actions" class="playerActions">
            <button data-action="fold">Fold</button>
            <button data-action="check">Check</button>
            <button data-action="bet">Bet</button>
            <button data-action="call">Call</button>
            <button data-action="raise">Raise</button>
        </div>
        <div id="player3Actions" class="playerActions">
            <button data-action="fold">Fold</button>
            <button data-action="check">Check</button>
            <button data-action="bet">Bet</button>
            <button data-action="call">Call</button>
            <button data-action="raise">Raise</button>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "./three.module.js",
                    "three/addons/": "./jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";

            (async () => {
                init(THREE, OrbitControls);
                async function init(THREE, OrbitControls) {
                    document.getElementById("log").textContent =
                        "Initializing scene…";

                    // scene setup
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0x062b2c);
                    const camera = new THREE.PerspectiveCamera(
                        45,
                        innerWidth / innerHeight,
                        0.1,
                        1000,
                    );
                    camera.position.set(0, 6, 16);

                    const renderer = new THREE.WebGLRenderer({
                        antialias: true,
                    });
                    renderer.setSize(innerWidth, innerHeight);
                    renderer.setPixelRatio(
                        Math.min(window.devicePixelRatio, 2),
                    );
                    renderer.shadowMap.enabled = true;
                    //renderer.outputEncoding = THREE.sRGBEncoding;
                    renderer.outputColorSpace = THREE.SRGBColorSpace;
                    document.body.appendChild(renderer.domElement);

                    const controls = new OrbitControls(
                        camera,
                        renderer.domElement,
                    );
                    if (controls) {
                        controls.enableDamping = true;
                        controls.dampingFactor = 0.08;
                        controls.screenSpacePanning = false;
                        controls.maxPolarAngle = Math.PI / 2.1;
                        // Control distance to prevent frustrum culling
                        controls.maxDistance = 44;
                        // Tabletop view (could be locked after finishing turn)
                        //controls.maxPolarAngle = 0;
                    }

                    // lights (Hemisphere + Directional + Ambient)
                    const hemi = new THREE.HemisphereLight(
                        0xffffff,
                        0x444444,
                        0.8,
                    );
                    hemi.position.set(0, 20, 0);
                    scene.add(hemi);
                    const dir = new THREE.DirectionalLight(0xffffff, 0.7);
                    dir.position.set(5, 10, 7);
                    dir.castShadow = true;
                    dir.shadow.bias = -0.0005;
                    dir.shadow.normalBias = 0.02;
                    scene.add(dir);
                    // small ambient fill light to prevent cards going too dark in shadowed regions
                    const ambientFill = new THREE.AmbientLight(0xffffff, 0.12);
                    scene.add(ambientFill);

                    // ground plane (playing surface)
                    const gmat = new THREE.MeshStandardMaterial({
                        color: 0x35654d,
                        metalness: 0.1,
                        roughness: 0.9,
                    });
                    const ground = new THREE.Mesh(
                        new THREE.PlaneGeometry(40, 40),
                        gmat,
                    );
                    ground.rotation.x = -Math.PI / 2;
                    ground.position.y = -0.01;
                    ground.receiveShadow = true;
                    scene.add(ground);

                    // deck and card geometry
                    const CARD_W = 2.5;
                    const CARD_H = 3.6;
                    const CARD_T = 0.04;
                    const GROUND_Y = -0.01;
                    const GAP = 0.001;
                    const BASE_DECK_Y = GROUND_Y + GAP;
                    // Audio: listener + positional shuffle sound anchored at deck
                    const listener = new THREE.AudioListener();
                    camera.add(listener);
                    const audioLoader = new THREE.AudioLoader();
                    let shuffleSound = null;
                    const deckAnchor = new THREE.Object3D();
                    deckAnchor.position.set(0, BASE_DECK_Y, 0);
                    scene.add(deckAnchor);
                    shuffleSound = new THREE.PositionalAudio(listener);
                    deckAnchor.add(shuffleSound);
                    // load shuffle wav
                    audioLoader.load(
                        "sfx/shuffle/s1.wav",
                        function (buffer) {
                            try {
                                shuffleSound.setBuffer(buffer);
                                shuffleSound.setRefDistance(2);
                                shuffleSound.setRolloffFactor(1);
                                shuffleSound.setVolume(0.9);
                                shuffleSound.setLoop(false);
                            } catch (e) {
                                console.warn("shuffle audio load failed", e);
                            }
                        },
                        undefined,
                        function (err) {
                            console.warn("shuffle audio load error", err);
                        },
                    );
                    // store original anchor for jittering
                    const _deckAnchorOrig = deckAnchor.position.clone();
                    function playShuffleWithJitter(opts = {}) {
                        const rx = opts.x || 0.18; // lateral jitter radius
                        const rz = opts.z || 0.12; // depth jitter radius
                        const ry = opts.y || 0.02; // small vertical lift
                        if (!shuffleSound) return;
                        // apply small random offset around original anchor
                        deckAnchor.position.set(
                            _deckAnchorOrig.x + (Math.random() * 2 - 1) * rx,
                            _deckAnchorOrig.y + (Math.random() * 2 - 1) * ry,
                            _deckAnchorOrig.z + (Math.random() * 2 - 1) * rz,
                        );
                        try {
                            if (shuffleSound.isPlaying) shuffleSound.stop();
                            if (shuffleSound.buffer) shuffleSound.play();
                        } catch (e) {
                            console.warn("shuffle play failed", e);
                        }
                        // restore anchor after playback
                        const durMs =
                            shuffleSound &&
                            shuffleSound.buffer &&
                            shuffleSound.buffer.duration
                                ? shuffleSound.buffer.duration * 1000
                                : 800;
                        setTimeout(
                            () => {
                                try {
                                    deckAnchor.position.copy(_deckAnchorOrig);
                                } catch (e) {}
                            },
                            Math.min(durMs + 120, 1500),
                        );
                    }
                    // Load deal sound buffers
                    const dealFiles = [
                        "sfx/deal/d1.wav",
                        "sfx/deal/d2.wav",
                        "sfx/deal/d3.wav",
                        "sfx/deal/d4.wav",
                        "sfx/deal/d5.wav",
                        "sfx/deal/d6.wav",
                    ];
                    const dealBuffers = [];
                    const dealLoadPromises = dealFiles.map(
                        (path) =>
                            new Promise((res) => {
                                audioLoader.load(
                                    path,
                                    (buf) => {
                                        try {
                                            dealBuffers.push(buf);
                                        } catch (e) {}
                                        res(true);
                                    },
                                    undefined,
                                    () => {
                                        res(false);
                                    },
                                );
                            }),
                    );
                    Promise.all(dealLoadPromises)
                        .then(() => {
                            console.log(
                                "deal sounds loaded:",
                                dealBuffers.length,
                            );
                        })
                        .catch(() => {});

                    // Background music playlist
                    const themeFiles = [
                        "sfx/theme/min9.mp3",
                        "sfx/theme/bebop.mp3",
                        "sfx/theme/spulcro.mp3",
                        "sfx/theme/blkwtr.mp3",
                    ];
                    const themeBuffers = [];
                    const themeLoadPromises = themeFiles.map(
                        (path) =>
                            new Promise((res) => {
                                audioLoader.load(
                                    path,
                                    (buf) => {
                                        try {
                                            themeBuffers.push({ path, buf });
                                        } catch (e) {}
                                        res(true);
                                    },
                                    undefined,
                                    (err) => {
                                        console.warn(
                                            "theme load failed",
                                            path,
                                            err,
                                        );
                                        res(false);
                                    },
                                );
                            }),
                    );

                    // single non-positional audio attached to listener
                    const bgAudio = new THREE.Audio(listener);
                    let _currentThemeIndex = -1;
                    let _bgPlaying = false;

                    function _pickNextThemeIndex() {
                        if (themeBuffers.length === 0) return -1;
                        if (themeBuffers.length === 1) return 0;
                        let i = Math.floor(Math.random() * themeBuffers.length);
                        if (i === _currentThemeIndex)
                            i = (i + 1) % themeBuffers.length;
                        return i;
                    }

                    function startBackgroundMusic(opts = {}) {
                        if (_bgPlaying) return;
                        if (!themeBuffers || themeBuffers.length === 0) return;
                        _bgPlaying = true;
                        function playNext() {
                            const idx = _pickNextThemeIndex();
                            if (idx < 0) return;
                            _currentThemeIndex = idx;
                            const entry = themeBuffers[idx];
                            try {
                                bgAudio.stop();
                            } catch (e) {}
                            try {
                                bgAudio.setBuffer(entry.buf);
                                bgAudio.setLoop(false);
                                bgAudio.setVolume(
                                    typeof opts.volume === "number"
                                        ? opts.volume
                                        : 0.55,
                                );
                                try {
                                    bgAudio.playbackRate =
                                        typeof opts.playbackRate === "number"
                                            ? opts.playbackRate
                                            : 1;
                                } catch (e) {}
                                bgAudio.play();
                                if (
                                    bgAudio.source &&
                                    typeof bgAudio.source.onended === "function"
                                ) {
                                    bgAudio.source.onended = () => {
                                        if (_bgPlaying)
                                            setTimeout(
                                                playNext,
                                                opts.gapMs || 200,
                                            );
                                    };
                                } else {
                                    const dur =
                                        entry.buf && entry.buf.duration
                                            ? entry.buf.duration * 1000
                                            : 30000;
                                    setTimeout(
                                        () => {
                                            if (_bgPlaying) playNext();
                                        },
                                        dur + (opts.gapMs || 200),
                                    );
                                }
                            } catch (e) {
                                console.warn("bgAudio play failed", e);
                            }
                        }
                        playNext();
                    }

                    function stopBackgroundMusic() {
                        _bgPlaying = false;
                        try {
                            bgAudio.stop();
                        } catch (e) {}
                    }

                    // start on first user gesture after theme buffers load
                    Promise.all(themeLoadPromises)
                        .then(() => {
                            console.log(
                                "theme tracks loaded:",
                                themeBuffers.length,
                            );
                            const onFirst = function () {
                                try {
                                    startBackgroundMusic();
                                } catch (e) {}
                                window.removeEventListener(
                                    "pointerdown",
                                    onFirst,
                                );
                            };
                            window.addEventListener("pointerdown", onFirst, {
                                once: true,
                            });
                        })
                        .catch(() => {});

                    // Play a random deal sound at a given position
                    function playDealAt(pos, opts = {}) {
                        if (!dealBuffers || dealBuffers.length === 0) return;
                        const buf =
                            dealBuffers[
                                Math.floor(Math.random() * dealBuffers.length)
                            ];
                        if (!buf) return;
                        // If caller passed a Mesh/Object3D, attach audio to it so the sound follows the moving card
                        let attachedToMesh = null;
                        let anchor;
                        if (
                            pos &&
                            typeof pos === "object" &&
                            (pos.isMesh || pos.isObject3D || pos.add)
                        ) {
                            anchor = pos;
                            attachedToMesh = pos;
                        } else {
                            anchor = new THREE.Object3D();
                            anchor.position.copy(
                                pos || new THREE.Vector3(0, BASE_DECK_Y, 0),
                            );
                            scene.add(anchor);
                        }
                        const p = new THREE.PositionalAudio(listener);
                        anchor.add(p);
                        try {
                            p.setBuffer(buf);
                            p.setRefDistance(opts.refDistance || 1.2);
                            p.setRolloffFactor(opts.rolloff || 1);
                            p.setVolume(
                                typeof opts.volume === "number"
                                    ? opts.volume
                                    : 0.9,
                            );
                            // playbackRate override
                            try {
                                p.playbackRate =
                                    typeof opts.playbackRate === "number"
                                        ? opts.playbackRate
                                        : 1 + (Math.random() - 0.5) * 0.12;
                            } catch (e) {}
                            p.setLoop(false);
                            p.play();
                        } catch (e) {
                            console.warn("playDealAt failed", e);
                        }
                        const durMs =
                            buf && buf.duration ? buf.duration * 1000 : 600;

                        const cleanup = () => {
                            try {
                                if (p && p.isPlaying)
                                    try {
                                        p.stop();
                                    } catch (e) {}
                                if (p && p.parent) p.parent.remove(p);
                                // remove temporary anchor only here
                                if (!attachedToMesh && anchor && anchor.parent)
                                    anchor.parent.remove(anchor);
                            } catch (e) {}
                        };

                        // AudioBufferSourceNode when available for exact cleanup
                        try {
                            if (
                                p &&
                                p.source &&
                                typeof p.source.onended === "function"
                            ) {
                                p.source.onended = cleanup;
                            } else {
                                setTimeout(
                                    cleanup,
                                    Math.min(durMs + 300, 3000),
                                );
                            }
                        } catch (e) {
                            setTimeout(cleanup, Math.min(durMs + 300, 3000));
                        }
                    }
                    // increase per-card stacking offset to avoid z-fighting when cards touch
                    const STACK_OFFSET = 0.008;
                    // small dealt card lift so textures don't merge
                    const DEAL_LAYER_RAISE = 0.01;
                    // larger bias to separate front/back polygon surfaces of each card
                    const FACE_BIAS = 0.0025;
                    // horizontal spread for dealer upcard/hole so they are visually separated
                    const DEALER_SPREAD = 2.8;
                    // small text fallback texture 
                    function placeholderTexture(id) {
                        try {
                            const size = 64;
                            const canvas = document.createElement("canvas");
                            canvas.width = canvas.height = size;
                            const ctx = canvas.getContext("2d");
                            ctx.fillStyle = "#ffffff";
                            ctx.fillRect(0, 0, size, size);
                            ctx.fillStyle = "#000000";
                            ctx.font = "12px sans-serif";
                            ctx.textAlign = "center";
                            ctx.textBaseline = "middle";
                            ctx.fillText(
                                id ? String(id).slice(0, 3) : "card",
                                size / 2,
                                size / 2,
                            );
                            const tex = new THREE.CanvasTexture(canvas);
                            tex.flipY = true;
                            //tex.encoding = THREE.sRGBEncoding;
                            tex.colorSpace = THREE.SRGBColorSpace;
                            tex.needsUpdate = true;
                            return tex;
                        } catch (e) {
                            return new THREE.Texture();
                        }
                    }

                    function createCardMesh(frontTexture, backTexture) {
                        // create geometry with its origin at the bottom of the card
                        const geom = new THREE.BoxGeometry(
                            CARD_W,
                            CARD_H,
                            CARD_T,
                        );
                        geom.translate(0, CARD_H / 2, 0);
                        // Slightly push front (+Z) and back (-Z) face vertices along their normals for stacking tightly
                        const pos = geom.attributes.position.array;
                        const nrm = geom.attributes.normal.array;
                        const vcount = geom.attributes.position.count;
                        for (let i = 0; i < vcount; i++) {
                            const nz = nrm[i * 3 + 2];
                            if (nz > 0.9) {
                                pos[i * 3 + 2] += FACE_BIAS;
                            } else if (nz < -0.9) {
                                pos[i * 3 + 2] -= FACE_BIAS;
                            }
                        }
                        geom.attributes.position.needsUpdate = true;
                        geom.computeVertexNormals();
                        // side material also participates in polygonOffset to prevent thin-edge artifacts
                        const sideMat = new THREE.MeshStandardMaterial({
                            color: 0x111111,
                            metalness: 0.1,
                            roughness: 0.7,
                            polygonOffset: true,
                            polygonOffsetFactor: 0.5,
                            polygonOffsetUnits: 1,
                        });
                        // face materials: use depth buffer and stronger polygonOffset
                        // Keep alphaTest slightly higher to reject thin semi-transparent pixels at edges.
                        // Reduced polygon offset and alphaTest to avoid occlusion
                        const faceMaterialOpts = {
                            roughness: 0.6,
                            polygonOffset: true,
                            polygonOffsetFactor: 0.5, // much smaller offset to avoid pushing fragments behind other geometry
                            polygonOffsetUnits: 1,
                            alphaTest: 0.01, // lower alpha reject so thin edges don't vanish at oblique sampling
                            depthWrite: true,
                            depthTest: true,
                            transparent: false,
                            side: THREE.DoubleSide,
                        };
                        const frontMat = new THREE.MeshStandardMaterial(
                            Object.assign(
                                { map: frontTexture },
                                faceMaterialOpts,
                            ),
                        );
                        const backMat = new THREE.MeshStandardMaterial(
                            Object.assign(
                                { map: backTexture },
                                faceMaterialOpts,
                            ),
                        );
                        // BoxGeometry expects 6 materials: +X, -X, +Y, -Y, +Z, -Z
                        const materials = [
                            sideMat,
                            sideMat,
                            sideMat,
                            sideMat,
                            frontMat,
                            backMat,
                        ];
                        const mesh = new THREE.Mesh(geom, materials);
                        // allow cards to cast shadows but avoid them receiving shadows to prevent darkening/self-shadowing
                        mesh.castShadow = true;
                        mesh.receiveShadow = false;
                        return mesh;
                    }

                    // load textures for all cards
                    const suits = ["spades", "hearts", "diamonds", "clubs"];
                    const ranks = [
                        "ace",
                        "2",
                        "3",
                        "4",
                        "5",
                        "6",
                        "7",
                        "8",
                        "9",
                        "10",
                        "jack",
                        "queen",
                        "king",
                    ];
                    const deckIds = [];
                    for (const s of suits)
                        for (const r of ranks)
                            deckIds.push({ suit: s, rank: r, id: `${s}-${r}` });

                    let deck = deckIds.slice();
                    let textures = {}; // id -> Texture
                    let backTexture = null;

                    const loader = new THREE.TextureLoader();

                    // chip creation
                    const CHIP_DIAMETER = 1.2;
                    const CHIP_THICKNESS = 0.14;
                    const chipTextureCache = {};

                    function colorToHex(c) {
                        switch (String(c).toLowerCase()) {
                            case "black":
                                return 0x0b0b0b;
                            case "blue":
                                return 0x1b6eff;
                            case "green":
                                return 0x1bbf5a;
                            case "red":
                                return 0xd73b3b;
                            default:
                                return 0x000000;
                        }
                    }
                    function colorToCss(c) {
                        switch (String(c).toLowerCase()) {
                            case "black":
                                return "#0b0b0b";
                            case "blue":
                                return "#1b6eff";
                            case "green":
                                return "#1bbf5a";
                            case "red":
                                return "#d73b3b";
                            default:
                                return "#000000";
                        }
                    }

                    // create a chip top texture that draws the loaded image
                    // paints a strictly-square checkered ring around the rim (white / chip color).
                    function getChipTexture(color, size = 1024) {
                        if (chipTextureCache[color])
                            return chipTextureCache[color];
                        const canvas = document.createElement("canvas");
                        canvas.width = canvas.height = size;
                        const ctx = canvas.getContext("2d");
                        ctx.imageSmoothingEnabled = false;
                        const cx = size / 2,
                            cy = size / 2;
                        const R = Math.round(size * 0.45);

                        // build a small 2x2 checker tile
                        const tileS = Math.max(4, Math.round(size * 0.012));
                        const tile = document.createElement("canvas");
                        tile.width = tile.height = tileS * 2;
                        const t = tile.getContext("2d");
                        t.imageSmoothingEnabled = false;
                        for (let y = 0; y < 2; y++) {
                            for (let x = 0; x < 2; x++) {
                                t.fillStyle =
                                    (x + y) % 2 === 0
                                        ? "#ffffff"
                                        : colorToCss(color);
                                t.fillRect(x * tileS, y * tileS, tileS, tileS);
                            }
                        }
                        const pattern = ctx.createPattern(tile, "repeat");

                        // Align the checker grid so a tile seam sits exactly at the chip edge (cx + R).
                        const period = tile.width;
                        const offsetX = (cx + R) % period;
                        const offsetY = cy % period;

                        if (pattern.setTransform) {
                            // shift the pattern's coordinate space so seam aligns at (cx+R, cy)
                            const m = new DOMMatrix();
                            m.translateSelf(-offsetX, -offsetY);
                            pattern.setTransform(m);
                            // paint pattern then mask
                            ctx.fillStyle = pattern;
                            ctx.fillRect(0, 0, size, size);
                        } else {
                            // fallback: translate canvas for equivalent alignment
                            ctx.save();
                            ctx.translate(-offsetX, -offsetY);
                            ctx.fillStyle = pattern;
                            ctx.fillRect(
                                offsetX,
                                offsetY,
                                size + period,
                                size + period,
                            );
                            ctx.restore();
                        }

                        // create texture and force nearest filtering
                        const tex = new THREE.CanvasTexture(canvas);
                        tex.flipY = false;
                        try {
                            //tex.encoding = THREE.sRGBEncoding;
                            tex.colorSpace = THREE.SRGBColorSpace;
                        } catch (e) {}
                        try {
                            tex.anisotropy =
                                renderer.capabilities.getMaxAnisotropy();
                        } catch (e) {}
                        try {
                            tex.minFilter = THREE.NearestFilter;
                            tex.magFilter = THREE.NearestFilter;
                            tex.generateMipmaps = false;
                        } catch (e) {}
                        chipTextureCache[color] = tex;

                        // clear center then draw image
                        const path = `chips/${color}.webp`;
                        loader.load(
                            path,
                            (loaded) => {
                                try {
                                    const img = loaded.image || loaded;
                                    // inner radius slightly smaller than pattern inner so image nearly fills chip
                                    const innerFactor = 0.86;
                                    const innerR = Math.max(
                                        2,
                                        Math.round(R * innerFactor),
                                    );
                                    const drawR = Math.max(
                                        4,
                                        Math.round(
                                            innerR -
                                                Math.max(
                                                    2,
                                                    Math.round(size * 0.01),
                                                ),
                                        ),
                                    );
                                    // cut slightly larger to avoid any residual pattern fringe
                                    ctx.save();
                                    ctx.globalCompositeOperation =
                                        "destination-out";
                                    ctx.beginPath();
                                    ctx.arc(cx, cy, drawR + 3, 0, Math.PI * 2);
                                    ctx.fill();
                                    ctx.globalCompositeOperation =
                                        "source-over";
                                    ctx.restore();
                                    ctx.drawImage(
                                        img,
                                        cx - drawR,
                                        cy - drawR,
                                        drawR * 2,
                                        drawR * 2,
                                    );
                                    tex.needsUpdate = true;
                                } catch (e) {
                                    console.warn(
                                        "Failed to composite chip image",
                                        path,
                                        e,
                                    );
                                }
                            },
                            undefined,
                            () => {
                                /* keep pattern-only chip if no image */
                            },
                        );

                        return tex;
                    }

                    // create a side texture composed of strict square checks
                    function getChipSideTexture(
                        color,
                        width = 1024,
                        height = 128,
                        checks = 64,
                    ) {
                        const key = `side_${color}`;
                        if (chipTextureCache[key]) return chipTextureCache[key];
                        // tile size chosen to give 'checks' across width
                        const sq = Math.max(4, Math.round(width / checks));
                        const tile = document.createElement("canvas");
                        tile.width = sq * 2;
                        tile.height = sq * 2;
                        const t = tile.getContext("2d");
                        t.imageSmoothingEnabled = false;
                        // 2x2 checker in tile
                        for (let y = 0; y < 2; y++) {
                            for (let x = 0; x < 2; x++) {
                                t.fillStyle =
                                    (x + y) % 2 === 0
                                        ? "#ffffff"
                                        : colorToCss(color);
                                t.fillRect(x * sq, y * sq, sq, sq);
                            }
                        }
                        const sideCanvas = document.createElement("canvas");
                        sideCanvas.width = width;
                        sideCanvas.height = height;
                        const g = sideCanvas.getContext("2d");
                        g.imageSmoothingEnabled = false;
                        const pattern = g.createPattern(tile, "repeat");
                        g.fillStyle = pattern;
                        g.fillRect(0, 0, width, height);

                        const sideTex = new THREE.CanvasTexture(sideCanvas);
                        sideTex.wrapS = THREE.RepeatWrapping;
                        sideTex.wrapT = THREE.ClampToEdgeWrapping;
                        sideTex.repeat.set(1, 1);
                        try {
                            //sideTex.encoding = THREE.sRGBEncoding;
                            sideTex.colorSpace = THREE.SRGBColorSpace;
                        } catch (e) {}
                        try {
                            sideTex.anisotropy =
                                renderer.capabilities.getMaxAnisotropy();
                        } catch (e) {}
                        // avoid linear filtering
                        try {
                            sideTex.minFilter = THREE.NearestFilter;
                            sideTex.magFilter = THREE.NearestFilter;
                            sideTex.generateMipmaps = false;
                        } catch (e) {}
                        chipTextureCache[key] = sideTex;
                        return sideTex;
                    }

                    function createChipMesh(color) {
                        const geom = new THREE.CylinderGeometry(
                            CHIP_DIAMETER / 2,
                            CHIP_DIAMETER / 2,
                            CHIP_THICKNESS,
                            64,
                        );
                        // translate so origin is at bottom of chip
                        geom.translate(0, CHIP_THICKNESS / 2, 0);
                        // top/bottom texture
                        const topTex = getChipTexture(color);
                        const botTex = topTex;
                        // side texture
                        const sideTex = getChipSideTexture(color);
                        // materials
                        const sideMat = new THREE.MeshStandardMaterial({
                            map: sideTex,
                            metalness: 0.15,
                            roughness: 0.6,
                        });
                        const topMat = new THREE.MeshStandardMaterial({
                            map: topTex,
                            side: THREE.DoubleSide,
                            roughness: 0.45,
                            metalness: 0.25,
                        });
                        const botMat = new THREE.MeshStandardMaterial({
                            map: botTex,
                            side: THREE.DoubleSide,
                            roughness: 0.45,
                            metalness: 0.25,
                        });
                        const mesh = new THREE.Mesh(geom, [
                            sideMat,
                            topMat,
                            botMat,
                        ]);
                        mesh.castShadow = true;
                        mesh.receiveShadow = false;
                        // store normalized chip color
                        mesh.userData.chipColor = String(color).toLowerCase();
                        // ensure a stable default orientation
                        mesh.rotation.set(0, 0, 0);
                        return mesh;
                    }

                    // lightweight chip physics state + helpers
                    const chips = []; // active chip objects
                    const CHIP_RADIUS = CHIP_DIAMETER / 2;
                    const chipPhysics = {
                        gravity: -18.0,
                        groundY: BASE_DECK_Y + CHIP_THICKNESS / 2 + 0.001,
                        restitution: 0.25, // bounciness
                        frictionGround: 0.7, // damping on ground contact
                        frictionAir: 0.995, // drag
                        contactEpsilon: 0.0001,
                        // make snap distance large enough so subsequent chips join the stack
                        stackSnapDistance: 0.8, // max horizontal distance to snap into same stack (tweak)
                        stackSettleVel: 0.06, // max horizontal speed to be considered settled
                        stackMaxHeight: 24, // safety cap on stack height
                    };

                    // deterministic per-seat-per-color anchors so different-color stacks don't occupy the exact same X/Z.
                    const chipStacks = {}; // key -> { id, seat, anchor: Vector3, members: [], color, pending }
                    let nextStackId = 1;

                    // stable color ordering and offset step for per-color anchors
                    const COLORS_ORDER = ["black", "blue", "green", "red"];
                    // lateral spacing between color stacks
                    const COLOR_STACK_OFFSET = CHIP_DIAMETER * 1.1;
                    // tuned to sit just behind the fan
                    const FRONT_STACK_OFFSET = 3.2;

                    function getStackKey(seat, color) {
                        // normalize seat to a stable string so keys are consistent
                        return `${seatKey(seat)}_${String(color).toLowerCase()}`;
                    }

                    function computeColorAnchor(seat, color) {
                        const gY = chipPhysics.groundY;
                        const col = String(color).toLowerCase();
                        // Anchor chips relative to the player's position
                        let anchor;
                        if (seat === "pot") {
                            // Pot chips
                            anchor = potPosition.clone();
                        } else if (seat === "dealer") {
                            anchor = dealerPosition.clone();
                        } else {
                            // Use seat position directly
                            anchor = playerPositions[seat]
                                ? playerPositions[seat].clone()
                                : playerPositions[0].clone();
                        }

                        // anchor on the ground plane
                        anchor.y = gY;
                        // anchor outward from table center, chips sit behind the hand
                        // skip for pot
                        if (seat !== "pot") {
                            const center = new THREE.Vector3(0, gY, 0);
                            const dir = anchor.clone().sub(center);
                            dir.y = 0;
                            if (dir.lengthSq() > 1e-6) {
                                dir.normalize();
                                // place the stack a fixed offset behind the hand, not scaled down
                                // use larger offset for seats 2 and 3 (players 3 and 4) to push chips away from camera
                                const offset =
                                    seat === 1 || seat === 2
                                        ? FRONT_STACK_OFFSET * 2.0
                                        : FRONT_STACK_OFFSET;
                                anchor.addScaledVector(dir, offset);
                            }
                        }

                        // compute lateral axis for color lanes.
                        // Use the world X-axis so color lanes align with the horizontal card fan
                        let perp = new THREE.Vector3(1, 0, 0);
                        perp.normalize();

                        // lateral spacing between color stacks to spread out and align with card fan
                        const lateralSpacing = Math.max(
                            CARD_W * 0.65,
                            CHIP_DIAMETER * 1.3,
                            COLOR_STACK_OFFSET * 0.9,
                        );
                        const idx = Math.max(0, COLORS_ORDER.indexOf(col));
                        const mid = (COLORS_ORDER.length - 1) / 2;
                        const lateralShift = (idx - mid) * lateralSpacing;

                        anchor.addScaledVector(perp, lateralShift);
                        return anchor;
                    }

                    // tiny per-chip jitter so stacked chips don't overlap
                    function getStackJitter(idx) {
                        // base lateral steps so small stacks spread lightly
                        const JX = 0.03; // horizontal step
                        const JZ = 0.02; // depth step
                        // pattern with small random variation to avoid exact overlap
                        const patternX = ((idx % 3) - 1) * JX;
                        const patternZ = ((Math.floor(idx / 3) % 2) - 0.5) * JZ;
                        const randX = (Math.random() - 0.5) * 0.01;
                        const randZ = (Math.random() - 0.5) * 0.008;
                        return { x: patternX + randX, z: patternZ + randZ };
                    }

                    // Normalize seat identifiers for consistent comparisons/keys
                    function seatKey(s) {
                        if (s === "dealer") return "dealer";
                        if (typeof s === "number") return String(s);
                        if (typeof s === "string") return s;
                        return String(s);
                    }

                    // Base seat key (maps split seats like '0_split' to their base '0')
                    function seatBaseKey(s) {
                        const k = seatKey(s);
                        if (typeof k === "string" && k.includes("_split"))
                            return String(k.split("_")[0]);
                        return k;
                    }

                    function getOrCreateStack(seat, color){
                        const key = getStackKey(seat, color);
                        if(chipStacks[key]) return chipStacks[key];
                        const anchor = computeColorAnchor(seat, color);
                        const sid = nextStackId++;
                        // store normalized seat id for reliable comparisons elsewhere
                        const storedSeat = seatKey(seat);
                        chipStacks[key] = { id: sid, seat: storedSeat, anchor, members: [], color: String(color).toLowerCase(), pending: 0 };
                        return chipStacks[key];
                    }

                    function spawnChip(color, seatIndex = 0) {
                        // normalize color and seat
                        const col = String(color).toLowerCase();
                        const seat =
                            seatIndex === "dealer"
                                ? "dealer"
                                : typeof seatIndex === "number"
                                  ? seatIndex
                                  : 0;

                        // Get or create stack for this seat+color combination
                        const stack = getOrCreateStack(seat, col);

                        // create chip mesh and add to scene
                        const mesh = createChipMesh(col);
                        scene.add(mesh);

                        // Calculate spawn position near target stack
                        const targetX = stack.anchor.x;
                        const targetZ = stack.anchor.z;
                        const targetY = chipPhysics.groundY + 0.5;

                        // prepare chip state
                        const chipObj = {
                            mesh,
                            velocity: new THREE.Vector3(0, -2, 0), // small downward velocity for drop effect
                            mass: 1.0,
                            radius: CHIP_RADIUS,
                            restitution: chipPhysics.restitution,
                            color: col,
                            seat: seat, // store target seat for stack matching
                            id: `chip_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
                        };

                        // Spawn chip above its target position
                        chipObj.mesh.position.set(targetX, targetY, targetZ);
                        chipObj.mesh.rotation.set(
                            0,
                            Math.random() * Math.PI * 2,
                            0,
                        );

                        // Add only to chips array
                        chips.push(chipObj);
                        return chipObj;
                    }

                    async function animateSingleChipTransfer(chipObj, toSeat, opts = {}) {
                        if (!chipObj || !chipObj.mesh) return;
                        const dur = opts.duration || 800;
                        try {
                            if (chipObj.stackId !== undefined) {
                                for (const key in chipStacks) {
                                    const s = chipStacks[key];
                                    if (!s || !Array.isArray(s.members)) continue;
                                    const idx = s.members.indexOf(chipObj);
                                    if (idx !== -1) {
                                        s.members.splice(idx, 1);
                                        break;
                                    }
                                }
                            }
                        } catch (e) {}

                        const color =
                            chipObj.color ||
                            (chipObj.mesh &&
                                chipObj.mesh.userData &&
                                chipObj.mesh.userData.chipColor) ||
                            "black";
                        const destStack = getOrCreateStack(toSeat, color);
                        destStack.pending = (destStack.pending || 0) + 1;
                        const targetIndex = destStack.members.length;
                        const target = destStack.anchor.clone();
                        const jitter = getStackJitter(targetIndex);
                        target.x += jitter.x;
                        target.z += jitter.z;
                        const targetY =
                            chipPhysics.groundY +
                            targetIndex * CHIP_THICKNESS +
                            0.0005;

                        try {
                            await tweenTo(
                                chipObj,
                                { x: target.x, y: targetY, z: target.z },
                                dur,
                            );
                        } catch (e) {}

                        chipObj.stackId = destStack.id;
                        chipObj.seat = toSeat;
                        destStack.members.push(chipObj);
                        destStack.pending = Math.max(
                            0,
                            (destStack.pending || 1) - 1,
                        );
                        try {
                            chipObj.mesh.rotation.set(0, 0, 0);
                            chipObj.mesh.position.set(target.x, targetY, target.z);
                        } catch (e) {}
                    }

                    // replace cluster anchor creation with per-seat-per-color anchors:
                    function manageChipStacks(){
                        const gY = chipPhysics.groundY;
                        
                        // First pass: check if any free chips should snap to stacks
                        for(const c of chips){
                        if(!c || !c.mesh || c.stackId !== undefined) continue; // skip if already in a stack
                        
                        // Find the correct stack for chip
                        const chipSeat = c.seat !== undefined ? c.seat : 0;
                        const chipColor = c.color || 'black';
                        const stackKey = getStackKey(chipSeat, chipColor);
                        
                        // Check if stack exists or create
                        let stack = chipStacks[stackKey];
                        if(!stack){
                            stack = getOrCreateStack(chipSeat, chipColor);
                        }
                        
                        // Check horizontal distance to the target stack anchor
                        const dx = c.mesh.position.x - stack.anchor.x;
                        const dz = c.mesh.position.z - stack.anchor.z;
                        const hDist = Math.hypot(dx, dz);
                        
                        // If close enough snap to stack
                        if(hDist < chipPhysics.stackSnapDistance){
                            c.stackId = stack.id;
                            c.velocity.set(0,0,0);
                            stack.members.push(c);
                            // snap chip to stack with jitter and vertical spacing for visual counting
                            const idx = stack.members.length - 1;
                            const jitter = getStackJitter(idx);
                            // Increase vertical spacing so chips are easier to count
                            const verticalSpacing = CHIP_THICKNESS * 1.0;
                            c.mesh.position.x = stack.anchor.x + jitter.x;
                            c.mesh.position.z = stack.anchor.z + jitter.z;
                            c.mesh.position.y = gY + idx * verticalSpacing;
                            c.mesh.rotation.set(0,0,0);
                            continue;
                        }
                        }
                        
                        // cleanup empty stacks
                        for(const key in Object.assign({}, chipStacks)){
                        const s = chipStacks[key];
                        if((!s.members || s.members.length === 0) && (!s.pending || s.pending === 0)) delete chipStacks[key];
                        }
                    }

                    // Chip transfer animations
                    function getStackKeysForSeat(seat) {
                        const keys = [];
                        for (const k in chipStacks) {
                            try {
                                if (chipStacks[k].seat === seatKey(seat))
                                    keys.push(k);
                            } catch (e) {}
                        }
                        return keys;
                    }

                    async function animateChipTransferBetweenSeats(fromSeat, toSeat, opts = {}){
                        const dur = opts.duration || 800;
                        const moved = [];
                        const fromKeys = getStackKeysForSeat(fromSeat);
                        for(const fk of fromKeys){
                        const stack = chipStacks[fk];
                        if(!stack || !Array.isArray(stack.members) || stack.members.length === 0) continue;
                        // clone members list
                        const members = stack.members.slice();
                        // iterate from top of stack -> bottom so top chips move first (prevents floating)
                        for(let mi = members.length - 1; mi >= 0; mi--){
                            const chipObj = members[mi];
                            try{
                            const color = chipObj.color || (chipObj.mesh && chipObj.mesh.userData && chipObj.mesh.userData.chipColor) || 'black';
                            const destStack = getOrCreateStack(toSeat, color);
                            destStack.pending = (destStack.pending || 0) + 1;
                            const targetIndex = destStack.members.length;
                            const target = destStack.anchor.clone();
                            const jitter = getStackJitter(targetIndex);
                            target.x += jitter.x;
                            target.z += jitter.z;
                            // moving chips to the dealer, nudge the visual target
                            const extraShift = (opts && typeof opts.shift === 'number') ? opts.shift : 3.2;
                            try{
                                if(String(destStack.seat) === 'dealer'){
                                const center = new THREE.Vector3(0, chipPhysics.groundY, 0);
                                const dir = dealerPosition.clone().sub(center);
                                dir.y = 0;
                                if(dir.lengthSq() > 1e-6) dir.normalize();
                                target.addScaledVector(dir, extraShift);
                                }
                            }catch(e){ /* ignore if positions unavailable */ }
                            const targetY = chipPhysics.groundY + targetIndex * CHIP_THICKNESS + 0.0005;
                            // animate chip mesh to target
                            await tweenTo(chipObj, { x: target.x, y: targetY, z: target.z }, dur);
                            // remove from old stack and add to dest stack
                            try{
                                const idx = stack.members.indexOf(chipObj);
                                if(idx !== -1) stack.members.splice(idx,1);
                            }catch(e){}
                            chipObj.stackId = destStack.id;
                            // update chip's seat to destination so it stacks with other chips there
                            chipObj.seat = toSeat;
                            destStack.members.push(chipObj);
                            // mark transfer complete for cleanup safety
                            destStack.pending = Math.max(0, (destStack.pending || 1) - 1);
                            // stabilize final transform
                            try{ chipObj.mesh.rotation.set(0,0,0); chipObj.mesh.position.set(target.x, targetY, target.z); }catch(e){}
                            moved.push({ chip: chipObj, from: fk, to: destStack });
                            }catch(e){ console.warn('chip transfer failed', e); }
                        }
                        }
                        return moved;
                    }

                    // Interpret results and animate chips
                    async function animateChipOutcome(results) {
                        if (!Array.isArray(results) || results.length === 0)
                            return;
                        // perform transfers in parallel per-seat but await all to finish
                        const tasks = [];
                        for (const r of results) {
                            const seat = r.seat;
                            const text = String(
                                r.resultText || "",
                            ).toLowerCase();
                            if (text.includes("player wins")) {
                                // dealer pays player
                                tasks.push(
                                    animateChipTransferBetweenSeats(
                                        "dealer",
                                        seat,
                                    ),
                                );
                            } else if (text.includes("dealer wins")) {
                                // player pays dealer
                                tasks.push(
                                    animateChipTransferBetweenSeats(
                                        seat,
                                        "dealer",
                                    ),
                                );
                            } else {
                                // push/tie: leave chips as-is
                            }
                        }
                        try {
                            await Promise.all(tasks);
                        } catch (e) {
                            console.warn("chip outcome animation failed", e);
                        }
                    }

                    // hookup chip buttons immediately at current player's position
                    try {
                        document
                            .getElementById("chipBlackBtn")
                            .addEventListener("click", () =>
                                spawnChip("black", currentPlayerSeat),
                            );
                        document
                            .getElementById("chipBlueBtn")
                            .addEventListener("click", () =>
                                spawnChip("blue", currentPlayerSeat),
                            );
                        document
                            .getElementById("chipGreenBtn")
                            .addEventListener("click", () =>
                                spawnChip("green", currentPlayerSeat),
                            );
                        document
                            .getElementById("chipRedBtn")
                            .addEventListener("click", () =>
                                spawnChip("red", currentPlayerSeat),
                            );
                    } catch (e) {
                        console.warn("Chip button binding failed", e);
                    }

                    // Poker per-player action buttons
                    const playerActionContainers = [];
                    for (let i = 0; i < 4; i++) {
                        const container = document.getElementById(
                            `player${i}Actions`,
                        );
                        if (container) {
                            playerActionContainers.push({
                                container,
                                foldBtn: container.querySelector(
                                    '[data-action="fold"]',
                                ),
                                checkBtn: container.querySelector(
                                    '[data-action="check"]',
                                ),
                                betBtn: container.querySelector(
                                    '[data-action="bet"]',
                                ),
                                callBtn: container.querySelector(
                                    '[data-action="call"]',
                                ),
                                raiseBtn: container.querySelector(
                                    '[data-action="raise"]',
                                ),
                            });
                        }
                    }
                    let currentPlayerSeat = 0;
                    let dealerSeat = 0; // track which player is the dealer
                    let waitingForPlayer = false;
                    let communityCards = [];
                    let gamePhase = "preflop"; // preflop, flop, turn, river, showdown
                    let activePlayers = [0, 1, 2, 3]; // players still in the hand
                    let currentPlayerIndex = 0; // index into activePlayers array
                    let playersActedThisRound = new Set(); // track who has acted in current betting round
                    let lastRaiserSeat = -1; // track seat number of who raised last
                    let currentBet = 0; // track if there's a bet to call
                    let handComplete = false; // track if the current hand is finished

                    // Post small/big blinds before each deal
                    async function postBlinds() {
                        const smallSeat = (dealerSeat + 1) % seatCount;
                        const bigSeat = (dealerSeat + 2) % seatCount;
                        try {
                            document.getElementById("log").textContent =
                                `Posting blinds: SB Player ${smallSeat + 1} (red), BB Player ${bigSeat + 1} (blue)`;
                        } catch (e) {}

                        // spawn chips at player seats
                        const sbChip = spawnChip("red", smallSeat); // small blind = red chip
                        const bbChip = spawnChip("blue", bigSeat); // big blind = blue chip

                        // move blinds into the pot
                        try {
                            await Promise.all([
                                animateSingleChipTransfer(sbChip, "pot", {
                                    duration: 750,
                                }),
                                animateSingleChipTransfer(bbChip, "pot", {
                                    duration: 750,
                                }),
                            ]);
                        } catch (e) {
                            console.warn("blind transfer failed", e);
                        }
                    }

                    function enablePlayerControls(enabled, seat) {
                        // Hide all player action buttons first
                        playerActionContainers.forEach((p) => {
                            if (p.container)
                                p.container.classList.remove("active");
                        });

                        if (!enabled || seat === undefined) return;

                        const playerBtns = playerActionContainers[seat];
                        if (!playerBtns) return;

                        // Show and enable buttons for current player
                        playerBtns.container.classList.add("active");
                        playerBtns.foldBtn.disabled = false;
                        playerBtns.raiseBtn.disabled = false;

                        // When there's no current bet: check and bet are available
                        // When there's a current bet: call and raise are available
                        if (currentBet === 0) {
                            playerBtns.checkBtn.disabled = false;
                            playerBtns.betBtn.disabled = false;
                            playerBtns.callBtn.disabled = true;
                        } else {
                            playerBtns.checkBtn.disabled = true;
                            playerBtns.betBtn.disabled = true;
                            playerBtns.callBtn.disabled = false;
                        }
                    }

                    // Poker hand rank and description
                    function evaluatePokerHand(cards) {
                        if (!cards || cards.length < 5)
                            return { rank: 0, desc: "Insufficient cards" };

                        // Parse card info
                        const parsed = cards
                            .map((c) => {
                                const id = c.id || "";
                                const parts = id.split("-");
                                const suit = parts[0] || "";
                                const rank = parts[1] || "";
                                let value = 0;
                                if (rank === "ace") value = 14;
                                else if (rank === "king") value = 13;
                                else if (rank === "queen") value = 12;
                                else if (rank === "jack") value = 11;
                                else value = parseInt(rank, 10) || 0;
                                return { suit, rank, value };
                            })
                            .filter((c) => c.value > 0);

                        if (parsed.length < 5)
                            return { rank: 0, desc: "Insufficient cards" };

                        // numeric rank -> name
                        const nameFor = (v) => {
                            if (v === 14) return "Ace";
                            if (v === 13) return "King";
                            if (v === 12) return "Queen";
                            if (v === 11) return "Jack";
                            return String(v);
                        };
                        const pluralName = (v) => nameFor(v) + "s";

                        // evaluate a single 5-card hand
                        function evaluateHand5(hand5) {
                            const sorted = hand5
                                .slice()
                                .sort((a, b) => b.value - a.value);

                            // Check for flush
                            const isFlush = sorted.every(
                                (c) => c.suit === sorted[0].suit,
                            );

                            // Check for straight
                            const values = sorted.map((c) => c.value);
                            let isStraight = false;
                            let straightHigh = 0;

                            // First check standard straight
                            const uniqueVals = [...new Set(values)].sort(
                                (a, b) => b - a,
                            );
                            if (
                                uniqueVals.length === 5 &&
                                uniqueVals[0] - uniqueVals[4] === 4
                            ) {
                                isStraight = true;
                                straightHigh = uniqueVals[0];
                            }

                            // Check for wheel (A-2-3-4-5) - Ace plays low
                            if (
                                !isStraight &&
                                uniqueVals.length === 5 &&
                                uniqueVals.includes(14) &&
                                uniqueVals.includes(2) &&
                                uniqueVals.includes(3) &&
                                uniqueVals.includes(4) &&
                                uniqueVals.includes(5)
                            ) {
                                isStraight = true;
                                straightHigh = 5; // In a wheel, the 5 is high
                            }

                            // Count ranks for pairs, trips, quads
                            const rankCounts = {};
                            sorted.forEach((c) => {
                                rankCounts[c.value] =
                                    (rankCounts[c.value] || 0) + 1;
                            });

                            // Get counts sorted by frequency, then by rank value
                            const countArray = Object.entries(rankCounts).map(
                                ([val, count]) => ({
                                    value: parseInt(val),
                                    count: count,
                                }),
                            );
                            countArray.sort((a, b) => {
                                if (b.count !== a.count)
                                    return b.count - a.count; // Sort by count first
                                return b.value - a.value; // Then by value
                            });

                            const counts = countArray.map((x) => x.count);
                            const rankValues = countArray.map((x) => x.value);

                            // Evaluate hand priority
                            if (isStraight && isFlush) {
                                if (straightHigh === 14)
                                    return {
                                        rank: 10,
                                        desc: "Royal Flush",
                                        sortKey: [10, 14],
                                    };
                                return {
                                    rank: 9,
                                    desc: `Straight Flush, ${nameFor(straightHigh)} high`,
                                    sortKey: [9, straightHigh],
                                };
                            }
                            if (counts[0] === 4) {
                                return {
                                    rank: 8,
                                    desc: `Four of a Kind, ${pluralName(rankValues[0])}`,
                                    sortKey: [8, rankValues[0], rankValues[1]],
                                };
                            }
                            if (counts[0] === 3 && counts[1] === 2) {
                                return {
