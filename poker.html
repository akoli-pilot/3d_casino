                                    rank: 7,
                                    desc: `Full House, ${pluralName(rankValues[0])} over ${pluralName(rankValues[1])}`,
                                    sortKey: [7, rankValues[0], rankValues[1]],
                                };
                            }
                            if (isFlush) {
                                return {
                                    rank: 6,
                                    desc: `Flush, ${nameFor(rankValues[0])} high`,
                                    sortKey: [6, ...rankValues],
                                };
                            }
                            if (isStraight) {
                                return {
                                    rank: 5,
                                    desc: `Straight, ${nameFor(straightHigh)} high`,
                                    sortKey: [5, straightHigh],
                                };
                            }
                            if (counts[0] === 3) {
                                return {
                                    rank: 4,
                                    desc: `Three of a Kind, ${pluralName(rankValues[0])}`,
                                    sortKey: [
                                        4,
                                        rankValues[0],
                                        rankValues[1],
                                        rankValues[2],
                                    ],
                                };
                            }
                            if (counts[0] === 2 && counts[1] === 2) {
                                return {
                                    rank: 3,
                                    desc: `Two Pair, ${pluralName(rankValues[0])} and ${pluralName(rankValues[1])}`,
                                    sortKey: [
                                        3,
                                        rankValues[0],
                                        rankValues[1],
                                        rankValues[2],
                                    ],
                                };
                            }
                            if (counts[0] === 2) {
                                return {
                                    rank: 2,
                                    desc: `Pair of ${pluralName(rankValues[0])}`,
                                    sortKey: [
                                        2,
                                        rankValues[0],
                                        rankValues[1],
                                        rankValues[2],
                                        rankValues[3],
                                    ],
                                };
                            }
                            // High card
                            return {
                                rank: 1,
                                desc: `High Card, ${nameFor(rankValues[0])}`,
                                sortKey: [1, ...rankValues],
                            };
                        }

                        // generate all 5-card combinations from array
                        function combinations(arr, size) {
                            const result = [];
                            function helper(start, combo) {
                                if (combo.length === size) {
                                    result.push(combo.slice());
                                    return;
                                }
                                for (let i = start; i < arr.length; i++) {
                                    combo.push(arr[i]);
                                    helper(i + 1, combo);
                                    combo.pop();
                                }
                            }
                            helper(0, []);
                            return result;
                        }

                        // compare two sortKeys
                        function compareSortKeys(a, b) {
                            for (
                                let i = 0;
                                i < Math.min(a.length, b.length);
                                i++
                            ) {
                                if (a[i] > b[i]) return 1;
                                if (a[i] < b[i]) return -1;
                            }
                            return 0;
                        }

                        // Find best hand from all possible 5-card combinations
                        let bestHand = {
                            rank: 0,
                            desc: "No hand",
                            sortKey: [0],
                        };
                        const allCombos = combinations(parsed, 5);
                        for (const combo of allCombos) {
                            const handEval = evaluateHand5(combo);
                            if (
                                compareSortKeys(
                                    handEval.sortKey,
                                    bestHand.sortKey,
                                ) > 0
                            ) {
                                bestHand = handEval;
                            }
                        }

                        return {
                            rank: bestHand.rank,
                            desc: bestHand.desc,
                            sortKey: bestHand.sortKey,
                        };
                    }

                    async function setupPlayerTurn() {
                        if (handComplete) return;
                        if (activePlayers.length === 0) return;
                        // ensure currentPlayerIndex is valid
                        if (currentPlayerIndex >= activePlayers.length)
                            currentPlayerIndex = 0;
                        currentPlayerSeat = activePlayers[currentPlayerIndex];
                        waitingForPlayer = true;
                        enablePlayerControls(true, currentPlayerSeat);
                        const phaseText =
                            gamePhase.charAt(0).toUpperCase() +
                            gamePhase.slice(1);
                        const dealerText =
                            currentPlayerSeat === dealerSeat ? " (Dealer)" : "";
                        try {
                            document.getElementById("log").textContent =
                                `${phaseText} - Player ${currentPlayerSeat + 1}'s turn${dealerText}`;
                        } catch (e) {}
                    }

                    async function finishPlayerTurn() {
                        // disable controls while processing
                        enablePlayerControls(false);
                        waitingForPlayer = false;

                        // Mark current player as having acted
                        playersActedThisRound.add(currentPlayerSeat);

                        await wait(500);

                        // If Player 4 (seat 3) acted during betting rounds, advance phase immediately
                        if (
                            currentPlayerSeat === 3 &&
                            (gamePhase === "preflop" ||
                                gamePhase === "flop" ||
                                gamePhase === "turn" ||
                                gamePhase === "river")
                        ) {
                            playersActedThisRound.clear();
                            lastRaiserSeat = -1;
                            currentPlayerIndex = 0;
                            currentBet = 0; // reset bet for next round
                            try {
                                await advanceGamePhase();
                            } catch (e) {
                                console.error("advanceGamePhase error", e);
                            }
                            return;
                        }

                        // Check if betting round is complete:
                        // All active players must have acted AND either:
                        //   - No raise happened (lastRaiserSeat === -1), OR
                        //   - We've cycled back and current player is the raiser
                        const allPlayersActed = activePlayers.every((p) =>
                            playersActedThisRound.has(p),
                        );
                        const actionBackToRaiser =
                            lastRaiserSeat >= 0 &&
                            currentPlayerSeat === lastRaiserSeat;
                        const bettingComplete =
                            allPlayersActed &&
                            (lastRaiserSeat === -1 || actionBackToRaiser);

                        if (bettingComplete) {
                            // Betting round complete - advance to next phase
                            playersActedThisRound.clear();
                            lastRaiserSeat = -1;
                            currentPlayerIndex = 0;
                            currentBet = 0; // reset bet for next round
                            try {
                                await advanceGamePhase();
                            } catch (e) {
                                console.error("advanceGamePhase error", e);
                            }
                        } else {
                            // Move to next player in the round
                            currentPlayerIndex =
                                (currentPlayerIndex + 1) % activePlayers.length;
                            await wait(300);
                            try {
                                await setupPlayerTurn();
                            } catch (e) {
                                console.error("setupPlayerTurn error", e);
                            }
                        }
                    }

                    async function playerCheck() {
                        if (!waitingForPlayer) return;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${currentPlayerSeat + 1} checks`;
                        } catch (e) {}
                        await finishPlayerTurn();
                    }

                    async function playerBet() {
                        if (!waitingForPlayer) return;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${currentPlayerSeat + 1} bets`;
                        } catch (e) {}
                        // Spawn chip and move to pot
                        spawnChip("blue", currentPlayerSeat);
                        await wait(200);
                        await animateChipTransferBetweenSeats(
                            currentPlayerSeat,
                            "pot",
                            { duration: 600 },
                        );
                        // Bet initiates the betting
                        currentBet = 1; // mark bet
                        lastRaiserSeat = currentPlayerSeat; // better is raiser for round completion
                        // Clear previous actions since everyone needs to act again after a bet
                        playersActedThisRound.clear();
                        playersActedThisRound.add(currentPlayerSeat);
                        await finishPlayerTurn();
                    }

                    async function playerCall() {
                        if (!waitingForPlayer) return;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${currentPlayerSeat + 1} calls`;
                        } catch (e) {}
                        // Spawn chip and move to pot
                        spawnChip("blue", currentPlayerSeat);
                        await wait(200);
                        await animateChipTransferBetweenSeats(
                            currentPlayerSeat,
                            "pot",
                            { duration: 600 },
                        );
                        await finishPlayerTurn();
                    }

                    async function playerFold() {
                        if (!waitingForPlayer) return;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${currentPlayerSeat + 1} folds`;
                        } catch (e) {}

                        // Remove player from active players and adjust current index
                        const foldedIndex =
                            activePlayers.indexOf(currentPlayerSeat);
                        activePlayers = activePlayers.filter(
                            (p) => p !== currentPlayerSeat,
                        );
                        playersActedThisRound.delete(currentPlayerSeat);

                        // Adjust currentPlayerIndex after removal
                        if (foldedIndex < currentPlayerIndex) {
                            currentPlayerIndex--;
                        }
                        if (currentPlayerIndex >= activePlayers.length)
                            currentPlayerIndex = 0;

                        await wait(500);

                        // Check if only one player remains
                        if (activePlayers.length === 1) {
                            try {
                                document.getElementById("log").textContent =
                                    `Player ${activePlayers[0] + 1} wins by default!`;
                            } catch (e) {}
                            waitingForPlayer = false;
                            enablePlayerControls(false);
                            // Transfer chips to winner
                            await wait(800);
                            for (let s = 0; s < 4; s++) {
                                if (s !== activePlayers[0])
                                    await animateChipTransferBetweenSeats(
                                        s,
                                        activePlayers[0],
                                    );
                            }
                            return;
                        }

                        // If Player 4 (seat 3) folded, advance phase immediately for community reveal or showdown
                        if (
                            currentPlayerSeat === 3 &&
                            (gamePhase === "preflop" ||
                                gamePhase === "flop" ||
                                gamePhase === "turn" ||
                                gamePhase === "river")
                        ) {
                            waitingForPlayer = false;
                            enablePlayerControls(false);
                            playersActedThisRound.clear();
                            lastRaiserSeat = -1;
                            currentPlayerIndex = 0;
                            currentBet = 0; // reset bet for next round
                            try {
                                await advanceGamePhase();
                            } catch (e) {
                                console.error("advanceGamePhase error", e);
                            }
                            return;
                        }

                        // Continue to next player without finishing turn (player already removed)
                        waitingForPlayer = false;
                        enablePlayerControls(false);

                        // Check if betting round is complete
                        const allPlayersActed = activePlayers.every((p) =>
                            playersActedThisRound.has(p),
                        );
                        const bettingComplete =
                            allPlayersActed &&
                            (lastRaiserSeat === -1 ||
                                !activePlayers.includes(lastRaiserSeat));
                        if (bettingComplete) {
                            playersActedThisRound.clear();
                            lastRaiserSeat = -1;
                            currentPlayerIndex = 0;
                            currentBet = 0;
                            try {
                                await advanceGamePhase();
                            } catch (e) {
                                console.error("advanceGamePhase error", e);
                            }
                        } else {
                            await wait(300);
                            try {
                                await setupPlayerTurn();
                            } catch (e) {
                                console.error("setupPlayerTurn error", e);
                            }
                        }
                    }

                    async function playerRaise() {
                        if (!waitingForPlayer) return;
                        try {
                            document.getElementById("log").textContent =
                                `Player ${currentPlayerSeat + 1} raises`;
                        } catch (e) {}
                        // Track who raised
                        currentBet = 1; // mark bet
                        lastRaiserSeat = currentPlayerSeat; // store seat number
                        // Clear previous actions since everyone needs to act again after a raise
                        playersActedThisRound.clear();
                        playersActedThisRound.add(currentPlayerSeat);
                        await finishPlayerTurn();
                    }

                    // attach poker action to all player button sets
                    try {
                        playerActionContainers.forEach((playerBtns) => {
                            if (playerBtns.foldBtn)
                                playerBtns.foldBtn.addEventListener(
                                    "click",
                                    () => playerFold(),
                                );
                            if (playerBtns.checkBtn)
                                playerBtns.checkBtn.addEventListener(
                                    "click",
                                    () => playerCheck(),
                                );
                            if (playerBtns.betBtn)
                                playerBtns.betBtn.addEventListener(
                                    "click",
                                    () => playerBet(),
                                );
                            if (playerBtns.callBtn)
                                playerBtns.callBtn.addEventListener(
                                    "click",
                                    () => playerCall(),
                                );
                            if (playerBtns.raiseBtn)
                                playerBtns.raiseBtn.addEventListener(
                                    "click",
                                    () => playerRaise(),
                                );
                        });
                    } catch (e) {
                        console.warn("Player control binding failed", e);
                    }

                    async function loadAllTextures() {
                        textures = {};
                        const promises = deckIds.map((c) => {
                            const path = `cards/${c.suit}/${c.rank}.webp`;
                            return new Promise((res) => {
                                loader.load(
                                    path,
                                    (tex) => {
                                        try {
                                            tex.flipY = true;
                                        } catch (e) {}
                                        textures[c.id] = tex;
                                        res(true);
                                    },
                                    undefined,
                                    () => {
                                        res(false);
                                    },
                                );
                            });
                        });
                        const backP = new Promise((res) => {
                            loader.load(
                                "cards/backs/Blue.webp",
                                (tex) => {
                                    try {
                                        tex.flipY = true;
                                    } catch (e) {}
                                    backTexture = tex;
                                    res(true);
                                },
                                undefined,
                                () => {
                                    backTexture = null;
                                    res(false);
                                },
                            );
                        });
                        await Promise.all([...promises, backP]);
                        // ensure loaded color textures are treated as sRGB so lighting behaves correctly
                        Object.values(textures).forEach((t) => {
                            try {
                                //t.encoding = THREE.sRGBEncoding;
                                t.colorSpace = THREE.SRGBColorSpace;
                                t.needsUpdate = true;
                            } catch (e) {}
                        });
                        try {
                            if (backTexture) {
                                //backTexture.encoding = THREE.sRGBEncoding;
                                backTexture.colorSpace = THREE.SRGBColorSpace;
                                backTexture.needsUpdate = true;
                            }
                        } catch (e) {}
                        document.getElementById("log").textContent =
                            `Loaded ${Object.keys(textures).length} card textures. Back: ${!!backTexture}`;
                        console.log(
                            "loaded textures:",
                            Object.keys(textures).length,
                            "back:",
                            !!backTexture,
                        );
                    }

                    // card objects in scene
                    const cardObjects = [];
                    const dealtCards = [];

                    // safely dispose a card object
                    function disposeCard(o) {
                        if (!o || !o.mesh) return;
                        try {
                            if (o.mesh.parent) o.mesh.parent.remove(o.mesh);
                        } catch (e) {}
                        // dispose geometry
                        if (o.mesh.geometry && o.mesh.geometry.dispose)
                            o.mesh.geometry.dispose();
                        // dispose materials and maps
                        const mats = Array.isArray(o.mesh.material)
                            ? o.mesh.material
                            : [o.mesh.material];
                        // dispose any cloned maps
                        if (o._maps && Array.isArray(o._maps)) {
                            o._maps.forEach((map) => {
                                try {
                                    if (map && map.dispose) map.dispose();
                                } catch (e) {}
                            });
                        }
                        mats.forEach((m) => {
                            try {
                                if (m) m.dispose();
                            } catch (e) {}
                        });
                    }

                    function makeCardObject(cardId) {
                        // clone textures per card
                        const baseFront = textures[cardId] || null;
                        const baseBack = backTexture || null;
                        const frontTex =
                            baseFront && baseFront.clone
                                ? baseFront.clone()
                                : placeholderTexture(cardId);
                        const backTex =
                            baseBack && baseBack.clone
                                ? baseBack.clone()
                                : placeholderTexture("back");
                        // ensure cloned textures use the correct orientation
                        try {
                            frontTex.flipY = true;
                            backTex.flipY = true;
                        } catch (e) {}
                        // use ClampToEdgeWrapping and default repeat/offset.
                        try {
                            frontTex.wrapS = THREE.ClampToEdgeWrapping;
                            frontTex.repeat.x = 1;
                            frontTex.offset.x = 0;
                        } catch (e) {}
                        try {
                            backTex.wrapS = THREE.ClampToEdgeWrapping;
                            backTex.repeat.x = 1;
                            backTex.offset.x = 0;
                        } catch (e) {}
                        try {
                            //frontTex.encoding = THREE.sRGBEncoding;
                            //backTex.encoding = THREE.sRGBEncoding;
                            frontTex.colorSpace = THREE.SRGBColorSpace;
                            backTex.colorSpace = THREE.SRGBColorSpace;
                        } catch (e) {}
                        // Improve sampling to reduce texture edge bleeding.
                        try {
                            const maxAniso =
                                renderer.capabilities.getMaxAnisotropy();
                            frontTex.anisotropy = maxAniso;
                            backTex.anisotropy = maxAniso;
                            // linear filters without mipmaps to keep alpha stable
                            frontTex.minFilter = THREE.LinearFilter;
                            frontTex.magFilter = THREE.LinearFilter;
                            backTex.minFilter = THREE.LinearFilter;
                            backTex.magFilter = THREE.LinearFilter;
                            frontTex.generateMipmaps = false;
                            backTex.generateMipmaps = false;
                        } catch (e) {}
                        frontTex.needsUpdate = true;
                        backTex.needsUpdate = true;
                        const mesh = createCardMesh(frontTex, backTex);
                        // origin == card bottom
                        mesh.userData.cardId = cardId;
                        scene.add(mesh);
                        // store cloned maps for later disposal
                        const obj = {
                            mesh: mesh,
                            id: cardId,
                            faceUp: false,
                            anim: null,
                            _maps: [frontTex, backTex],
                        };
                        return obj;
                    }

                    function layoutDeckAt(x = 0, y = undefined, z = 0) {
                        if (y === undefined) y = BASE_DECK_Y;
                        // remove & dispose existing card meshes
                        cardObjects.forEach((o) => {
                            disposeCard(o);
                        });
                        cardObjects.length = 0;
                        for (let i = 0; i < deck.length; i++) {
                            const id = deck[i].id;
                            const obj = makeCardObject(id);
                            // per-card Y offset avoids z-fighting
                            obj.mesh.position.set(
                                x,
                                y + CARD_T / 2 + i * STACK_OFFSET,
                                z,
                            );
                            // ensure cards higher in the stack draw after lower ones
                            obj.mesh.renderOrder = i;
                            // bias polygonOffsetUnits per-stack to avoid z-fighting
                            try {
                                const mats = Array.isArray(obj.mesh.material)
                                    ? obj.mesh.material
                                    : [obj.mesh.material];
                                const baseUnits = 1.0;
                                const unitStep = 0.6; // increase per-card bias
                                // bias increases with i
                                mats.forEach((m) => {
                                    try {
                                        if (m && m.polygonOffset) {
                                            m.polygonOffsetUnits =
                                                baseUnits + i * unitStep;
                                            m.polygonOffsetFactor = 0.5;
                                        }
                                    } catch (e) {}
                                });
                            } catch (e) {}
                            // store a stable stack index
                            obj.mesh.userData.stackIndex = i;
                            const mats = Array.isArray(obj.mesh.material)
                                ? obj.mesh.material
                                : [obj.mesh.material];
                            mats.forEach((m) => {
                                try {
                                    m.depthWrite = true;
                                } catch (e) {}
                            });
                            // facedown cards
                            obj.mesh.rotation.set(-Math.PI / 2, Math.PI, 0);
                            obj.faceUp = false;
                            obj.mesh.scale.set(1, 1, 1);
                            cardObjects.push(obj);
                        }
                    }

                    function tweenTo(
                        obj,
                        props,
                        duration = 600,
                        easing = (t) => --t * t * t + 1,
                        onComplete,
                    ) {
                        const startVals = {},
                            deltas = {};
                        const mesh = obj.mesh;
                        for (const k in props) {
                            if (
                                mesh.position &&
                                mesh.position[k] !== undefined
                            ) {
                                startVals[k] = mesh.position[k];
                            } else if (
                                mesh.rotation &&
                                mesh.rotation[k] !== undefined
                            ) {
                                startVals[k] = mesh.rotation[k];
                            } else if (
                                mesh.scale &&
                                mesh.scale.x !== undefined
                            ) {
                                startVals[k] = mesh.scale.x;
                            } else {
                                startVals[k] = 0;
                            }
                            deltas[k] = props[k] - startVals[k];
                        }
                        const t0 = performance.now();
                        return new Promise((resolve) => {
                            (function tick(now) {
                                const p = Math.min(1, (now - t0) / duration);
                                const e = easing(p);
                                for (const k in props) {
                                    if (
                                        mesh.position &&
                                        mesh.position[k] !== undefined
                                    )
                                        mesh.position[k] =
                                            startVals[k] + deltas[k] * e;
                                    else if (
                                        mesh.rotation &&
                                        mesh.rotation[k] !== undefined
                                    )
                                        mesh.rotation[k] =
                                            startVals[k] + deltas[k] * e;
                                    else if (
                                        mesh.scale &&
                                        mesh.scale.x !== undefined
                                    )
                                        mesh.scale.setScalar(
                                            startVals[k] + deltas[k] * e,
                                        );
                                }
                                if (p < 1) requestAnimationFrame(tick);
                                else {
                                    if (onComplete) onComplete();
                                    resolve();
                                }
                            })(performance.now());
                        });
                    }

                    function tweenRotationToEuler(
                        mesh,
                        targetEuler,
                        duration = 400,
                        easing = (t) => t,
                    ) {
                        // ensure Euler order is explicit
                        targetEuler = new THREE.Euler(
                            targetEuler.x,
                            targetEuler.y,
                            targetEuler.z,
                            targetEuler.order || "XYZ",
                        );
                        const targetQ = new THREE.Quaternion().setFromEuler(
                            targetEuler,
                        );
                        const startQ = mesh.quaternion.clone();
                        const t0 = performance.now();
                        return new Promise((resolve) => {
                            (function tick(now) {
                                const p = Math.min(1, (now - t0) / duration);
                                const e = easing(p);
                                // use instance slerp (Spherical Linear Interpolation)
                                mesh.quaternion.copy(startQ).slerp(targetQ, e);
                                if (p < 1) requestAnimationFrame(tick);
                                else {
                                    // snap exactly to target
                                    mesh.quaternion.copy(targetQ);
                                    mesh.rotation.setFromQuaternion(
                                        mesh.quaternion,
                                        "XYZ",
                                    );
                                    resolve();
                                }
                            })(performance.now());
                        });
                    }

                    async function visualShuffle() {
                        const speed =
                            parseFloat(
                                document.getElementById("speed").value,
                            ) || 1;
                        const duration = 600 / speed;
                        // scatter effect
                        cardObjects.forEach((o, i) => {
                            const tx = (Math.random() - 0.5) * 8;
                            // ensure scatter Y stays above the ground using BASE_DECK_Y
                            const ty = BASE_DECK_Y + 0.2 + Math.random() * 2;
                            const tz = (Math.random() - 0.5) * 6;
                            tweenTo(o, { x: tx, y: ty, z: tz }, duration);
                            o.mesh.rotation.y = Math.random() * Math.PI * 2;
                        });
                        await wait(duration + 80);
                        shuffleArray(deck);
                        //layoutDeckAt(0, 0.5, 0);
                        layoutDeckAt(0, BASE_DECK_Y, 4);
                    }

                    function computePlayerPositions(n, opts = {}) {
                        const arcDeg =
                            opts.arcDeg !== undefined ? opts.arcDeg : 180; // semicircle
                        const radius =
                            opts.radius !== undefined ? opts.radius : 11.5;
                        const innerBoost =
                            opts.innerBoost !== undefined
                                ? opts.innerBoost
                                : 1.3;
                        const center =
                            opts.center !== undefined
                                ? opts.center
                                : new THREE.Vector3(0, BASE_DECK_Y, 0);
                        const positions = [];
                        if (n <= 1) {
                            positions.push(
                                new THREE.Vector3(
                                    center.x,
                                    BASE_DECK_Y,
                                    center.z - radius,
                                ),
                            );
                            return positions;
                        }
                        const startDeg = -arcDeg / 2;
                        const step = arcDeg / (n - 1);
                        // identify inner indices for even n
                        const innerLeft = Math.floor(n / 2) - 1;
                        const innerRight = Math.floor(n / 2);
                        for (let i = 0; i < n; i++) {
                            const deg = startDeg + i * step;
                            const rad = (deg * Math.PI) / 180;
                            // boost inner seats to increase separation
                            const useRadius =
                                i === innerLeft || i === innerRight
                                    ? radius * innerBoost
                                    : radius;
                            const x = center.x + Math.sin(rad) * useRadius;
                            const z = center.z - Math.cos(rad) * useRadius; // away from dealer
                            positions.push(
                                new THREE.Vector3(x, BASE_DECK_Y, z),
                            );
                        }
                        return positions;
                    }

                    // compute a dynamic dealer spacing
                    function computeDealerSpacing(count) {
                        // small margin to ensure cards don't touch when fanned.
                        const base = Math.max(CARD_W + 0.12, 1.0);
                        const perCard = 0.45;
                        // if camera is far, increase spacing a bit
                        const camFactor =
                            camera && camera.position
                                ? 1 +
                                  Math.max(
                                      0,
                                      camera.position.distanceTo(
                                          new THREE.Vector3(),
                                      ) - 10,
                                  ) *
                                      0.02
                                : 1;
                        // avoid exploding spacing
                        const spacing = Math.min(
                            3.2,
                            (base + Math.max(0, count - 1) * perCard) *
                                camFactor,
                        );
                        return spacing;
                    }

                    // 4-player poker table
                    const playerPositions = computePlayerPositions(4, {
                        arcDeg: 270,
                        radius: 10,
                        center: new THREE.Vector3(0, BASE_DECK_Y, 0),
                        innerBoost: 1.25,
                    });

                    // Increase separation for outer seats
                    if (playerPositions.length === 4) {
                        const _center = new THREE.Vector3(0, BASE_DECK_Y, 0);
                        const EXTRA_OUTER_OFFSET = CARD_W * 0.9; // tweakable multiplier
                        [0, 3].forEach((i) => {
                            const dir = playerPositions[i].clone().sub(_center);
                            dir.y = 0;
                            if (dir.length() > 1e-4) dir.normalize();
                            playerPositions[i].addScaledVector(
                                dir,
                                EXTRA_OUTER_OFFSET,
                            );
                        });
                    }

                    // community cards position
                    const communityPosition = new THREE.Vector3(
                        0,
                        BASE_DECK_Y,
                        0,
                    );
                    const dealerPosition = communityPosition;
                    // pot position
                    const potPosition = new THREE.Vector3(0, BASE_DECK_Y, -4.4);

                    // seat tracking for dealing sequence
                    const seatCount = playerPositions.length;
                    let nextSeatIndex = 0;
                    // Odds UI elements repurposed
                    const oddsContainer =
                        document.getElementById("oddsContainer");
                    const oddsEls = [];
                    function createOddsUI() {
                        oddsContainer.innerHTML = "";
                        oddsEls.length = 0;
                        for (let s = 0; s < seatCount; s++) {
                            const el = document.createElement("div");
                            el.className = "oddsLabel";
                            el.textContent = "";
                            oddsContainer.appendChild(el);
                            oddsEls.push(el);
                        }
                    }

                    // Per-player action button positioning
                    function updatePlayerActionPositions() {
                        for (
                            let s = 0;
                            s < playerActionContainers.length;
                            s++
                        ) {
                            const playerBtns = playerActionContainers[s];
                            if (!playerBtns || !playerBtns.container) continue;

                            // Get player hand cards to find center position
                            const hand = getSeatCards(s);
                            if (!hand || hand.length === 0) {
                                // Use player position fallback
                                const pos = playerPositions[s];
                                if (pos) {
                                    const screen = worldToScreenPosition(pos);
                                    playerBtns.container.style.left = `${screen.x}px`;
                                    playerBtns.container.style.top = `${screen.y - 80}px`;
                                    playerBtns.container.style.transform =
                                        "translateX(-50%)";
                                }
                                continue;
                            }

                            // Calculate center of hand
                            let sumX = 0,
                                sumZ = 0;
                            hand.forEach((c) => {
                                if (c.mesh && c.mesh.position) {
                                    sumX += c.mesh.position.x;
                                    sumZ += c.mesh.position.z;
                                }
                            });
                            const centerPos = new THREE.Vector3(
                                sumX / hand.length,
                                BASE_DECK_Y + 1.5,
                                sumZ / hand.length,
                            );
                            const screen = worldToScreenPosition(centerPos);

                            playerBtns.container.style.left = `${screen.x}px`;
                            playerBtns.container.style.top = `${screen.y}px`;
                            playerBtns.container.style.transform =
                                "translateX(-50%)";
                        }
                    }

                    // helper: shuffle array in-place (Fisher-Yates)
                    function shuffleInPlace(a) {
                        for (let i = a.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            const t = a[i];
                            a[i] = a[j];
                            a[j] = t;
                        }
                    }

                    // Display current hand evaluation
                    function getSeatCards(seat) {
                        return dealtCards.filter((c) => c.seat === seat);
                    }

                    function updateOddsUI() {
                        // card eval poker
                        if (!oddsEls.length) createOddsUI();
                        for (let s = 0; s < seatCount; s++) {
                            try {
                                const el = oddsEls[s];
                                if (!el) continue;
                                const pos = playerPositions[s];
                                if (!pos) continue;
                                const screen = worldToScreenPosition(pos);
                                el.style.left = screen.x + "px";
                                el.style.top = screen.y + 60 + "px";

                                const playerCards = getSeatCards(s);
                                const allCards = [
                                    ...playerCards,
                                    ...communityCards,
                                ];
                                if (allCards.length >= 5) {
                                    const handEval =
                                        evaluatePokerHand(allCards);
                                    el.textContent =
                                        handEval.desc || "Evaluating...";
                                } else {
                                    el.textContent =
                                        playerCards.length > 0
                                            ? "Waiting for flop..."
                                            : "";
                                }
                            } catch (e) {}
                        }
                        // Update player action button positions
                        updatePlayerActionPositions();
                    }

                    function worldToScreenPosition(vec) {
                        const p = vec.clone().project(camera);
                        return {
                            x: (p.x * 0.5 + 0.5) * innerWidth,
                            y: (-p.y * 0.5 + 0.5) * innerHeight,
                        };
                    }

                    async function dealPokerHand() {
                        const speed =
                            parseFloat(
                                document.getElementById("speed").value,
                            ) || 1;
                        const duration = 450 / speed;

                        // Reset game state
                        handComplete = false;
                        dealtCards.length = 0;
                        communityCards.length = 0;
                        activePlayers = [0, 1, 2, 3];
                        gamePhase = "preflop";
                        currentPlayerIndex = 0;
                        playersActedThisRound.clear();
                        lastRaiserSeat = -1;
                        currentBet = 0;

                        try {
                            document.getElementById("log").textContent =
                                `Dealing Texas Hold'em... (Player ${dealerSeat + 1} is the Dealer)`;
                        } catch (e) {}

                        // Forced blinds before any cards are dealt
                        await postBlinds();

                        // Deal 2 hole cards to each player
                        for (let cardNum = 0; cardNum < 2; cardNum++) {
                            for (let seat = 0; seat < 4; seat++) {
                                const pair = safePopCardMeshAndMeta();
                                if (!pair) continue;
                                const o = pair.meshObj;
                                if (!o) continue;

                                const pos = playerPositions[seat].clone();
                                pos.y = BASE_DECK_Y;
                                // Offset cards evenly apart
                                pos.x += (cardNum - 0.5) * CARD_W * 1.1;

                                o.seat = seat;
                                o._seatIndex = cardNum;

                                // Animate card from deck to player (face down)
                                const targetEuler = new THREE.Euler(
                                    -Math.PI / 2,
                                    Math.PI,
                                    0,
                                    "XYZ",
                                );
                                const finalY =
                                    BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;

                                await Promise.all([
                                    tweenTo(
                                        o,
                                        { x: pos.x, y: finalY, z: pos.z },
                                        duration,
                                        (t) => 1 - Math.pow(1 - t, 3),
                                    ),
                                    tweenRotationToEuler(
                                        o.mesh,
                                        targetEuler,
                                        duration,
                                    ),
                                ]);

                                o.mesh.position.set(pos.x, finalY, pos.z);
                                o.mesh.quaternion.setFromEuler(targetEuler);
                                o.faceUp = false;
                                o._baseOrigPosition = pos.clone();
                                o.origPosition = o._baseOrigPosition.clone();
                                o.origPosition.y = finalY;
                                o.origQuaternion = o.mesh.quaternion.clone();

                                try {
                                    playDealAt(o.mesh);
                                } catch (e) {}
                                dealtCards.push(o);
                                await wait(150 / speed);
                            }
                        }

                        try {
                            document.getElementById("log").textContent =
                                "Hole cards dealt - Preflop betting";
                        } catch (e) {}
                        await wait(500);
                        try {
                            await setupPlayerTurn();
                        } catch (e) {
                            console.error("setupPlayerTurn error", e);
                        }
                    }

                    // Advance through poker game phases
                    async function advanceGamePhase() {
                        const speed =
                            parseFloat(
                                document.getElementById("speed").value,
                            ) || 1;
                        const duration = 450 / speed;

                        if (activePlayers.length <= 1) {
                            try {
                                document.getElementById("log").textContent =
                                    `Player ${activePlayers[0] + 1} wins!`;
                            } catch (e) {}
                            return;
                        }

                        if (gamePhase === "preflop") {
                            gamePhase = "flop";
                            playersActedThisRound.clear();
                            currentPlayerIndex = 0;
                            currentBet = 0;
                            // Deal 3 community cards (flop)
                            for (let i = 0; i < 3; i++) {
                                await dealCommunityCard(i, duration);
                            }
                            try {
                                document.getElementById("log").textContent =
                                    "Flop dealt - betting round begins";
                            } catch (e) {}
                            await wait(800);
                            await setupPlayerTurn();
                        } else if (gamePhase === "flop") {
                            gamePhase = "turn";
                            playersActedThisRound.clear();
                            currentPlayerIndex = 0;
                            currentBet = 0;
                            // Deal 1 community card (turn)
                            await dealCommunityCard(3, duration);
                            try {
                                document.getElementById("log").textContent =
                                    "Turn dealt - betting round begins";
                            } catch (e) {}
                            await wait(800);
                            await setupPlayerTurn();
                        } else if (gamePhase === "turn") {
                            gamePhase = "river";
                            playersActedThisRound.clear();
                            currentPlayerIndex = 0;
                            currentBet = 0;
                            // Deal 1 community card (river)
                            await dealCommunityCard(4, duration);
                            try {
                                document.getElementById("log").textContent =
                                    "River dealt - final betting round";
                            } catch (e) {}
                            await wait(800);
                            await setupPlayerTurn();
                        } else if (gamePhase === "river") {
                            gamePhase = "showdown";
                            await showdown();
                        }
                    }

                    // Deal a community card
                    async function dealCommunityCard(index, duration) {
                        if (deck.length === 0 || cardObjects.length === 0)
                            return;
                        const pair = safePopCardMeshAndMeta();
                        if (!pair) return;
                        const o = pair.meshObj;
                        const meta = pair.meta;
                        if (!o || !meta) return;

                        const pos = communityPosition.clone();
                        pos.x += (index - 2) * CARD_W * 1.1;
                        pos.y = BASE_DECK_Y;

                        o.seat = "community";
                        o._seatIndex = index;
                        o.id = meta.id; // Store the card ID from deck metadata

                        const targetEuler = new THREE.Euler(
                            -Math.PI / 2,
                            0,
                            0,
                            "XYZ",
                        );
                        const finalY = BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;

                        await Promise.all([
                            tweenTo(
                                o,
                                { x: pos.x, y: finalY, z: pos.z },
                                duration,
                                (t) => 1 - Math.pow(1 - t, 3),
                            ),
                            tweenRotationToEuler(o.mesh, targetEuler, duration),
                        ]);

                        o.mesh.position.set(pos.x, finalY, pos.z);
                        o.mesh.quaternion.setFromEuler(targetEuler);
                        o.faceUp = true;
                        o._baseOrigPosition = pos.clone();
                        o.origPosition = o._baseOrigPosition.clone();
                        o.origPosition.y = finalY;
                        o.origQuaternion = o.mesh.quaternion.clone();

                        try {
                            playDealAt(o.mesh);
                        } catch (e) {}
                        communityCards.push(o);
                        await wait(300);
                    }

                    // Showdown: evaluate all hands and determine winner
                    async function showdown() {
                        handComplete = true;
                        waitingForPlayer = false;
                        enablePlayerControls(false);
                        try {
                            document.getElementById("log").textContent =
                                "Showdown!";
                        } catch (e) {}

                        let bestRank = -1;
                        let bestSortKey = null;
                        let winner = -1;
                        const results = [];

                        const compareKeys = (a = [], b = []) => {
                            for (
                                let i = 0;
                                i < Math.min(a.length, b.length);
                                i++
                            ) {
                                if (a[i] > b[i]) return 1;
                                if (a[i] < b[i]) return -1;
                            }
                            return 0;
                        };

                        for (const seat of activePlayers) {
                            const playerCards = dealtCards.filter(
                                (c) => c.seat === seat,
                            );
                            const allCards = [
                                ...playerCards,
                                ...communityCards,
                            ];
                            const handEval = evaluatePokerHand(allCards);
                            results.push({
                                seat,
                                rank: handEval.rank,
                                desc: handEval.desc,
                            });

                            if (
                                bestSortKey === null ||
                                compareKeys(handEval.sortKey, bestSortKey) > 0
                            ) {
                                bestRank = handEval.rank;
                                bestSortKey = handEval.sortKey;
                                winner = seat;
                            }
                        }

                        // Display results
                        let logText = "Results:\\n";
                        results.forEach((r) => {
                            logText += `Player ${r.seat + 1}: ${r.desc}${r.seat === winner ? " (WINNER!)" : ""}\\n`;
                        });

                        try {
                            document.getElementById("log").textContent =
                                logText;
                        } catch (e) {}

                        // Animate chip transfer from pot to winner
                        if (winner >= 0) {
                            await wait(800);
                            await animateChipTransferBetweenSeats(
                                "pot",
                                winner,
                                { duration: 900 },
                            );
                        }

                        // Ensure controls remain disabled and no further turns start
                        enablePlayerControls(false);
                        waitingForPlayer = false;
                        handComplete = true;

                        // Rotate dealer to next player
                        dealerSeat = (dealerSeat + 1) % 4;
                        try {
                            document.getElementById("log").textContent =
                                logText +
                                `\\nDealer moves to Player ${dealerSeat + 1}`;
                        } catch (e) {}
                    }

                    async function revealAll() {
                        const speed =
                            parseFloat(
                                document.getElementById("speed").value,
                            ) || 1;
                        const duration = 400 / speed;
                        for (const o of cardObjects) {
                            flipCard(o, duration);
                        }
                    }

                    function flipCard(o, duration = 400) {
                        const start = o.mesh.rotation.y;
                        const target = start + Math.PI;
                        const t0 = performance.now();
                        (function tick(now) {
                            const p = Math.min(1, (now - t0) / duration);
                            o.mesh.rotation.y =
                                start + (target - start) * easeInOutCubic(p);
                            if (p < 1) requestAnimationFrame(tick);
                        })(performance.now());
                        o.faceUp = !o.faceUp;
                    }

                    // helpers
                    function wait(ms) {
                        return new Promise((r) => setTimeout(r, ms));
                    }
                    function easeInOutCubic(t) {
                        return t < 0.5
                            ? 4 * t * t * t
                            : 1 - Math.pow(-2 * t + 2, 3) / 2;
                    }
                    function shuffleArray(a) {
                        for (let i = a.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [a[i], a[j]] = [a[j], a[i]];
                        }
                    }
                    // pop a mesh and its matching deck metadata atomically
                    function safePopCardMeshAndMeta() {
                        if (deck.length === 0 || cardObjects.length === 0)
                            return null;
                        // use pop so the metadata comes from the same end as the visible top card
                        const meta = deck.pop();
                        const meshObj = cardObjects.pop();
                        return { meta, meshObj };
                    }

                    // window resize
                    window.addEventListener("resize", () => {
                        camera.aspect = innerWidth / innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(innerWidth, innerHeight);
                    });

                    // raycasting for mouse pointer interaction
                    const ray = new THREE.Raycaster();
                    const mouse = new THREE.Vector2();
                    window.addEventListener("pointerdown", onPointerDown);
                    function onPointerDown(e) {
                        mouse.x = (e.clientX / innerWidth) * 2 - 1;
                        mouse.y = -(e.clientY / innerHeight) * 2 + 1;
                        ray.setFromCamera(mouse, camera);
                        const intersects = ray.intersectObjects(
                            scene.children,
                            true,
                        );
                        if (intersects.length === 0) return;
                        // flip the first clicked card
                        for (const it of intersects) {
                            let m = it.object;
                            while (m && !m.userData.cardId) m = m.parent;
                            if (m && m.userData.cardId) {
                                const cardId = m.userData.cardId;
                                // try dealtCards first, then the main cardObjects
                                const obj = dealtCards.find(
                                    (o) => o.id === cardId,
                                ) ||
                                    cardObjects.find(
                                        (o) => o.id === cardId,
                                    ) || { mesh: m, id: cardId };
                                // Sound on flip
                                try {
                                    flipCard(obj, 300);
                                } catch (e) {}
                                try {
                                    playDealAt(obj.mesh);
                                } catch (e) {}
                                return;
                            }
                        }
                    }

                    // UI bindings
                    document
                        .getElementById("shuffleBtn")
                        .addEventListener("click", async () => {
                            try {
                                document.getElementById("log").textContent =
                                    "Shuffling…";
                            } catch (e) {}
                            // play positional shuffle sound with small jitter for variety
                            try {
                                playShuffleWithJitter();
                            } catch (e) {
                                console.warn("shuffle jitter play failed", e);
                            }
                            await visualShuffle();
                            try {
                                document.getElementById("log").textContent =
                                    "Shuffled";
                            } catch (e) {}
                        });
                    document
                        .getElementById("dealBtn")
                        .addEventListener("click", async () => {
                            document.getElementById("log").textContent =
                                "Dealing poker hand…";
                            await dealPokerHand();
                        });
                    document
                        .getElementById("resetBtn")
                        .addEventListener("click", () => {
                            deck = deckIds.slice();
                            // dispose dealt cards and deck objects
                            dealtCards.forEach((o) => disposeCard(o));
                            dealtCards.length = 0;
                            // dispose community cards
                            if (communityCards && communityCards.length > 0) {
                                communityCards.forEach((o) => disposeCard(o));
                                communityCards.length = 0;
                            }
                            // dispose existing deck objects
                            cardObjects.forEach((o) => disposeCard(o));
                            cardObjects.length = 0;
                            layoutDeckAt(0, BASE_DECK_Y, 4);
                            document.getElementById("log").textContent =
                                "Deck reset";
                        });
                    document
                        .getElementById("revealBtn")
                        .addEventListener("click", () => {
                            document.getElementById("log").textContent =
                                "Revealing…";
                            revealAll();
                            document.getElementById("log").textContent =
                                "Reveal toggled";
                        });

                    // Return cached dealtCards if present or detect dealt cards by scanning the scene
                    // "safe cloning" so detected meshes can be animated/stacked.
                    function makeMaterialsSafe(mesh) {
                        try {
                            if (
                                !mesh ||
                                (mesh.userData && mesh.userData._materialsSafe)
                            )
                                return;
                            const mats = Array.isArray(mesh.material)
                                ? mesh.material
                                : [mesh.material];
                            const newMats = mats.map((m) => {
                                if (!m) return m;
                                const copy = m.clone();
                                copy.polygonOffset = true;
                                copy.polygonOffsetFactor = 0.5;
                                const idx =
                                    mesh.userData &&
                                    typeof mesh.userData.stackIndex === "number"
                                        ? mesh.userData.stackIndex
                                        : 0;
                                copy.polygonOffsetUnits = 1 + idx * 0.6;
                                copy.alphaTest = 0.01;
                                copy.depthWrite = true;
                                copy.depthTest = true;
                                copy.transparent = false;
                                copy.side = THREE.DoubleSide;
                                return copy;
                            });
                            mesh.material = Array.isArray(mesh.material)
                                ? newMats
                                : newMats[0];
                            mesh.receiveShadow = false;
                            mesh.userData._materialsSafe = true;
                        } catch (e) {}
                    }

                    function getDealtCards() {
                        if (dealtCards && dealtCards.length) return dealtCards;
                        const presentIds = new Set(
                            cardObjects.map((o) => o.id),
                        );
                        const found = [];

                        // traverse and collect top-level card meshes not already in cardObjects
                        scene.traverse((node) => {
                            if (!node) return;
                            let m = node;
                            while (m && !m.userData?.cardId) m = m.parent;
                            if (m && m.userData && m.userData.cardId) {
                                const id = m.userData.cardId;
                                if (
                                    !presentIds.has(id) &&
                                    !found.some((f) => f.id === id)
                                ) {
                                    // clone/adjust materials to avoid interfering with other meshes and reduce z-fighting
                                    makeMaterialsSafe(m);
                                    // set a high renderOrder so these detected dealt cards render after deck by default
                                    if (
                                        typeof m.renderOrder !== "number" ||
                                        m.renderOrder < 1000
                                    )
                                        m.renderOrder = 1000;
                                    // ensure a stable stack index exists on detected meshes (fallback after deck indices)
                                    if (
                                        typeof m.userData.stackIndex !==
                                        "number"
                                    )
                                        m.userData.stackIndex =
                                            10000 + found.length;
                                    // mark these as detected so we don't continuously re-clone
                                    m.userData._detectedDealt = true;

                                    // mark detected card as dealer if positioned near dealerPosition
                                    const detectedOrigPos = m.position.clone();
                                    const distToDealer =
                                        detectedOrigPos.distanceTo(
                                            dealerPosition,
                                        );
                                    let detectedSeat = undefined;
                                    if (distToDealer < 0.6) {
                                        detectedSeat = "dealer";
                                        detectedOrigPos.y =
                                            BASE_DECK_Y +
                                            CARD_T / 2 +
                                            GAP * 0.5;
                                    } else {
                                        // detect nearest player seat
                                        for (
                                            let s = 0;
                                            s < playerPositions.length;
                                            s++
                                        ) {
                                            const pp = playerPositions[s];
                                            if (!pp) continue;
                                            const d2 =
                                                detectedOrigPos.distanceTo(pp);
                                            if (d2 < 1.2) {
                                                detectedSeat = s;
                                                detectedOrigPos.y =
                                                    BASE_DECK_Y +
                                                    CARD_T / 2 +
                                                    GAP * 0.5;
                                                break;
                                            }
                                        }
                                    }

                                    // derive a simple faceUp estimate from Y-rotation
                                    let faceUp = true;
                                    try {
                                        const ry =
                                            ((m.rotation.y % (Math.PI * 2)) +
                                                Math.PI * 2) %
                                            (Math.PI * 2);
                                        if (Math.abs(ry - Math.PI) < 0.9)
                                            faceUp = false;
                                    } catch (e) {}

                                    found.push({
                                        mesh: m,
                                        id: id,
                                        faceUp: faceUp,
                                        seat: detectedSeat,
                                        _baseOrigPosition:
                                            detectedOrigPos.clone(),
                                        _seatIndex: 0,
                                        origPosition: detectedOrigPos.clone(),
                                        origQuaternion: m.quaternion.clone(),
                                    });
                                }
                            }
                        });
                        if (found.length) {
                            dealtCards.length = 0;
                            found.forEach((f) => dealtCards.push(f));
                        }
                        return dealtCards;
                    }

                    // prepare a detected dealt mesh before fanning/restacking:
                    function prepareDealtMesh(o, index) {
                        if (!o || !o.mesh) return;
                        const m = o.mesh;
                        // make materials match created card material settings
                        try {
                            makeMaterialsSafe(m);
                        } catch (e) {}
                        // ensure stable stack index fallback
                        if (typeof m.userData.stackIndex !== "number")
                            m.userData.stackIndex = 10000 + index;
                        // establish an immutable base original position once, then derive origPosition from it
                        if (!o._baseOrigPosition) {
                            if (o.origPosition)
                                o._baseOrigPosition = o.origPosition.clone();
                            else o._baseOrigPosition = m.position.clone();
                        }
                        // preserve original seat value and normalized keys
                        if (typeof o._origSeat === "undefined")
                            o._origSeat = o.seat;
                        o._seatKey = seatKey(o._origSeat);
                        o._seatBaseKey = seatBaseKey(o._origSeat);
                        // compute origPosition from base
                        o.origPosition = o._baseOrigPosition.clone();
                        try {
                            // Do NOT apply the per-card vertical DEAL_LAYER_RAISE
                            if (
                                o.seat === "dealer" ||
                                (m.userData && m.userData.seat === "dealer")
                            ) {
                                // ensure dealer index is fixed and origPosition is set to the dealer plane
                                o._seatIndex = 0;
                                o.origPosition.y =
                                    BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;
                                // ensure base stored Y matches
                                o._baseOrigPosition.y = o.origPosition.y;
                            } else {
                                // Do not vertically stack player cards 
                                o.origPosition.y =
                                    BASE_DECK_Y + CARD_T / 2 + GAP * 0.5;
                            }
                        } catch (e) {}
                    }

                    // Layout a player's hand by spacing their dealt cards horizontally (or forward for split seats).
                    function layoutPlayerHand(seat, duration = 240) {
                        try {
                            const key = seatKey(seat);
                            const hand = dealtCards.filter(
                                (o) => seatKey(o.seat) === key,
                            );
                            if (!hand || hand.length === 0)
                                return Promise.resolve();
                            // determine anchor center
                            const isSplit =
                                typeof key === "string" &&
                                key.includes("_split");
                            const baseIdx = isSplit
                                ? parseInt(String(key).split("_")[0], 10) || 0
                                : Number(key);
                            const base = playerPositions[baseIdx]
